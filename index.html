  squadStart: 0, ambushT: 0,
  gateFlashT: 0, gateFlashGood: true, badgePopT: 0, // 過門一刻:40ms 全屏閃 + 隊伍數字 badge pop
  hitstopT: 0, zoomT: 0, critCd: 0,   // 後處理:hitstop 40ms + zoom punch(scale 1.02 回彈);爆擊 punch 有冷卻
  themeFadeT: 0,                      // 環境主題切換 1s 過場漸變(新 BG 淡入蓋舊 BG)
};

// ---------------- 人群式隊形(黃金角散佈 + 固定亂數擾動) ----------------
function mulberry32(seed) {
  return function () {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
const CROWD = (() => {
  const rnd = mulberry32(20260711);
  const GA = Math.PI * (3 - Math.sqrt(5));
  const out = [];
  for (let i = 0; i < CONFIG.maxRenderSoldiers; i++) {
    const r = 11.5 * Math.sqrt(i + 0.7);
    const a = i * GA + (rnd() - 0.5) * 0.9;
    out.push([
      Math.cos(a) * r + (rnd() - 0.5) * 12,
      Math.sin(a) * r * 0.62 + (rnd() - 0.5) * 10 + 8,
    ]);
  }
  return out;
})();

function syncDots() {
  const want = Math.min(G.squad, CONFIG.maxRenderSoldiers);
  while (G.dots.length > want) G.dots.pop();
  const ownedCos = Object.keys(SAVE.cosplayCats || {}).filter(k => SAVE.cosplayCats[k]).map(Number);
  while (G.dots.length < want) {
    // 15% 機率(如果有擁有)出 cosplay 貓,否則普通品種
    let breed, cos = false;
    if (ownedCos.length && Math.random() < 0.15) {
      breed = ownedCos[Math.floor(Math.random() * ownedCos.length)]; cos = true;
    } else {
      breed = Math.floor(Math.random() * CAT_BREEDS.length);
      if (!SAVE.catDex[breed]) {
        SAVE.catDex[breed] = 1;
        if (G.state === 'play') addFloat(G.squadX, squadY - 70, '新品種:' + CAT_BREEDS[breed].n + '!', '#ffd0e0', 16);
      }
    }
    G.dots.push({ x: G.squadX + (Math.random() * 40 - 20), y: squadY + 30, tx: 0, ty: 0, bob: Math.random() * 6.28, breed, cos });
  }
  for (let i = 0; i < want; i++) {
    G.dots[i].tx = G.squadX + CROWD[i][0];
    G.dots[i].ty = squadY + CROWD[i][1];
  }
}

function squadHalfWidth() {
  const want = Math.min(G.squad, CONFIG.maxRenderSoldiers);
  let mx = 20;
  for (let i = 0; i < want; i++) mx = Math.max(mx, Math.abs(CROWD[i][0]));
  return mx + 16;
}

// ---------------- 士兵增減 / 傷害處理 ----------------
function changeSquad(delta, silent) {
  const before = G.squad;
  const cap = RL('m_titan') ? 3000 : RL('legion') ? 2000 : RL('horde') ? 1500 : CONFIG.squadCap;
  G.squad = Math.max(0, Math.min(cap, Math.round(G.squad + delta)));
  const diff = G.squad - before;
  if (diff < 0 && !silent) {
    Sound.soldierDie();
    for (let i = 0; i < Math.min(-diff, 8); i++) {
      spawnParticles(G.squadX + (Math.random() * 60 - 30), squadY + Math.random() * 40, '#9fc57a', 6);
    }
  }
  // 最後防線:每關一次免死
  if (G.squad <= 0 && G.state === 'play') {
    const ls = elv('laststand');
    if (ls > 0 && !G.lastStandUsed) {
      G.lastStandUsed = true;
      G.squad = 3 + ls;
      Sound.revive();
      addFloat(G.squadX, squadY - 60, '最後防線!', TOKENS.GOLD, 26);
      spawnParticles(G.squadX, squadY, TOKENS.GOLD, 24, 240);
    } else if (RL('phoenix') && !G.phoenixUsed) {
      G.phoenixUsed = true;
      G.squad = 5;
      Sound.revive();
      addFloat(G.squadX, squadY - 60, '鳳凰羽毛!浴火重生!', '#ff9b3d', 24);
      spawnParticles(G.squadX, squadY, '#ff9b3d', 30, 260);
    } else {
      syncDots();
      gameOver();
      return;
    }
  }
  syncDots();
}

// 戰鬥來源嘅隊伍傷害:行護盾 + 復仇爆發
function damageSquad(n, x, y) {
  if (G.shield > 0) {
    G.shield--;
    Sound.shieldHit();
    addFloat(x || G.squadX, (y || squadY) - 30, '護盾!', '#7ac9ff', 18);
    spawnParticles(x || G.squadX, y || squadY, '#7ac9ff', 10, 160);
    return;
  }
  if (RL('sacrifice')) n = Math.max(1, Math.floor(n / 2));
  if (RL('ironwill')) n = Math.min(n, 3);
  changeSquad(-n);
  addFloat(x || G.squadX, squadY - 30, '-' + n, '#ffffff', 18); // 傷害:白字深描邊
  if (RL('thorns')) areaDamage(x || G.squadX, squadY - 20, 150, 200 * abilityDmgMul(), '#c9a4ff');
  if (RL('frostnova')) for (const en of G.enemies) en.slowT = Math.max(en.slowT, 3);
  if (RL('bloodfrenzy')) G.frenzyT = 3;
  const rv = elv('revenge');
  if (rv > 0) {
    const dmg = 25 * rv * Math.min(n, 6) * abilityDmgMul();
    areaDamage(x || G.squadX, squadY - 20, 130, dmg, '#ff9b3d');
  }
}

// ---------------- 敵人傷害 / 擊殺(共用) ----------------
function damageEnemy(e, dmg, opts) {
  opts = opts || {};
  if (e.ghostPhase > 0) dmg *= 0.4;
  dmg *= targetDmgMul(e);
  // 先發制人:首次命中必暴擊
  if (RL('firstblood') && !e.fbDone) {
    e.fbDone = true;
    dmg *= 3;
    addFloat(e.x, e.y - 20, '暴擊!', '#ffd23d', 15);
    critPunch();
  }
  // 暴擊
  const critLv = elv('crit');
  if (opts.canCrit && RL('omniscience')) { dmg *= 3; }
  else if (opts.canCrit && RL('lucky7') && Math.random() < 0.07) { dmg *= 7; addFloat(e.x, e.y - 20, '幸運七!', '#ffd23d', 15); critPunch(); }
  else if (opts.canCrit && critLv > 0 && Math.random() < 0.06 * critLv) {
    dmg *= 3;
    addFloat(e.x, e.y - 20, '暴擊!', '#ffd23d', 15);
    critPunch();
  }
  e.hp -= dmg;
  e.flash = 0.06; // 受擊白閃 60ms
  e.hitT = 0.1;   // 受擊 squash 壓扁 15%,100ms 回彈(階段4動畫)
  // 史萊姆分身:跌到 1/3 血再分裂一次成兩隻更細
  if (e.slimeSplitLeft > 0 && e.hp > 0 && e.hp < e.hpMax * 0.34) {
    e.slimeSplitLeft = 0;
    Sound.enemyDie();
    addFloat(e.x, e.y, '再分裂!', '#8fdc5a', 16);
    spawnParticles(e.x, e.y, '#8fdc5a', 14, 160);
    const hp2 = e.hp;
    for (let i = 0; i < 2; i++) {
      G.enemies.push({
        id: null, fam: 'slime', name: '史萊姆分身', move: 'bounce',
        x: Math.max(laneL + 30, Math.min(laneR - 30, e.x + (i ? 1 : -1) * e.size * 0.4)),
        y: e.y, hp: hp2, hpMax: hp2, speed: 65, bite: 3, coin: 5, size: e.size * 0.72,
        homing: 20, bar: true, hue: 90, sat: 1.3, flash: 0, wob: Math.random() * 6.28,
        burnT: 0, burnDps: 0, slowT: 0, tier: 3, slimeSplitLeft: 0,
      });
    }
    killEnemy(e);
    return true;
  }
  if (e.hp <= 0) { killEnemy(e); return true; }
  // 處決者:低血量小怪即死
  const ex = elv('execute');
  if (ex > 0 && e.hp / e.hpMax < 0.10 + 0.02 * ex) {
    addFloat(e.x, e.y - 20, '處決!', '#ff5a3d', 15);
    killEnemy(e);
    return true;
  }
  return false;
}

function killEnemy(e) {
  const idx = G.enemies.indexOf(e);
  if (idx < 0) return;
  G.enemies.splice(idx, 1);
  Sound.enemyDie();
  spawnParticles(e.x, e.y, enemyColor(e), 10); // ≤10 粒同色 particles
  spawnCoins(e.x, e.y, e.coin + (RL('piggy') ? 1 : 0));
  // 遺物擊殺效果
  if (RL('fleshfeast') && Math.random() < 0.05) { changeSquad(1, true); addFloat(e.x, e.y, '+1 士兵', '#8affc1', 14); }
  if (RL('soulharvest')) {
    G.killCount++;
    if (G.killCount % 50 === 0) { changeSquad(1, true); addFloat(G.squadX, squadY - 44, '靈魂收割 +1', '#c9a4ff', 15); }
  }
  if (RL('chainreaction') && Math.random() < 0.2) areaDamage(e.x, e.y, 70, 80 * abilityDmgMul(), '#ff9b3d');
  if (RL('killrhythm')) { G.comboN = (G.comboN || 0) + 1; G.comboT = 2; }
  // 晶石掉落:超低機率,層級越高越高(lv1 0.2% ... lv5 1.0%)
  const gemChance = 0.008 * ((e.tier || 0) + 1); // 提升機率:tier1 0.8% ... tier5 4.0%
  if (Math.random() < gemChance) dropGem(e.x, e.y);
  if (RL('m_goldgod')) spawnCoins(e.x, e.y, 2);
  if (RL('vampiric')) { G.vampN = (G.vampN || 0) + 1; if (G.vampN % 30 === 0) changeSquad(2, true); }
  if (RL('deathblossom')) { G.dbN = (G.dbN || 0) + 1; if (G.dbN % 15 === 0) areaDamage(e.x, e.y, 200, 150 * abilityDmgMul(), '#ff9bd4'); }
  // 尋寶獵人:機率掉寶箱
  const tr = elv('treasure');
  if (tr > 0 && Math.random() < 0.02 * tr) {
    G.coins.push({ x: e.x, y: e.y, v: Math.round(15 * G.level * (1 + elv('coin') * 0.2) * (RL('chestking') ? 2 : 1)), t: 0, vy: -80, vx: 0, big: true });
    addFloat(e.x, e.y - 24, '寶箱!', TOKENS.GOLD, 16);
    Sound.chest();
  }
  // 圖鑑解鎖
  if (!SAVE.dex[e.id]) { SAVE.dex[e.id] = 1; addFloat(e.x, e.y - 40, '圖鑑登錄!', '#b8d4ff', 13); }
}

function areaDamage(x, y, radius, dmg, color) {
  G.fx.push({ type: 'boom', x, y, r: radius, t: 0, life: 0.35, color: color || '#ff9b3d' });
  for (let i = G.enemies.length - 1; i >= 0; i--) {
    const e = G.enemies[i];
    if (Math.hypot(e.x - x, e.y - y) < radius + e.size * 0.3) damageEnemy(e, dmg, {});
  }
  if (G.boss && G.boss.state === 'fight' && Math.hypot(G.boss.x - x, G.boss.y - y) < radius + G.boss.size * 0.3) {
    hitBoss(dmg * 0.5);
  }
}

function hitBoss(dmg) {
  const b = G.boss;
  if (!b || b.state === 'die') return;
  dmg *= (1 + elv('bossdmg') * 0.2);
  if (RL('kingslayer') && b.hp < b.hpMax * 0.2) dmg *= 2;
  if (b.spec.mech === 'necroarmor') {
    let n = 0;
    for (const e of G.enemies) if (e.fam === 'skeleton') n++;
    if (n > 0) {
      dmg *= Math.max(0.4, 1 - 0.06 * n); // 清走骷髏先好打
      if (!b._armorMsgT || performance.now() - b._armorMsgT > 900) {
        b._armorMsgT = performance.now();
        addFloat(b.x, b.y - b.size * 0.4, '🛡 亡靈護甲 -' + Math.round(Math.min(60, 6 * n)) + '%', '#b8d4ff', 15);
      }
    }
  }
  if (b.phased) {
    dmg *= 0.2; // 幽靈之王虛化
    if (!b._phaseMsgT || performance.now() - b._phaseMsgT > 500) {
      b._phaseMsgT = performance.now();
      addFloat(b.x, b.y - b.size * 0.4, '虛化', '#b8d4ff', 15);
    }
  }
  b.hp -= dmg;
  b.flash = 0.08;
  if (b.hp <= 0) killBoss();
}

// ---------------- 動態難度:敵人血量追住玩家戰力 ----------------
function playerPower() {
  return G.squad
    * (1 + elv('dmg') * 0.25) * (1 + elv('big') * 0.05) * G.runDmgMul
    * (1 + elv('rate') * 0.12) * G.runRateMul;
}
// 小怪血量倍率:取「關卡下限」同「戰力比例」較高者
function enemyHpMul() {
  // 關卡下限變陡,令越級挑戰喺小怪階段就感受到牆;
  // byPower 保留,令 farm 場嘅小怪跟玩家戰力自動平衡(唔會變無聊割草)
  const byLevel = 0.75 * Math.pow(1.45, G.level - 1);
  const byPower = 0.75 * playerPower() / 8;
  return Math.max(byLevel, byPower) * (RL('bloodmoon') ? 0.9 : 1);
}
// 主動技能傷害同步縮放,避免後期機制升級失效
function abilityDmgMul() {
  return (1 + elv('dmg') * 0.25) * G.runDmgMul * ACTIVE.dmgMul;
}
function relicCoinMul() {
  let m = ACTIVE.coinMul;
  if (RL('midas')) m *= 3;
  if (RL('goldrush')) m *= 2;
  if (RL('m_goldgod')) m *= 5;
  if (RL('coinclaw')) m *= 1.4;
  return m;
}
// 全域戰鬥傷害加成(遺物)
function relicCombatMul() {
  let m = ACTIVE.dmgMul;
  if (RL('ghostlegion')) m *= 1.25;
  if (RL('legion')) m *= 1.4;
  if (RL('m_titan')) m *= 1.6;
  if (RL('killrhythm')) m *= 1 + Math.min(0.5, (G.comboN || 0) * 0.02);
  if (RL('m_worldeater')) m *= 1 + (G.killCount || 0) * 0.001;
  if (RL('stampede') && G.squad > 100) m *= 1.3;
  if (RL('apextiger')) m *= 1 + 0.8 * (1 - G.squad / Math.max(1, G.squadStart || G.squad));
  if (RL('snowball')) m *= 1 + 0.05 * ((G.level || 1) - 1);
  if (RL('warmup')) m *= 1;  // rate 效果,唔喺度
  if (RL('ambush') && G.ambushT > 0) m *= 1.8;
  return m;
}
// 對特定目標嘅遺物加成
function targetDmgMul(e) {
  let m = 1;
  if (RL('giantslayer') && e.hp > e.hpMax * 0.5) m *= 1.4;
  if (RL('finisher') && e.hp < e.hpMax * 0.3) m *= 1.4;
  if (RL('armorbreak') && (e.fam === 'orc' || e.fam === 'golem')) m *= 1.5;
  if (RL('exorcist') && (e.fam === 'skeleton' || e.fam === 'ghost' || e.fam === 'imp')) m *= 1.5;
  return m;
}

// ---------------- 關卡生成 ----------------
// 每 2 關開放一個新層級:L1-2 => lv1,L3-4 => 到 lv2,L5-6 => 到 lv3,
// L7-8 => 到 lv4,L9+ => 到 lv5。低級關卡唔會出高級小怪。
function maxTierForLevel(level) {
  return Math.max(0, Math.min(4, Math.floor((level - 1) / 2)));
}
function monsterPool(level) {
  const maxTier = maxTierForLevel(level);
  const avail = MONSTERS.filter(m => m.tier <= maxTier);
  // 愈高等級嘅關卡,愈高機率出高層級怪;低層級做炮灰
  // 關卡愈深,高層級權重愈重
  const lean = 0.55 + Math.min(1.2, level * 0.06);
  return avail.map(m => ({ m, w: Math.pow(lean + 1, m.tier) / (1 + (maxTier - m.tier) * 0.6) }));
}
// 今關 Boss 同族小怪佔 40%,其餘家族合共 60%
function pickMonsterForLevel(pool, bossFam) {
  const same = pool.filter(p => p.m.fam === bossFam);
  const other = pool.filter(p => p.m.fam !== bossFam);
  if (same.length && other.length) {
    return pickWeighted(Math.random() < 0.4 ? same : other);
  }
  return pickWeighted(pool);
}
function pickWeighted(pool) {
  let total = 0;
  for (const p of pool) total += p.w;
  let r = Math.random() * total;
  for (const p of pool) { r -= p.w; if (r <= 0) return p.m; }
  return pool[pool.length - 1].m;
}

function gatePairFor(level) {
  // 正面門加權池:人數門同臨時升級門為主,x1.5 罕見
  const posPool = [
    { w: 3,   f: () => ({ kind: 'count', v: 2 + Math.floor(Math.random() * 3) + Math.floor(level / 3) }) },
    { w: 3,   f: () => ({ kind: 'up', id: TEMP_GATE_POOL[Math.floor(Math.random() * TEMP_GATE_POOL.length)] }) },
    { w: 1,   f: () => ({ kind: 'dmg', v: 0.25 }) },
    { w: 1,   f: () => ({ kind: 'rate', v: 0.25 }) },
  ];
  const pickPos = () => {
    let total = 0;
    for (const p of posPool) total += p.w;
    let r = Math.random() * total;
    for (const p of posPool) { r -= p.w; if (r <= 0) return p.f(); }
    return posPool[0].f();
  };
  // 負面門:人數門為主;藍色晶石門改成超稀有(0.5%)
  const negGate = () => {
    if (Math.random() < 0.005) return { kind: 'gem', v: 0 }; // 超稀有藍色晶石門,射擊可增加
    return { kind: 'count', v: -(1 + Math.floor(Math.random() * 3)) };
  };
  const a = pickPos();
  const b = Math.random() < (RL('goodfaith') ? 0.30 : 0.15) ? pickPos() : negGate();
  return Math.random() < 0.5 ? [a, b] : [b, a];
}

function buildLevel(level) {
  G.events = [];
  G.eventIdx = 0;
  const len = CONFIG.scrollSpeed * 60; // 固定 60 秒小怪階段
  let d = 700;
  let gateNext = true;
  while (d < len - 900) {
    G.events.push({ at: d, type: gateNext ? 'gate' : 'wave' });
    gateNext = !gateNext;
    d += 560 + Math.random() * 320;
  }
  G.events.push({ at: len, type: 'boss' });
}

function startLevel(level) {
  G.level = level;
  switchTheme(); // 每 5 關一主題:轉變時重 build 背景 + 1s 過場漸變(冇轉就零成本)
  G.dist = 0;
  G.bossPhase = false;
  G.boss = null;
  G.levelBossSpec = bossSpecForLevel(level); // 開關即決定今關 Boss(小怪會偏向同族)
  G.bullets.length = 0; G.enemies.length = 0; G.gates.length = 0;
  G.coins.length = 0; G.parts.length = 0; G.fireballs.length = 0; G.floats.length = 0;
  G.mines.length = 0; G.fx.length = 0; G.zones.length = 0; G.waves.length = 0; G.gemDrops.length = 0;
  G.playerSlowT = 0;
  G.fireAcc = 0;
  G.killsCoins = 0;
  G.gemsThisLevel = 0;
  // 主動技能初始冷卻(錯開發動時間)
  G.cool = { orbital: 8, lightning: 4, mortar: 5.5, sniper: 6.5, rocket: 4.5, mines: 4, medic: 8, tesla: 1, chaos: 15 };
  G.shield = elv('shield') + (RL('fortify') ? 2 : 0);
  G.frenzyT = 0; G.shieldRegenT = 0; G.rodCd = 0;
  if (RL('pioneercamp')) G.squad += 3;
  G.squadStart = G.squad;
  G.ambushT = RL('ambush') ? 8 : 0;
  if (RL('furcoat')) G.shield += 3;
  if (RL('immortal') || RL('guardianangel')) G.lastStandUsed = false;
  if (RL('gamblerdice')) {
    const id = TEMP_GATE_POOL[Math.floor(Math.random() * TEMP_GATE_POOL.length)];
    G.tempUp[id] = (G.tempUp[id] || 0) + 2;
  }
  G.rushT = elv('rush') > 0 ? 5 + 0.5 * elv('rush') : 0;
  G.hornT = 0;
  G.lastStandUsed = false;
  buildPets();
  buildLevel(level);
  syncDots();
}

function buildPets() {
  G.pets.length = 0;
  const dogLv = elv('dog');
  if (dogLv > 0) {
    const n = Math.min(3, 1 + Math.floor((dogLv - 1) / 3));
    for (let i = 0; i < n; i++) G.pets.push({ kind: 'dog', ang: i * (6.28 / n), cd: 0.5 + i * 0.4, x: 0, y: 0 });
  }
  const drLv = elv('drone');
  if (drLv > 0) {
    const n = Math.min(2, 1 + Math.floor((drLv - 1) / 4));
    for (let i = 0; i < n; i++) G.pets.push({ kind: 'drone', side: n === 1 ? 0 : (i === 0 ? -1 : 1), cd: 0.3 + i * 0.25, t: i * 1.7, x: 0, y: 0 });
  }
}

function startRun() {
  G.tempUp = {};
  G.runRelics = [];
  G.phoenixUsed = false;
  G.killCount = 0; G.comboN = 0; G.comboT = 0;
  recalcRelics();
  G.squad = 4 + elv('start') + ACTIVE.startAdd;
  G.runDmgMul = 1;
  G.runRateMul = 1;
  G.squadX = W / 2;
  G.targetX = W / 2;
  G.dots.length = 0;
  startLevel(1);
  setState('play');
}

// ---------------- 生成實體 ----------------
function spawnGatePair() {
  const [a, b] = gatePairFor(G.level);
  const gw = laneW / 2 - 10;
  const mk = (spec, side) => ({
    kind: spec.kind, v: spec.v, id: spec.id,
    x: side === 0 ? laneL + 5 + gw / 2 : laneR - 5 - gw / 2,
    y: -80, w: gw, h: 84,
    hits: 0, nextHits: RL('gatesmith') ? 2 : 3, used: false,
  });
  G.gates.push(mk(a, 0), mk(b, 1));
}

function spawnWave() {
  const pool = monsterPool(G.level);
  if (!G.levelBossSpec) G.levelBossSpec = bossSpecForLevel(G.level);
  const bossFam = G.levelBossSpec.minion || G.levelBossSpec.fam;
  const lvHpMul = enemyHpMul();
  const n = Math.min(26, 3 + Math.floor(G.level * 1.2) + Math.floor(Math.random() * 3));
  for (let i = 0; i < n; i++) {
    const m = pickMonsterForLevel(pool, bossFam);
    G.enemies.push({
      id: m.id, fam: m.fam, name: m.name, move: m.move, tier: m.tier,
      x: laneL + 30 + Math.random() * (laneW - 60),
      y: -40 - Math.random() * 420 - Math.floor(i / 4) * 90,
      hp: m.hp * lvHpMul, hpMax: m.hp * lvHpMul,
      speed: m.speed * (0.9 + Math.random() * 0.2),
      bite: m.bite, coin: m.coin, size: m.size,
      homing: m.homing, bar: m.bar,
      hue: m.hue, sat: m.sat,
      flash: 0, wob: Math.random() * 6.28,
      burnT: 0, burnDps: 0, slowT: 0,
    });
  }
}

// 小怪版 Boss 機制(頻率遠低過 Boss)
function miniMonsterMech(e) {
  switch (e.fam) {
    case 'goblin': // looter:跌少少錢
      spawnCoins(e.x, e.y, 1); break;
    case 'wolf': { // 迷你衝刺
      const dx = G.squadX - e.x, dy = squadY - e.y, len = Math.hypot(dx, dy) || 1;
      e.x += dx / len * 40; e.y += dy / len * 60; break;
    }
    case 'skeleton': // 召喚一隻細骷髏
      if (G.enemies.length < 60) spawnMinion('m_skeleton0', e.x, e.y - 20);
      break;
    case 'slime': // 分裂一粒
      if (G.enemies.length < 60) spawnMinion('m_slime0', e.x + 30, e.y);
      break;
    case 'imp': { // 單發火球留細燃燒帶
      const dx = G.squadX - e.x, dy = squadY - e.y, len = Math.hypot(dx, dy) || 1;
      G.fireballs.push({ x: e.x, y: e.y + 10, vx: dx / len * 260, vy: dy / len * 260, bite: 1, t: 0, small: true, zone: true });
      break;
    }
    case 'spider': { // 蛛網
      const dx = G.squadX - e.x, dy = squadY - e.y, len = Math.hypot(dx, dy) || 1;
      G.fireballs.push({ x: e.x, y: e.y + 10, vx: dx / len * 240, vy: dy / len * 240, bite: 0, t: 0, web: true });
      break;
    }
    case 'orc': // 短暫加速(迷你狂暴)
      e.speed *= 1.5; setTimeout(() => {}, 0); break;
    case 'ghost': // 短暫虛化
      e.ghostPhase = 1.2; break;
    case 'golem': { // 細震波
      G.waves.push({ y: e.y + 10, gapX: laneL + 60 + Math.random() * (laneW - 120), gapW: 120, speed: 260, hit: false });
      break;
    }
    case 'shaman': // 已有施法,額外唔做
      break;
  }
}

// 召喚(骷髏君王用):喺指定位置生怪
function spawnMinion(famTier, x, y) {
  const m = MONSTERS.find(mm => mm.id === famTier);
  if (!m) return;
  const lvHpMul = enemyHpMul();
  G.enemies.push({
    id: m.id, fam: m.fam, name: m.name, move: m.move, tier: m.tier,
    x: Math.max(laneL + 30, Math.min(laneR - 30, x)), y,
    hp: m.hp * lvHpMul, hpMax: m.hp * lvHpMul,
    speed: m.speed, bite: m.bite,
    coin: m.coin,
    size: m.size, homing: m.homing, bar: m.bar,
    hue: m.hue, sat: m.sat,
    flash: 0, wob: Math.random() * 6.28,
    burnT: 0, burnDps: 0, slowT: 0,
    // 召喚出嚟嘅細怪唔應該再連鎖召喚,畀佢一個好長嘅初始冷卻
    mechCd: 999,
  });
}

// Boss 血量關卡曲線(經離線經濟模擬校準:每關約 farm 5-10 場先過到)
// L1 = 2.5 鎖死(現時難度啱好);表已考慮各關 Boss 本身 spec.hp 差異,
// 所以數值唔係平滑遞增 —— 乘返 spec.hp 之後總血量先係平滑上升。
const BOSS_LVMUL = [2.5, 14.05, 35.02, 34.33, 60.35, 81.73, 108.74, 162.08, 143.82, 259.92];
const BOSS_LVMUL_TAIL = 1.3; // L11+ 每關遞增

// 決定今關嘅 Boss(喺開關時就決定,令小怪可以偏向同族)
function bossSpecForLevel(level) {
  return level <= BOSSES.length
    ? BOSSES[level - 1]
    : BOSSES[Math.floor(Math.random() * BOSSES.length)];
}

function spawnBoss() {
  G.bossPhase = true;
  const spec = G.levelBossSpec || bossSpecForLevel(G.level);
  G.levelBossSpec = spec;
  // Boss 血量純粹由關卡曲線決定(唔再跟玩家戰力浮動),
  // 咁樣 farm 升級先會實質縮短 Boss 戰,做到「每關 farm 5-10 場先過到」嘅節奏。
  const lvMul = G.level <= BOSS_LVMUL.length
    ? BOSS_LVMUL[G.level - 1]
    : BOSS_LVMUL[BOSS_LVMUL.length - 1] * Math.pow(BOSS_LVMUL_TAIL, G.level - BOSS_LVMUL.length);
  const hp = spec.hp * 3 * lvMul;
  G.boss = {
    spec, id: spec.id, name: spec.name, beh: spec.beh,
    x: W / 2, y: -160, ty: Math.max(120, H * 0.18),
    hp, hpMax: hp,
    size: Math.min(laneW * 0.72, 300, Math.min(230, laneW * 0.55) * spec.sizeMul * 1.5), // Boss 體型 1.5x(夾住唔爆 lane)
    state: 'enter', t: 0, fireCd: 1.2, atkCd: 1.6, dir: 1,
    flash: 0, chargeT: 0, chargeStage: null,
    mechCd: 3, phaseT: 0, phased: false, enrage: false,
    wanderCd: 0, wx: W / 2, wy: Math.max(150, H * 0.2),
    splitAt: [0.6667, 0.3333], splitGen: 0, splitParts: null,
  };
  Sound.roar();
  punch(); // Boss 出場:hitstop + zoom punch
  addFloat(W / 2, H * 0.4, spec.name + '來襲!', '#ff6a3d', 26);
  if (RL('openingstrike')) {
    Sound.orbital();
    G.fx.push({ type: 'orbital', t: 0, life: 0.6 });
    hitBoss(400 * abilityDmgMul());
    addFloat(W / 2, H * 0.3, '先制打擊!', '#ffd23d', 20);
  }
  if (RL('ragnarok')) { G.boss.hp -= G.boss.hpMax * 0.15; addFloat(W / 2, H * 0.35, '諸神黃昏!', '#ff9ed4', 22); }
  if (RL('m_judgment')) { G.boss.hp -= G.boss.hpMax * 0.30; for (const e of G.enemies) e.hp = 0; addFloat(W / 2, H * 0.4, '最終審判!', '#ff4da6', 24); }
  if (G.boss.hp <= 0) killBoss();
  // 戰爭號角
  const hn = elv('horn');
  if (hn > 0) {
    G.hornT = 12;
    addFloat(G.squadX, squadY - 70, '戰爭號角!全隊狂暴!', TOKENS.GOLD, 20);
  }
}

function spawnParticles(x, y, color, n, spread) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * 6.28, sp = 60 + Math.random() * (spread || 180);
    G.parts.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: 0.35 + Math.random() * 0.3, t: 0, color, r: 2 + Math.random() * 3 });
  }
}

function spawnCoins(x, y, value) {
  const v = Math.max(1, Math.round(value * (1 + elv('coin') * 0.2) * (1 + elv('magnet') * 0.05) * relicCoinMul()));
  const n = Math.min(5, Math.max(1, Math.round(v / 4)));
  const per = Math.max(1, Math.round(v / n));
  const magnet = elv('magnet') > 0;
  for (let i = 0; i < n; i++) {
    G.coins.push({ x: x + Math.random() * 40 - 20, y: y + Math.random() * 30 - 15, v: per, t: magnet ? 1 : 0, vy: -60 - Math.random() * 60, vx: Math.random() * 80 - 40 });
  }
}

function dropGem(x, y) {
  G.gemDrops.push({ x, y, t: 0, vy: -100 - Math.random() * 60, vx: (Math.random() - 0.5) * 120 });
}
function addFloat(x, y, text, color, size) {
  G.floats.push({ x, y, y0: y, rise: 34, text, color: color || '#fff', size: size || 16, t: 0, life: 0.55 });
}

// ---------------- 主動技能(定時發動) ----------------
function updateAbilities(dt) {
  const C = G.cool;

  // 軌道轟炸
  const orb = elv('orbital');
  if (orb > 0) {
    C.orbital -= dt;
    if (C.orbital <= 0) {
      C.orbital = abilityCd(Math.max(10, 22 - orb));
      const dmg = 150 * (1 + 0.5 * orb) * abilityDmgMul() * (RL('beamdoom') ? 2 : 1);
      Sound.orbital();
      G.fx.push({ type: 'orbital', t: 0, life: 0.6 });
      G.shake = 8;
      for (let i = G.enemies.length - 1; i >= 0; i--) damageEnemy(G.enemies[i], dmg, {});
      if (G.boss && G.boss.state === 'fight') hitBoss(dmg * 0.6);
      addFloat(W / 2, H * 0.35, '軌道轟炸!', '#ffd23d', 24);
    }
  }
  // 連鎖閃電
  const lit = elv('lightning');
  if (lit > 0 && (G.enemies.length || G.boss)) {
    C.lightning -= dt;
    if (C.lightning <= 0) {
      C.lightning = abilityCd(6);
      const k = (2 + lit) * (RL('stormcaller') ? 2 : 1);
      const targets = G.enemies.slice().sort((a, b) =>
        Math.hypot(a.x - G.squadX, a.y - squadY) - Math.hypot(b.x - G.squadX, b.y - squadY)
      ).slice(0, k);
      if (targets.length) {
        Sound.zap();
        const pts = [[G.squadX, squadY - 20]];
        const dmg = 60 * (1 + 0.3 * lit) * abilityDmgMul();
        for (const e of targets) { pts.push([e.x, e.y]); }
        for (const e of targets) damageEnemy(e, dmg, {});
        G.fx.push({ type: 'bolt', pts, t: 0, life: 0.22 });
      }
    }
  }
  // 迫擊砲:轟炸最密集嘅怪群
  const mor = elv('mortar');
  if (mor > 0 && G.enemies.length) {
    C.mortar -= dt;
    if (C.mortar <= 0) {
      C.mortar = abilityCd(Math.max(3.5, 7 - 0.2 * mor));
      let best = null, bestN = -1;
      for (let s = 0; s < 5; s++) {
        const cand = G.enemies[Math.floor(Math.random() * G.enemies.length)];
        let nn = 0;
        for (const e of G.enemies) if (Math.hypot(e.x - cand.x, e.y - cand.y) < 90) nn++;
        if (nn > bestN) { bestN = nn; best = cand; }
      }
      if (best && best.y > 0) {
        G.fx.push({ type: 'target', x: best.x, y: best.y, t: 0, life: 0.8, dmg: 100 * (1 + 0.4 * mor) * abilityDmgMul() });
      } else C.mortar = 0.5;
    }
  }
  // 狙擊手:重創最強小怪
  const sn = elv('sniper');
  if (sn > 0 && G.enemies.length) {
    C.sniper -= dt;
    if (C.sniper <= 0) {
      C.sniper = abilityCd(Math.max(4, 9 - 0.3 * sn));
      let best = null;
      for (const e of G.enemies) if (e.y > 0 && (!best || e.hp > best.hp)) best = e;
      if (best) {
        Sound.hit(); Sound.noise(0.15, 0.2);
        G.fx.push({ type: 'snipe', x1: G.squadX, y1: squadY - 20, x2: best.x, y2: best.y, t: 0, life: 0.15 });
        addFloat(best.x, best.y - 20, '狙擊!', '#ff5a3d', 15);
        damageEnemy(best, 400 * (1 + 0.5 * sn) * abilityDmgMul() * (RL('marksman') ? 2 : 1), {});
      } else C.sniper = 0.5;
    }
  }
  // 火箭筒兵
  const rk = elv('rocket');
  if (rk > 0 && G.enemies.length) {
    C.rocket -= dt;
    if (C.rocket <= 0) {
      C.rocket = abilityCd(5);
      let best = null, bd = 1e9;
      for (const e of G.enemies) {
        if (e.y < 0) continue;
        const d = Math.hypot(e.x - G.squadX, e.y - squadY);
        if (d < bd) { bd = d; best = e; }
      }
      if (best) {
        Sound.fireball();
        const dx = best.x - G.squadX, dy = best.y - squadY;
        const len = Math.hypot(dx, dy) || 1;
        G.fireballs.push({ x: G.squadX, y: squadY - 20, vx: dx / len * 520, vy: dy / len * 520, t: 0, friendly: true, aoe: 90, dmg: 80 * (1 + 0.4 * rk) * abilityDmgMul(), tx: best.x, ty: best.y });
      } else C.rocket = 0.5;
    }
  }
  // 地雷部署
  const mn = elv('mines');
  if (mn > 0) {
    C.mines -= dt;
    if (C.mines <= 0) {
      C.mines = abilityCd(Math.max(3, 6 - 0.2 * mn));
      const mineN = RL('sapper') ? 2 : 1;
      for (let mi = 0; mi < mineN; mi++) {
        G.mines.push({ x: laneL + 40 + Math.random() * (laneW - 80), y: Math.max(-30, squadY - 420) - mi * 60, dmg: 120 * (1 + 0.4 * mn) * abilityDmgMul(), t: 0 });
      }
    }
  }
  // 戰地醫官
  const md = elv('medic');
  if (md > 0) {
    C.medic -= dt;
    if (C.medic <= 0) {
      C.medic = abilityCd(Math.max(6, 14 - 0.5 * md));
      changeSquad(1, true);
      addFloat(G.squadX, squadY - 44, '+1 援兵', '#8affc1', 16);
      Sound.coin();
    }
  }

  // 磁暴線圈(遺物):每秒電最近敵人
  if (RL('teslacoil') && G.enemies.length) {
    C.tesla -= dt;
    if (C.tesla <= 0) {
      C.tesla = 1;
      let bn = null, bd = 1e9;
      for (const e of G.enemies) {
        if (e.y < 0) continue;
        const d = Math.hypot(e.x - G.squadX, e.y - squadY);
        if (d < bd) { bd = d; bn = e; }
      }
      if (bn) {
        G.fx.push({ type: 'bolt', pts: [[G.squadX, squadY - 20], [bn.x, bn.y]], t: 0, life: 0.15 });
        damageEnemy(bn, 30 * abilityDmgMul(), {});
      }
    }
  }
  // 混沌寶珠(遺物):每 15 秒隨機轟炸
  if (RL('chaosorb') && G.enemies.length) {
    C.chaos -= dt;
    if (C.chaos <= 0) {
      C.chaos = 15;
      const tgt = G.enemies[Math.floor(Math.random() * G.enemies.length)];
      if (tgt && tgt.y > 0) {
        Sound.boom();
        addFloat(tgt.x, tgt.y - 30, '混沌寶珠!', '#d4b8ff', 16);
        areaDamage(tgt.x, tgt.y, 110, 150 * abilityDmgMul(), '#d4b8ff');
      } else C.chaos = 1;
    }
  }

  // 寵物
  for (const p of G.pets) {
    if (p.kind === 'dog') {
      p.ang += dt * 1.8;
      p.x = G.squadX + Math.cos(p.ang) * 72;
      p.y = squadY + 4 + Math.sin(p.ang) * 24;
      p.cd -= dt;
      if (p.cd <= 0) {
        let best = null, bd = 240;
        for (const e of G.enemies) {
          const d = Math.hypot(e.x - p.x, e.y - p.y);
          if (d < bd) { bd = d; best = e; }
        }
        if (best) {
          p.cd = RL('loyaldog') ? 0.6 : 1.2;
          Sound.bark();
          G.fx.push({ type: 'snipe', x1: p.x, y1: p.y, x2: best.x, y2: best.y, t: 0, life: 0.1 });
          spawnParticles(best.x, best.y, '#c98a5a', 5, 100);
          damageEnemy(best, 35 * (1 + 0.5 * elv('dog')) * abilityDmgMul(), {});
        }
      }
    } else if (p.kind === 'drone') {
      p.t += dt;
      p.x = G.squadX + p.side * 44 + Math.sin(p.t * 1.3) * 10;
      p.y = squadY - 74 + Math.sin(p.t * 2.1) * 7;
      p.cd -= dt;
      if (p.cd <= 0) {
        let best = null, bd = 1e9;
        for (const e of G.enemies) {
          if (e.y > p.y) continue;
          const d = Math.hypot(e.x - p.x, e.y - p.y);
          if (d < bd) { bd = d; best = e; }
        }
        if (!best && G.boss && G.boss.state === 'fight') best = G.boss;
        if (best) {
          p.cd = RL('swarm') ? 0.28 : 0.55;
          const dx = best.x - p.x, dy = best.y - p.y;
          const len = Math.hypot(dx, dy) || 1;
          G.bullets.push({ x: p.x, y: p.y, vx: dx / len * 700, vy: dy / len * 700, dmg: 14 * (1 + 0.35 * elv('drone')) * abilityDmgMul(), drone: true });
        }
      }
    }
  }

  // 地雷觸發
  for (let i = G.mines.length - 1; i >= 0; i--) {
    const m = G.mines[i];
    m.y += CONFIG.scrollSpeed * dt;
    m.t += dt;
    let hit = false;
    for (const e of G.enemies) {
      if (Math.hypot(e.x - m.x, e.y - m.y) < 30 + e.size * 0.3) { hit = true; break; }
    }
    if (hit) {
      Sound.boom();
      areaDamage(m.x, m.y, 95, m.dmg, '#ff9b3d');
      G.mines.splice(i, 1);
    } else if (m.y > H + 30) G.mines.splice(i, 1);
  }

  // FX 更新(迫擊砲落點爆炸)
  for (let i = G.fx.length - 1; i >= 0; i--) {
    const f = G.fx[i];
    f.t += dt;
    if (f.type === 'target') {
      f.y += CONFIG.scrollSpeed * dt * 0.35;
      if (f.t >= f.life) {
        Sound.boom();
        areaDamage(f.x, f.y, RL('clusterbomb') ? 160 : 100, f.dmg, '#ffb347');
        G.fx.splice(i, 1);
        continue;
      }
    }
    if (f.t >= f.life) G.fx.splice(i, 1);
  }
}

// ---------------- 更新邏輯 ----------------
const KEYS = { left: false, right: false };

function update(dt) {
  G.bgOffset = (G.bgOffset + CONFIG.scrollSpeed * dt) % 240;
  G.bgScroll += CONFIG.scrollSpeed * dt;
  if (G.shake > 0) G.shake = Math.max(0, G.shake - dt * 30);
  if (G.gateFlashT > 0) G.gateFlashT -= dt;
  if (G.badgePopT > 0) G.badgePopT -= dt;
  if (G.themeFadeT > 0) G.themeFadeT -= dt; // 主題過場 1s 漸變
  if (G.rushT > 0) G.rushT -= dt;
  if (G.hornT > 0) G.hornT -= dt;
  if (G.ambushT > 0) G.ambushT -= dt;
  if (G.frenzyT > 0) G.frenzyT -= dt;
  if (G.rodCd > 0) G.rodCd -= dt;
  if (G.hoverT > 0) { G.hoverT -= dt; if (G.hoverT <= 0) G.hoverRelic = null; }
  if (G.comboT > 0) { G.comboT -= dt; if (G.comboT <= 0) G.comboN = 0; }
  if (RL('shieldregen')) {
    G.shieldRegenT += dt;
    if (G.shieldRegenT >= 20) {
      G.shieldRegenT = 0;
      const capS = elv('shield') + (RL('fortify') ? 2 : 0);
      if (G.shield < capS) { G.shield++; addFloat(G.squadX, squadY - 44, '護盾回復', '#7ac9ff', 14); }
    }
  }

  // 鍵盤移動
  if (G.playerSlowT > 0) G.playerSlowT -= dt;
  const moveMul = G.playerSlowT > 0 ? 0.2 : 1; // 蛛網:移動減 80%
  if (KEYS.left) G.targetX -= 480 * dt * moveMul;
  if (KEYS.right) G.targetX += 480 * dt * moveMul;
  G.targetX = Math.max(laneL + 30, Math.min(laneR - 30, G.targetX));
  G.squadX += (G.targetX - G.squadX) * Math.min(1, dt * 14 * moveMul);

  // 推進距離 + 觸發事件
  if (!G.bossPhase) {
    G.dist += CONFIG.scrollSpeed * dt;
    while (G.eventIdx < G.events.length && G.events[G.eventIdx].at <= G.dist) {
      const ev = G.events[G.eventIdx++];
      if (ev.type === 'gate') spawnGatePair();
      else if (ev.type === 'wave') spawnWave();
      else if (ev.type === 'boss') spawnBoss();
    }
  }

  syncDots();
  for (const d of G.dots) {
    d.x += (d.tx - d.x) * Math.min(1, dt * 10);
    d.y += (d.ty - d.y) * Math.min(1, dt * 10);
    d.bob += dt * 9;
    if (d.fireT > 0) d.fireT -= dt;
  }
  // 隊伍轉向 tilt:按橫向速度傾側,上限 ±4.5°,平滑趨近
  const svx = dt > 0 ? (G.squadX - (G._prevSquadX === undefined ? G.squadX : G._prevSquadX)) / dt : 0;
  G._prevSquadX = G.squadX;
  const tiltTarget = Math.max(-1, Math.min(1, svx / 480)) * 0.078;
  G.squadTilt = (G.squadTilt || 0) + (tiltTarget - (G.squadTilt || 0)) * Math.min(1, dt * 12);

  // 開火
  const streams = Math.min(G.squad, CONFIG.maxFireStreams);
  const rushMul = G.rushT > 0 ? 2 : 1;
  let totemMul = 1;
  for (const e of G.enemies) if (e.totem) totemMul *= 0.6;
  let relicRate = 1;
  if (RL('rally') && G.bossPhase) relicRate *= 1.25;
  if (RL('warmup')) relicRate *= 1 + Math.min(0.6, (G.killCount || 0) * 0.02 / 10);
  const frenzyMul = (G.frenzyT > 0 ? 1.5 : 1) * totemMul * relicRate;
  let rate = streams * CONFIG.soldierFireRate * (1 + elv('rate') * 0.12) * G.runRateMul * rushMul * ACTIVE.rateMul * frenzyMul;
  // 齊射頻率上限:超出嘅火力轉化做每發傷害,子彈唔會因為過多而被刪走(修正射程變短 bug)
  let overflowMul = 1;
  if (rate > 120) { overflowMul = rate / 120; rate = 120; }
  const dmgScale = G.squad / Math.max(1, streams);
  const hornMul = G.hornT > 0 ? (1.3 + 0.05 * elv('horn')) : 1;
  const dmg = CONFIG.baseDamage * (1 + elv('dmg') * 0.25) * (1 + elv('big') * 0.05) * G.runDmgMul * hornMul * dmgScale * overflowMul * relicCombatMul();
  G.fireAcc += rate * dt;
  const sideLv = elv('side');
  const pierceLv = elv('pierce');
  while (G.fireAcc >= 1) {
    G.fireAcc -= 1;
    const src = G.dots.length ? G.dots[Math.floor(Math.random() * G.dots.length)] : { x: G.squadX, y: squadY };
    src.fireT = 0.06; // 武器 recoil + muzzle flash(drawSquad)
    let pierce = (pierceLv > 0 && Math.random() < 0.08 * pierceLv) ? 1 + Math.floor(pierceLv / 5) : 0;
    if (RL('juggernaut') || RL('m_dragon')) pierce = 999;
    else if (RL('ironpaw')) pierce = Math.max(pierce, 1);
    G.bullets.push({ x: src.x, y: src.y - 14, dmg, pierce, dragon: RL('m_dragon') });
    if (RL('doublevolley')) G.bullets.push({ x: src.x + 8, y: src.y - 14, dmg, pierce: 0 });
    if (RL('overwhelm')) for (let k = 0; k < 3; k++) G.bullets.push({ x: src.x + (k - 1) * 10, y: src.y - 14, dmg: dmg * 0.6, pierce: 0 });
    if (sideLv > 0) {
      const sdmg = dmg * (0.4 + 0.06 * sideLv);
      G.bullets.push({ x: src.x, y: src.y - 14, vx: -150, vy: -CONFIG.bulletSpeed * 0.9, dmg: sdmg });
      G.bullets.push({ x: src.x, y: src.y - 14, vx: 150, vy: -CONFIG.bulletSpeed * 0.9, dmg: sdmg });
    }
    Sound.shoot();
  }

  // 子彈
  const hitR = 0 + elv('big') * 2;
  for (let i = G.bullets.length - 1; i >= 0; i--) {
    const b = G.bullets[i];
    if (b.vx !== undefined) { b.x += b.vx * dt; b.y += b.vy * dt; }
    else {
      b.y -= CONFIG.bulletSpeed * dt;
      if (RL('homingrounds')) {
        let bn = null, bd = 130;
        for (const e of G.enemies) {
          if (e.y > b.y) continue;
          const d = Math.abs(e.x - b.x);
          if (d < bd) { bd = d; bn = e; }
        }
        if (bn) b.x += Math.sign(bn.x - b.x) * Math.min(Math.abs(bn.x - b.x), 220 * dt);
      }
    }
    if (b.y < -30 || b.x < -30 || b.x > W + 30 || b.y > H + 30) { G.bullets.splice(i, 1); continue; }
    let consumed = false;

    if (G.boss && G.boss.state !== 'enter') {
      const bs = G.boss;
      if (Math.abs(b.x - bs.x) < bs.size * 0.34 + hitR && Math.abs(b.y - bs.y) < bs.size * 0.3 + hitR) {
        let d2 = b.dmg;
        const critLv = elv('crit');
        if (!b.drone && critLv > 0 && Math.random() < 0.06 * critLv) { d2 *= 3; addFloat(b.x, b.y - 16, '暴擊!', '#ffd23d', 14); critPunch(); }
        hitBoss(d2);
        Sound.hit();
        spawnParticles(b.x, b.y, '#ffd23d', 2, 80);
        consumed = true;
      }
    }
    if (!consumed) {
      for (let j = G.enemies.length - 1; j >= 0; j--) {
        const e = G.enemies[j];
        const r = e.size * 0.42 + hitR;
        if (Math.abs(b.x - e.x) < r && Math.abs(b.y - e.y) < r) {
          Sound.hit();
          // 燃燒 / 冰凍(只限士兵子彈)
          if (!b.drone) {
            const bu = elv('burn');
            if (RL('infernal') || (bu > 0 && Math.random() < 0.12 * bu)) { e.burnT = 3; e.burnDps = 15 * (1 + 0.2 * bu) * (RL('toxicammo') ? 1.5 : 1); }
            const fr = elv('frost');
            if (RL('frostlord') || (fr > 0 && Math.random() < 0.10 * fr)) { e.slowT = 2; }
          }
          if (RL('ricochet') && Math.random() < 0.15) {
            let rn = null, rd = 260;
            for (const o of G.enemies) {
              if (o === e) continue;
              const d = Math.hypot(o.x - e.x, o.y - e.y);
              if (d < rd) { rd = d; rn = o; }
            }
            if (rn) {
              const dx = rn.x - e.x, dy = rn.y - e.y, len = Math.hypot(dx, dy) || 1;
              G.bullets.push({ x: e.x, y: e.y, vx: dx / len * 700, vy: dy / len * 700, dmg: b.dmg * 0.5, drone: true });
            }
          }
          damageEnemy(e, b.dmg, { canCrit: !b.drone });
          if (b.pierce && b.pierce > 0) { b.pierce--; }
          else consumed = true;
          break;
        }
      }
    }
    if (!consumed && b.vx === undefined) {
      for (const g of G.gates) {
        if (g.used || (g.kind !== 'count' && g.kind !== 'gem')) continue;
        if (b.x > g.x - g.w / 2 && b.x < g.x + g.w / 2 && b.y > g.y - g.h / 2 && b.y < g.y + g.h / 2) {
          g.hits++;
          if (g.hits >= g.nextHits) {
            g.hits = 0;
            g.nextHits += 1; // 輕度遞增,保持改良節奏
            g.v++;
            addFloat(g.x, g.y - 30, '+1', g.kind === 'gem' ? '#9fd8ff' : '#ffffff', 15);
          }
          consumed = true;
          break;
        }
      }
    }
    if (consumed) G.bullets.splice(i, 1);
  }

  // 門
  for (let i = G.gates.length - 1; i >= 0; i--) {
    const g = G.gates[i];
    g.y += CONFIG.scrollSpeed * dt;
    if (!g.used && g.y + g.h / 2 >= squadY && g.y - g.h / 2 <= squadY + 20) {
      if (G.squadX > g.x - g.w / 2 && G.squadX < g.x + g.w / 2) {
        g.used = true;
        applyGate(g);
        if (RL('doublebless') && gateIsGood(g) && Math.random() < 0.15) {
          addFloat(g.x, squadY - 66, '雙倍祝福!', TOKENS.GOLD, 17);
          applyGate(g);
        }
      }
    }
    if (g.y - g.h / 2 > H + 40) G.gates.splice(i, 1);
  }

  // 敵人
  const hw = squadHalfWidth();
  for (let i = G.enemies.length - 1; i >= 0; i--) {
    const e = G.enemies[i];
    e.wob += dt * 6;
    if (e.flash > 0) e.flash -= dt;
    if (e.hitT > 0) e.hitT -= dt;
    // 燃燒
    if (e.burnT > 0) {
      e.burnT -= dt;
      e.hp -= e.burnDps * dt;
      if (Math.random() < 0.15) spawnParticles(e.x, e.y, '#ff8c1d', 1, 60);
      if (e.hp <= 0) { killEnemy(e); continue; }
    }
    if (e.slowT > 0) e.slowT -= dt;
    if (e.ghostPhase > 0) e.ghostPhase -= dt;
    {
      const slowMul = e.slowT > 0 ? 0.5 : 1;
      // 薩滿:去到中場停低施法
      if (e.totem) { e.wob += dt; continue; } // 圖騰唔郁
      const holding = e.move === 'caster' && e.y > H * 0.30;
      const auraMul = (RL('watchtower') && e.y > squadY - 240) ? 0.7 : 1;
      e.y += ((holding ? 0 : e.speed * slowMul * auraMul) + CONFIG.scrollSpeed * (holding ? 0.12 : 0.35)) * dt;
      if (e.homing && !holding && !RL('fearaura')) {
        const dx = G.squadX - e.x;
        e.x += Math.sign(dx) * Math.min(Math.abs(dx), e.homing * slowMul * dt);
      }
      if (e.move === 'zig') e.x += Math.sin(e.wob * 1.6) * 80 * dt;
      if (e.move === 'ghost') e.x += Math.sin(e.wob * 0.9) * 50 * dt;
      e.x = Math.max(laneL + 20, Math.min(laneR - 20, e.x));
      if (e.move === 'caster') {
        if (e.castCd === undefined) e.castCd = 0; // 出場即射
        e.castCd -= dt;
        if (e.castCd <= 0 && e.y > 40 && e.y < squadY - 120) {
          e.castCd = 1.2 + Math.random() * 0.8; // 更頻密發炮
          const dx = G.squadX - e.x, dy = squadY - e.y;
          const len = Math.hypot(dx, dy) || 1;
          G.fireballs.push({ x: e.x, y: e.y + e.size * 0.3, vx: dx / len * 240, vy: dy / len * 240, bite: Math.max(1, Math.floor(e.bite / 2)), t: 0, small: true });
          Sound.fireball();
        }
      }
      // 小怪繼承同家族 Boss 機制嘅迷你版
      if (!e.totem && e.y > 20 && e.y < squadY - 80) {
        if (e.mechCd === undefined) {
          // 會召喚更多怪嘅小怪(骷髏、史萊姆、哥布林)唔好一出場就開技能,
          // 否則第一關就會爆量。改成有一段初始延遲。
          const isSummoner = (e.fam === 'skeleton' || e.fam === 'slime' || e.fam === 'goblin');
          e.mechCd = isSummoner ? (5 + Math.random() * 5) : 0;
        }
        e.mechCd -= dt;
        if (e.mechCd <= 0) {
          e.mechCd = 7 + Math.random() * 7;
          miniMonsterMech(e);
        }
      }
    }
    if (e.y > squadY - 22 && Math.abs(e.x - G.squadX) < hw + e.size * 0.3) {
      spawnParticles(e.x, e.y, '#ff5a3d', 8);
      damageSquad(e.bite, e.x, e.y);
      G.enemies.splice(i, 1);
      continue;
    }
    if (e.y > H + 60) G.enemies.splice(i, 1);
  }

  if (G.boss) updateBoss(G.boss, dt);

  // 火球(敵方 + 友方火箭)
  for (let i = G.fireballs.length - 1; i >= 0; i--) {
    const f = G.fireballs[i];
    f.x += f.vx * dt; f.y += f.vy * dt;
    f.t += dt;
    if (f.friendly) {
      if ((f.ty !== undefined && Math.hypot(f.x - f.tx, f.y - f.ty) < 26) || f.y < -20 || f.x < laneL - 40 || f.x > laneR + 40) {
        Sound.boom();
        areaDamage(f.x, f.y, f.aoe, f.dmg, '#ffb347');
        G.fireballs.splice(i, 1);
      }
      continue;
    }
    if (f.zone && f.y >= squadY - 8 && !f.zoned) {
      f.zoned = true;
      // 燃燒地帶生成喺隊伍水平線,範圍細(半徑 34)但外觀鮮明
      G.zones.push({ x: f.x, y: squadY, r: 34, t: 0, life: 4, dps: 3 });
    }
    if (f.y >= squadY - 10) {
      if (f.web) {
        if (Math.abs(f.x - G.squadX) < hw + 12) { G.playerSlowT = 3; addFloat(G.squadX, squadY - 34, '被纏住!移動 -80%', '#c9a4ff', 15); }
        spawnParticles(f.x, squadY, '#c9a4ff', 10, 160);
        G.fireballs.splice(i, 1);
        continue;
      }
      spawnParticles(f.x, squadY, '#ff8c1d', 14, 220);
      Sound.enemyDie();
      if (Math.abs(f.x - G.squadX) < hw + 46) {
        if (RL('lightningrod') && G.rodCd <= 0) {
          G.rodCd = 10;
          Sound.shieldHit();
          addFloat(f.x, squadY - 34, '避雷針格擋!', '#7ac9ff', 16);
        } else {
          let bite = f.bite;
          if (RL('dragoncharm')) bite = Math.max(1, Math.ceil(bite / 2));
          damageSquad(bite, f.x, squadY);
        }
      }
      G.fireballs.splice(i, 1);
    } else if (f.y > H + 40) G.fireballs.splice(i, 1);
  }

  // 震波(泰坦魔像):橫向掃過,只有缺口安全
  for (let i = G.waves.length - 1; i >= 0; i--) {
    const wv = G.waves[i];
    wv.y += wv.speed * dt;
    if (!wv.hit && wv.y >= squadY - 16 && wv.y <= squadY + 20) {
      wv.hit = true;
      if (G.squadX < wv.gapX - wv.gapW / 2 || G.squadX > wv.gapX + wv.gapW / 2) {
        damageSquad(18, G.squadX, squadY); // 泰坦魔像震波傷害 x3(6 -> 18)
        G.shake = 6;
      } else {
        addFloat(G.squadX, squadY - 40, '閃過!', '#8affc1', 16);
      }
    }
    if (wv.y > H + 30) G.waves.splice(i, 1);
  }
  // 燃燒地帶(深淵魔龍)
  for (let i = G.zones.length - 1; i >= 0; i--) {
    const z = G.zones[i];
    z.t += dt;
    if (z.t >= z.life) { G.zones.splice(i, 1); continue; }
    if (Math.abs(G.squadX - z.x) < z.r) {
      z.tick = (z.tick || 0) + dt;
      if (z.tick >= 0.5) { z.tick = 0; damageSquad(z.dps, G.squadX, squadY); }
    }
  }

  // 金幣
  const magnetLv = elv('magnet');
  for (let i = G.coins.length - 1; i >= 0; i--) {
    const cn = G.coins[i];
    cn.t += dt;
    if (cn.t < 0.45) {
      cn.vy += 400 * dt;
      cn.x += cn.vx * dt; cn.y += cn.vy * dt + CONFIG.scrollSpeed * dt * 0.3;
    } else {
      const tx = 74, ty = 54;
      const sp = 6.5 + magnetLv * 1.5;
      cn.x += (tx - cn.x) * Math.min(1, dt * sp);
      cn.y += (ty - cn.y) * Math.min(1, dt * sp);
      if (Math.abs(cn.x - tx) < 14 && Math.abs(cn.y - ty) < 14) {
        SAVE.coins += cn.v;
        G.killsCoins += cn.v;
        if (cn.big) Sound.chest(); else Sound.coin();
        G.coins.splice(i, 1);
      }
    }
  }
  if (G.coins.length && Math.random() < 0.02) persistSave();

  // 晶石飛向右上角
  for (let i = G.gemDrops.length - 1; i >= 0; i--) {
    const gm = G.gemDrops[i];
    gm.t += dt;
    if (gm.t < 0.5) {
      gm.vy += 380 * dt;
      gm.x += gm.vx * dt; gm.y += gm.vy * dt + CONFIG.scrollSpeed * dt * 0.3;
    } else {
      const tx = 26, ty = 80;
      gm.x += (tx - gm.x) * Math.min(1, dt * 7);
      gm.y += (ty - gm.y) * Math.min(1, dt * 7);
      if (Math.abs(gm.x - tx) < 16 && Math.abs(gm.y - ty) < 16) {
        SAVE.gems++;
        G.gemsThisLevel = (G.gemsThisLevel || 0) + 1;
        Sound.coin();
        persistSave();
        G.gemDrops.splice(i, 1);
      }
    }
  }

  updateAbilities(dt);

  // 粒子 / 浮字
  for (let i = G.parts.length - 1; i >= 0; i--) {
    const p = G.parts[i];
    p.t += dt;
    if (p.t >= p.life) { G.parts.splice(i, 1); continue; }
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += 300 * dt;
  }
  for (let i = G.floats.length - 1; i >= 0; i--) {
    const f = G.floats[i];
    f.t += dt;
    const p = Math.min(1, f.t / 0.4);              // 浮起 400ms
    f.y = f.y0 - f.rise * (1 - Math.pow(1 - p, 3)); // easeOut
    if (f.t >= f.life) G.floats.splice(i, 1);
  }
}

// 過門一刻:40ms 全屏閃(綠門白閃/紅門紅閃)
function gateFlash(good) {
  G.gateFlashT = 0.04;
  G.gateFlashGood = good;
  punch();
}

// 後處理節奏感:hitstop 40ms(凍結 update,render 照行)+ zoom punch(1.02 回彈 180ms)
function punch() {
  G.hitstopT = Math.max(G.hitstopT, 0.04);
  G.zoomT = 0.18;
}
// 爆擊 punch:1.2s 冷卻 — 高爆擊率 build(全知之眼)每發都爆,冇冷卻會變持續 strobe
function critPunch() {
  if (G.critCd > 0) return;
  G.critCd = 1.2;
  punch();
}

function applyGate(g) {
  const bless = elv('bless');
  const nego = elv('nego');
  if (g.kind === 'count') {
    let v = g.v;
    if (v > 0 && bless > 0) v += bless;
    if (v > 0 && RL('greenfaith')) v += 2;
    if (v < 0 && RL('diplomat')) v = Math.round(v * 0.7);
    if (v < 0 && nego > 0) v = Math.round(v * Math.max(0, 1 - 0.08 * nego));
    changeSquad(v);
    G.badgePopT = 0.22; // 隊伍數字 badge pop
    gateFlash(v >= 0);
    addFloat(g.x, squadY - 40, (v >= 0 ? '+' : '') + v + ' 士兵', v >= 0 ? TOKENS.GATE_GREEN : TOKENS.GATE_RED, 22);
    v >= 0 ? Sound.gateGood() : Sound.gateBad();
  } else if (g.kind === 'gem') {
    gateFlash(g.v > 0);
    if (g.v > 0) {
      SAVE.gems += g.v;
      G.gemsThisLevel = (G.gemsThisLevel || 0) + g.v;
      persistSave();
      addFloat(g.x, squadY - 40, '+' + g.v + ' 💎晶石', '#9fd8ff', 20);
      Sound.gateGood();
    } else {
      addFloat(g.x, squadY - 40, '+0 💎(射擊可增加)', '#8a9aa8', 16);
      Sound.gateBad();
    }
  } else if (g.kind === 'up') {
    gateFlash(true);
    G.tempUp[g.id] = (G.tempUp[g.id] || 0) + 1;
    if (g.id === 'shield') G.shield++;
    if (g.id === 'dog' || g.id === 'drone') buildPets();
    addFloat(g.x, squadY - 40, ITEM_NAME[g.id] + ' +1(本次)', '#d4b8ff', 18);
    Sound.gateGood();
  } else if (g.kind === 'dmg') {
    gateFlash(true);
    G.runDmgMul += g.v;
    addFloat(g.x, squadY - 40, '火力 +25%', TOKENS.GOLD, 20);
    Sound.gateGood();
  } else if (g.kind === 'rate') {
    gateFlash(true);
    G.runRateMul += g.v;
    addFloat(g.x, squadY - 40, '射速 +25%', TOKENS.GOLD, 20);
    Sound.gateGood();
  }
}

// ---------------- Boss AI(5 種行為) ----------------
function bossShoot(b, tx, ty, speed, bite, zone) {
  const dx = tx - b.x, dy = ty - b.y;
  const len = Math.hypot(dx, dy) || 1;
  const nm = RL('heavynet') ? 0.7 : 1;
  G.fireballs.push({ x: b.x, y: b.y + b.size * 0.25, vx: dx / len * speed * nm, vy: dy / len * speed * nm, bite, t: 0, zone: zone || false });
  Sound.fireball();
}

function updateBoss(b, dt) {
  b.t += dt;
  if (b.flash > 0) b.flash -= dt;
  // Boss 攻擊力隨關卡遞增(L1≈2, L10≈8, L20≈14),再乘個別 Boss 嘅 atkMul
  const bite = Math.max(1, Math.round((2 + Math.floor(G.level * 0.6)) * (b.spec.atkMul || 1)));
  const fbSpeed = 300 + G.level * 12;

  if (b.state === 'enter') {
    b.y += (b.ty - b.y) * Math.min(1, dt * 1.6);
    if (Math.abs(b.y - b.ty) < 6) b.state = 'fight';
  } else if (b.state === 'fight') {
    // 走位:近戰型(charge)保留原本邏輯;其餘 Boss 隨機前後左右徘徊,但唔過分埋身
    if (b.beh === 'charge') {
      // 衝鋒型:唔喺度做通用移動(由 charge 邏輯控制)
    } else {
      // 隨機遊走目標點,維持喺畫面上半、離隊伍有安全距離
      if (b.wanderCd === undefined || b.wanderCd <= 0) {
        b.wanderCd = 1.5 + Math.random() * 2;
        b.wx = laneL + b.size * 0.4 + Math.random() * (laneW - b.size * 0.8);
        // 只喺畫面最頂徘徊
        const minY = Math.max(100, H * 0.13);
        const maxY = Math.max(minY + 30, H * 0.28);
        b.wy = minY + Math.random() * (maxY - minY);
      }
      b.wanderCd -= dt;
      b.x += (b.wx - b.x) * Math.min(1, dt * 1.6);
      b.y += (b.wy - b.y) * Math.min(1, dt * 1.6);
      b.x = Math.max(laneL + b.size * 0.3, Math.min(laneR - b.size * 0.3, b.x));
      // 硬上限:任何情況都留喺畫面上部(唔會超過 30% 高度)
      const capY = Math.max(H * 0.3, b.ty);
      if (b.y > capY) b.y = capY;
    }
    const enr = b.enrage ? 0.5 : 1;
    b.fireCd -= dt / enr;
    b.atkCd -= dt / enr;
    b.mechCd -= dt;

    // ===== 各 Boss 獨立機制 =====
    if (b.spec.mech === 'looter' && b.mechCd <= 0) {
      b.mechCd = 3;
      spawnCoins(b.x, b.y + b.size * 0.3, 5);
      addFloat(b.x, b.y + 50, '跌錢!', TOKENS.GOLD, 13);
    } else if (b.spec.mech === 'split') {
      // 每跌 1/3 血:母體自己縮細,並分裂出 1 隻大史萊姆(最多分裂 2 次)
      // 唔再縮減 hpMax,避免血條回彈(睇落好似回血)
      if (b.splitAt.length && b.hp < b.hpMax * b.splitAt[0]) {
        b.splitAt.shift();
        b.splitGen = (b.splitGen || 0) + 1;
        Sound.enemyDie();
        addFloat(b.x, b.y, '分裂!', '#8fdc5a', 20);
        spawnParticles(b.x, b.y, '#8fdc5a', 20, 200);
        b.size *= 0.8;
        spawnSlimeSpawn(b);
      }
    } else if (b.spec.mech === 'enrage' && !b.enrage && b.hp < b.hpMax * 0.5) {
      b.enrage = true;
      Sound.roar();
      addFloat(b.x, b.y, '狂暴!!', '#ff4d3d', 24);
      G.shake = 8;
    } else if (b.spec.mech === 'phase') {
      b.phaseT += dt;
      // 冷卻 4 秒(唔虛化)-> 虛化 3 秒 -> 虛化完先重新計 CD
      if (!b.phased && b.phaseT >= 4) { b.phased = true; b.phaseT = 0; addFloat(b.x, b.y, '虛化', '#b8d4ff', 16); }
      else if (b.phased && b.phaseT >= 3) { b.phased = false; b.phaseT = 0; }
    } else if (b.spec.mech === 'web' && b.mechCd <= 0) {
      b.mechCd = 3.5;
      const dx = G.squadX - b.x, dy = squadY - b.y, len = Math.hypot(dx, dy) || 1;
      G.fireballs.push({ x: b.x, y: b.y + b.size * 0.25, vx: dx / len * 340, vy: dy / len * 340, bite: 0, t: 0, web: true });
    } else if (b.spec.mech === 'quake' && b.mechCd <= 0) {
      b.mechCd = 3.2;
      Sound.boom();
      G.shake = 5;
      G.waves.push({ y: b.y + b.size * 0.3, gapX: laneL + 60 + Math.random() * (laneW - 120), gapW: 90, speed: 300, hit: false });
      addFloat(b.x, b.y + 50, '震波!搵缺口!', '#ffb347', 15);
    } else if (b.spec.mech === 'totem' && b.mechCd <= 0) {
      b.mechCd = 1.6; // 頻率 x5(8 -> 1.6)
      const hpMul = enemyHpMul();
      G.enemies.push({
        id: null, fam: 'shaman', name: '詛咒圖騰', move: 'totem', totem: true,
        x: laneL + 50 + Math.random() * (laneW - 100), y: 120 + Math.random() * (H * 0.3),
        hp: 180 * hpMul, hpMax: 180 * hpMul,
        speed: 0, bite: 0, coin: 3, size: 46, homing: 0, bar: true,
        hue: 280, sat: 1.5, flash: 0, wob: 0, burnT: 0, burnDps: 0, slowT: 0, tier: 0,
      });
      addFloat(W / 2, H * 0.3, '詛咒圖騰:射速被壓制!', '#d4b8ff', 16);
    }

    if (b.beh === 'fire') {
      if (b.fireCd <= 0) {
        // 深淵魔龍:火球 CD x3
        b.fireCd = Math.max(0.18, 0.32 - G.level * 0.01) * (b.id === 'b_imp' ? 3 : 1);
        bossShoot(b, G.squadX, squadY, fbSpeed, bite, b.spec.mech === 'burnzone' && Math.random() < 0.15);
      }
    } else if (b.beh === 'inferno') {
      if (b.fireCd <= 0) {
        b.fireCd = Math.max(0.40, 0.72 - G.level * 0.02);
        bossShoot(b, G.squadX - 70, squadY, fbSpeed * 1.35, bite);
        bossShoot(b, G.squadX + 70, squadY, fbSpeed * 1.35, bite);
      }
    } else if (b.beh === 'slam') {
      if (b.atkCd <= 0) {
        b.atkCd = Math.max(0.90, 1.6 - G.level * 0.04);
        G.shake = 6;
        Sound.boom();
        for (const off of [-0.45, 0, 0.45]) {
          const tx = b.x + off * laneW;
          bossShoot(b, tx, H + 50, fbSpeed * 0.85, bite + 2);
        }
      }
    } else if (b.beh === 'summon') {
      const isSkKing = b.id === 'b_skeleton';
      const isSlimeMom = b.id === 'b_slime';
      if (b.atkCd <= 0) {
        // 骷髏君王:召喚頻率減半(CD x2);史萊姆之母:召喚 CD 改成 3 倍(x3 慢)
        let base = Math.max(0.48, 0.8 - G.level * 0.02);
        if (isSkKing) base *= 2;
        else if (isSlimeMom) base *= 3;
        b.atkCd = base;
        Sound.roar();
        addFloat(b.x, b.y + 60, '召喚!', '#b8d4ff', 16);
        const tier = Math.min(4, Math.floor((G.level - 1) / 5));
        const fam = b.spec.minion || 'skeleton';
        for (let i = 0; i < 3; i++) {
          spawnMinion('m_' + fam + tier, b.x + (i - 1) * 90, b.y + 60 + Math.random() * 40);
        }
      }
      if (b.fireCd <= 0) {
        // 骷髏君王:火球密度減至 1/4(CD x4)
        b.fireCd = isSkKing ? 0.56 * 4 : 0.56;
        bossShoot(b, G.squadX, squadY, fbSpeed * 0.9, bite);
      }
    } else if (b.beh === 'volley') {
      if (b.atkCd <= 0) {
        // 深淵母蛛:火球(齊射)CD x3
        b.atkCd = Math.max(0.84, 1.5 - G.level * 0.036) * (b.id === 'b_spider' ? 3 : 1);
        Sound.fireball();
        for (const a of [-0.45, -0.22, 0, 0.22, 0.45]) {
          G.fireballs.push({ x: b.x, y: b.y + b.size * 0.25, vx: Math.sin(a) * fbSpeed, vy: Math.cos(a) * fbSpeed, bite, t: 0 });
        }
      }
    } else if (b.beh === 'blink') {
      if (b.atkCd <= 0) {
        b.atkCd = Math.max(1.32, 2.14 - G.level * 0.052);
        spawnParticles(b.x, b.y, '#b8d4ff', 14, 200);
        b.x = laneL + b.size * 0.3 + Math.random() * (laneW - b.size * 0.6);
        spawnParticles(b.x, b.y, '#b8d4ff', 14, 200);
        addFloat(b.x, b.y - 40, '瞬移!', '#b8d4ff', 15);
        // 幽靈之王:虛化時只放 1 發;平時隨機 2-5 發散射
        const shots = b.phased ? 1 : (2 + Math.floor(Math.random() * 4));
        if (shots === 1) {
          bossShoot(b, G.squadX, squadY, fbSpeed * 1.1, bite);
        } else {
          const spread = 0.16;
          for (let i = 0; i < shots; i++) {
            const off = (i - (shots - 1) / 2) * spread;
            const dx = G.squadX - b.x, dy = squadY - (b.y + b.size * 0.25);
            const ang = Math.atan2(dy, dx) + off;
            G.fireballs.push({
              x: b.x, y: b.y + b.size * 0.25,
              vx: Math.cos(ang) * fbSpeed * 1.1, vy: Math.sin(ang) * fbSpeed * 1.1,
              bite, t: 0,
            });
          }
          Sound.fireball();
        }
      }
    } else if (b.beh === 'charge') {
      if (b.atkCd <= 0 && !b.chargeStage) {
        b.atkCd = Math.max(2.8, 4.8 - G.level * 0.12) * (b.spec.cdMul || 1) * (b.enrage ? 0.5 : 1);
        b.chargeStage = 'warn';
        b.chargeT = 0.6;                                  // 警示時間,俾玩家反應
        b.chargesLeft = (b.spec.charges || 1) - 1;
        b.chargeTX = G.squadX;                            // 鎖定發動一刻嘅位置 -> 可以閃避
        Sound.roar();
        addFloat(b.x, b.y + 50, '衝鋒!', '#ff9b3d', 18);
      }
      if (b.chargeStage) {
        b.chargeT -= dt;
        if (b.chargeStage === 'warn') {
          if (b.chargeT <= 0) { b.chargeStage = 'dash'; b.chargeT = 1.2; }
        } else if (b.chargeStage === 'dash') {
          const spd = b.enrage ? 1280 : 640; // 狂暴後衝速再 x2
          b.y += spd * dt;
          const dx = b.chargeTX - b.x;
          b.x += Math.sign(dx) * Math.min(Math.abs(dx), spd * 0.7 * dt);
          if (b.y >= squadY - b.size * 0.25 || b.chargeT <= 0) { b.chargeStage = 'back'; b.chargeT = 0.55; }
        } else { // back
          b.y += (b.ty - b.y) * Math.min(1, dt * 4);
          if (b.chargeT <= 0) {
            if (b.chargesLeft > 0) { // 冥府狼王:二連衝
              b.chargesLeft--;
              b.chargeStage = 'warn'; b.chargeT = 0.5;
              b.chargeTX = G.squadX;
              addFloat(b.x, b.y + 50, '再衝!', '#ff9b3d', 16);
            } else b.chargeStage = null;
          }
        }
      }
    }

    // Boss 掂到隊伍先咬兵:縱向 + 橫向都要重疊(閃開就唔扣)
    const contactY = b.y + b.size * 0.35 > squadY - 20;
    const contactX = Math.abs(b.x - G.squadX) < b.size * 0.4 + squadHalfWidth();
    if (contactY && contactX) {
      if (!b.biteCd || b.biteCd <= 0) {
        b.biteCd = 0.5;
        damageSquad((b.enrage ? 2.4 : 1) * (3 + Math.floor(G.level * 0.5)), b.x, squadY); // 接觸傷害隨關卡,狂暴大增
        G.shake = 6;
      } else b.biteCd -= dt;
    } else if (b.biteCd > 0) b.biteCd -= dt;
  } else if (b.state === 'die') {
    b.t2 = (b.t2 || 0) + dt;
    if (Math.random() < 0.4) spawnParticles(b.x + Math.random() * b.size - b.size / 2, b.y + Math.random() * b.size * 0.6 - b.size * 0.3, '#ff8c1d', 4, 120);
    if (b.t2 > 1.1) {
      G.boss = null;
      startRelicPick();
    }
  }
}

  if (RL('trophyhunter')) { G.runDmgMul += 0.1; addFloat(b.x, b.y - 80, '戰利品獵人:攻擊+10%', TOKENS.GOLD, 15); }

      G.coins.push({ x: b.x + (Math.random() - 0.5) * 160, y: b.y + (Math.random() - 0.5) * 80, v: Math.round(15 * G.level * (RL('chestking') ? 2 : 1)), t: 0, vy: -80, vx: (Math.random() - 0.5) * 100, big: true });
    }
  }
  spawnParticles(b.x, b.y, '#ffd23d', 30, 260);
  if (!SAVE.dex[b.id]) { SAVE.dex[b.id] = 1; addFloat(b.x, b.y - 60, '圖鑑登錄!', '#b8d4ff', 16); }

const $ = id => document.getElementById(id);
const overlay = $('overlay');
const screens = { menu: $('scr-menu'), shop: $('scr-shop'), dex: $('scr-dex'), clear: $('scr-clear'), over: $('scr-over'), pause: $('scr-pause'), relic: $('scr-relic'), relicdex: $('scr-relicdex'), catdex: $('scr-catdex'), gacha: $('scr-gacha'), relicshop: $('scr-relicshop') };

function showScreen(name) {
  overlay.classList.toggle('hidden', !name);
  for (const k of Object.keys(screens)) screens[k].classList.toggle('hidden', k !== name);
  if (name) staggerButtons(screens[name]);

// 選單進場:按鈕逐個 fade-in,每個延遲 40ms
function staggerButtons(scr) {
  scr.querySelectorAll('.btn').forEach((b, i) => {
    b.classList.remove('stagger');
    void b.offsetWidth; // 強制 reflow,令重開同一畫面都會重播動畫
    b.style.animationDelay = (i * 40) + 'ms';
    b.classList.add('stagger');
  });
}
overlay.addEventListener('animationend', e => {
  if (e.target.classList && e.target.classList.contains('stagger')) {
    e.target.classList.remove('stagger'); // 播完即除,交還 transform 俾 :active 用
    e.target.style.animationDelay = '';
  }
});

function setState(s) {
  G.state = s;
  if (s === 'play') showScreen(null);
  else if (s === 'menu') { refreshMenu(); showScreen('menu'); }
  else if (s === 'pause') showScreen('pause');
  else if (s === 'clear') showScreen('clear');
  else if (s === 'over') showScreen('over');
}

function refreshMenu() {
  $('menu-best').textContent = SAVE.maxLevel > 0
    ? `最高紀錄:第 ${SAVE.maxLevel} 關・金幣 ${SAVE.coins}`
    : `金幣 ${SAVE.coins}`;
}

// ---------------- Boss 遺物三選一 ----------------
let pickState = null; // { picksLeft, rerollLeft }
function rollTier() {
  const L = G.level;
  const w = [Math.max(12, 55 - L * 3), 30, Math.min(32, 6 + L * 1.6), Math.min(18, L * 1.0)];
  let total = 0;
  for (const x of w) total += x;
  let r = Math.random() * total, idx = 0;
  for (let i = 0; i < 4; i++) { r -= w[i]; if (r <= 0) { idx = i; break; } }
  if (RL('starguide') && idx < 3 && Math.random() < 0.3) idx++;
  return idx;
}
function availableRelics() {
  const taken = new Set(G.runRelics);
  return RELICS.filter(r => !taken.has(r.id) && r.t < 4);
}
function rollRelicOptions(n) {
  const pool = availableRelics();
  const out = [];
  for (let i = 0; i < n && pool.length; i++) {
    let tier = rollTier();
    let cand = pool.filter(r => r.t === tier && !out.includes(r));
    while (!cand.length && tier >= 0) { tier--; cand = pool.filter(r => r.t === tier && !out.includes(r)); }
    if (!cand.length) cand = pool.filter(r => !out.includes(r));
    if (!cand.length) break;
    out.push(cand[Math.floor(Math.random() * cand.length)]);
  }
  return out;
}
function startRelicPick() {
  const n = RL('greedhand') ? 4 : 3;
  const options = rollRelicOptions(n);
  if (!options.length) { levelClear(); return; }
  pickState = { picksLeft: RL('doublepick') ? 2 : 1, rerollLeft: RL('reforge') ? 1 : 0 };
  renderRelicPick(options);
  G.state = 'relic';
  showScreen('relic');
  Sound.win();
}
function renderRelicPick(options) {
  $('relic-pick-sub').textContent = pickState.picksLeft > 1
    ? `複製水晶:可以揀 ${pickState.picksLeft} 件遺物`
    : '揀選一件遺物(死亡後會消失)';
  const wrap = $('relic-options');
  wrap.innerHTML = '';
  for (const r of options) {
    const card = document.createElement('button');
    card.className = 'relic-card tier' + r.t;
    card.innerHTML = `<span class="r-tier">${TIER_NAMES[r.t]}</span><span class="r-ico">${r.e}</span><b>${r.n}</b><span class="r-desc">${r.d}</span>`;
    card.onclick = () => {
      G.runRelics.push(r.id);
      if (!SAVE.relicDex[r.id]) { SAVE.relicDex[r.id] = 1; addFloat(W / 2, H * 0.3, '遺物圖鑑登錄!', '#b8d4ff', 16); }
      recalcRelics();
      if (r.u && (r.u[0] === 'dog' || r.u[0] === 'drone')) buildPets();
      Sound.gateGood();
      pickState.picksLeft--;
      const remaining = options.filter(o => o !== r);
      if (pickState.picksLeft > 0 && remaining.length) {
        renderRelicPick(remaining);
      } else {
        pickState = null;
        levelClear();
      }
    };
    wrap.appendChild(card);
  }
  $('btn-relic-reroll').style.display = pickState.rerollLeft > 0 ? 'block' : 'none';
}
$('btn-relic-reroll').onclick = () => {
  if (!pickState || pickState.rerollLeft <= 0) return;
  pickState.rerollLeft--;
  Sound.coin();
  renderRelicPick(rollRelicOptions(RL('greedhand') ? 4 : 3));
};
$('btn-relic-skip').onclick = () => { pickState = null; levelClear(); };

function levelClear() {
  if (RL('banker')) {
    const interest = Math.min(500, Math.floor(SAVE.coins * 0.02));
    if (interest > 0) { SAVE.coins += interest; G.killsCoins += interest; }
  }
  if (G.level > SAVE.maxLevel) SAVE.maxLevel = G.level;
  persistSave();
  Sound.win();
  $('clear-info').innerHTML = `第 ${G.level} 關完成!<br><span class="stat-line">本關金幣 ${G.killsCoins}・晶石 💎${G.gemsThisLevel || 0}<br>現有金幣 ${SAVE.coins}・晶石 💎${SAVE.gems}</span>`;
  setState('clear');
}

function gameOver() {
  persistSave();
  Sound.lose();
  $('over-info').innerHTML = `捱到第 ${G.level} 關<br><span class="stat-line">本關收集金幣 ${G.killsCoins}・現有金幣 ${SAVE.coins}</span>`;
  setState('over');
}

function drawCanvasSprite(spr, x, y, w, h, flash) {
  if (!spr) return;
  if (flash) ctx.filter = 'brightness(2.6)';
  ctx.drawImage(spr, x - w / 2, y - h / 2, w, h);
  if (flash) ctx.filter = 'none';
}
function drawSprite(key, x, y, w, h, flash) {
  drawCanvasSprite(SPRITES[key], x, y, w, h, flash);
}

// ---------------- 戰場背景(全部 pre-render 落 offscreen canvas,維持 60fps)----------------
const GROUND_TILE_H = 240; // 磚地垂直週期(120px 磚 + 交錯 → 240 才真正無縫)
function _hexRgb(h) {
  if (h[0] === 'r') return h.match(/\d+/g).slice(0, 3).map(Number); // 'rgb(r,g,b)' 形式(_mix 鏈嵌套用)
  h = h.replace('#', ''); return [parseInt(h.slice(0, 2), 16), parseInt(h.slice(2, 4), 16), parseInt(h.slice(4, 6), 16)];
}
function _mix(a, b, t) { const A = _hexRgb(a), B = _hexRgb(b); return `rgb(${Math.round(A[0] + (B[0] - A[0]) * t)},${Math.round(A[1] + (B[1] - A[1]) * t)},${Math.round(A[2] + (B[2] - A[2]) * t)})`; }
const _cl = v => v < 0 ? 0 : v > 255 ? 255 : v;
const _rgba = (c, a) => { const [r, g, b] = _hexRgb(c); return `rgba(${r},${g},${b},${a})`; };

// ============ 環境主題系統(ENV_THEMES.md 落地:每 5 關一主題,全部由現有 tokens 派生)============

  const T = TOKENS;
  const STEEL = '#5a6472', T1BLUE = '#2a5580', T2PURP = '#5e3080', HALO = '#a856f0';
  const EMBER = _mix(T.CTA_HI, T.BG_DEEP, 0.30); // 餘燼橙(D2:CTA 環境放寬只准呢個降飽和版)
  return [
    { name: '叢林前哨', base: T.FIELD_BASE, line: T.FIELD_LINE,
      haze: _rgba('rgb(150,168,140)', 0.06), // 現狀基線值
      moss: _mix(T.FIELD_BASE, T.GATE_GREEN, 0.13),
      seed: 555, props: ['vine', 'fence', 'flag', 'torch'] },
    { name: '骸骨荒原', base: _mix(_mix(T.FIELD_BASE, T.TEXT_LOW, 0.35), T.CTA_LO, 0.08),
      line: _mix(T.FIELD_LINE, T.CTA_LO, 0.10),
      haze: _rgba(_mix(T.TEXT_LOW, T.CTA_LO, 0.25), 0.07),
      moss: _mix(_mix(T.FIELD_BASE, T.TEXT_LOW, 0.35), T.CTA_LO, 0.22), // 乾苔偏塵

// L1–30 順序行 ①–⑥;L31+ 循環 ②–⑥(D5:叢林係新手基線,唔輪迴)
function themeForLevel(level) {
  const block = Math.floor((level - 1) / 5);
  return block <= 5 ? block : 1 + (block - 1) % 5;
}

const BG = {
  ready: false, ground: null, side: null, overlay: null, sideH: 0, sideW: 0,
  themeIndex: -1, torches: [], // torches:火把/火盆焰心(side tile 座標),runtime flicker glow 用
  prev: null, // 主題過場:上一主題 {ground, side, overlay, sideH, torches},1s 淡出後棄
};

// (1a) 石板細節層 SVG:裂紋 + 青苔(可平鋪:主 group 用 <use> 喺 ±h 各畫一次保證上下無縫)
// 逐主題變色:裂紋用 line 加深版、青苔用 theme.moss;熔岩主題磚縫透餘燼(emberCracks)
function groundDetailSVG(theme, w) {
  const h = GROUND_TILE_H, cols = 4, rowH = 120;
  const rnd = mulberry32(theme.seed * 7 + 101);
  const crackCol = _mix(theme.line, TOKENS.BG_DEEP, 0.35);
  let el = '';
  // 裂紋:由磚縫交叉點出發嘅折線隨機游走,每 tile 3-4 條;
  // 收短收淡(≤4 段 × ≤22px)— 長紋會跨 tile 駁成「全屏閃電」,實測要避
  const nCracks = 3 + Math.floor(rnd() * 2);
  for (let i = 0; i < nCracks; i++) {
    let cx = (Math.floor(rnd() * cols) + (rnd() < 0.5 ? 0.5 : 0)) * w / cols;
    let cy = Math.floor(rnd() * 2) * rowH + rnd() * 60;
    let d = `M${cx.toFixed(1)} ${cy.toFixed(1)}`;
    const segs = 2 + Math.floor(rnd() * 3);
    for (let s = 0; s < segs; s++) {
      cx += (rnd() - 0.5) * 34;
      cy += 8 + rnd() * 14;
      d += ` L${cx.toFixed(1)} ${cy.toFixed(1)}`;
    }
    el += `<path d="${d}" fill="none" stroke="${crackCol}" stroke-width="${(1.2 + rnd() * 0.6).toFixed(1)}" stroke-linejoin="round" opacity="0.38"/>`;
    if (rnd() < 0.6) { // 分支短紋
      el += `<path d="M${cx.toFixed(1)} ${(cy - 16).toFixed(1)} l${((rnd() - 0.5) * 26).toFixed(1)} ${(8 + rnd() * 10).toFixed(1)}" fill="none" stroke="${crackCol}" stroke-width="1" opacity="0.28"/>`;
    }
  }
  // 青苔:磚角/磚縫聚生嘅橢圓簇(兩層 opacity,冇 blur — SPRITE_SPEC 鐵律)
  if (theme.moss) {
    const nMoss = 6 + Math.floor(rnd() * 3);
    for (let i = 0; i < nMoss; i++) {
      const mx = rnd() * w, my = rnd() * h;
      const nb = 3 + Math.floor(rnd() * 4);
      let blobs = '';
      for (let k = 0; k < nb; k++) {
        const r = 3 + rnd() * 6;
        blobs += `<ellipse cx="${(mx + (rnd() - 0.5) * 22).toFixed(1)}" cy="${(my + (rnd() - 0.5) * 14).toFixed(1)}" rx="${r.toFixed(1)}" ry="${(r * (0.5 + rnd() * 0.3)).toFixed(1)}"/>`;
      }
      el += `<g fill="${theme.moss}" opacity="0.30">${blobs}</g>`;
      el += `<g fill="${theme.moss}" opacity="0.18" transform="translate(${((rnd() - 0.5) * 8).toFixed(1)} ${((rnd() - 0.5) * 6).toFixed(1)})">${blobs}</g>`;
    }
  }
  // 熔岩裂縫:磚縫位橙紋,每 tile 最多 2 條;寬鹵 5px α0.08 代替 blur,火星 ≤2px 先准用 CTA_EDGE(D2)
  if (theme.emberCracks) {
    for (let i = 0; i < 2; i++) {
      const ry = (i + (rnd() < 0.5 ? 0 : 1)) * rowH;
      let cx = rnd() * w * 0.6, cy = ry + (rnd() - 0.5) * 6;
      let d = `M${cx.toFixed(1)} ${cy.toFixed(1)}`;
      for (let s = 0; s < 3; s++) { cx += 12 + rnd() * 16; cy = ry + (rnd() - 0.5) * 12; d += ` L${cx.toFixed(1)} ${cy.toFixed(1)}`; } // 短折紋,唔准變全寬橫線
      el += `<path d="${d}" fill="none" stroke="${theme.ember}" stroke-width="5" opacity="0.08"/>`;
      el += `<path d="${d}" fill="none" stroke="${theme.ember}" stroke-width="2" opacity="0.7"/>`;
      el += `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="1" fill="${TOKENS.CTA_EDGE}" opacity="0.9"/>`;
    }
  }
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">` +
    `<defs><g id="d">${el}</g></defs>` +
    `<use href="#d"/><use href="#d" y="${-h}"/><use href="#d" y="${h}"/></svg>`;
}

// (1) 磚地:主題色石板 + 每塊極輕微深淺 + 細粒 noise + 8% 透明磚縫 + SVG 裂紋/青苔細節(async 熱替換)
let _groundBuildToken = 0;
function buildGroundTile(w, theme) {
  theme = theme || THEMES[0];
  w = Math.max(1, Math.ceil(w));
  const h = GROUND_TILE_H, cols = 4, rowH = 120;
  const c = makeCanvas(w, h), x = c.getContext('2d');
  x.fillStyle = theme.base;
  x.fillRect(0, 0, w, h);
  const rnd = mulberry32(4242);
  for (let ry = 0; ry < h; ry += rowH) {
    const stagger = ((ry / rowH) % 2) ? w / (cols * 2) : 0;
    for (let ci = -1; ci < cols; ci++) {
      const d = (rnd() - 0.5) * 0.09; // ±4.5% 明暗打破平坦
      x.fillStyle = d > 0 ? `rgba(255,255,255,${d})` : `rgba(0,0,0,${-d})`;
      x.fillRect(w * ci / cols + stagger, ry, w / cols + 1, rowH);
    }
  }
  try {
    const img = x.getImageData(0, 0, w, h), d = img.data, nr = mulberry32(9182);
    for (let i = 0; i < d.length; i += 4) {
      const n = (nr() - 0.5) * 13; // 細粒 noise
      d[i] = _cl(d[i] + n); d[i + 1] = _cl(d[i + 1] + n); d[i + 2] = _cl(d[i + 2] + n);
    }
    x.putImageData(img, 0, 0);
  } catch (e) { /* 跨域 getImageData 保護 */ }
  const lr = _hexRgb(theme.line).join(',');
  x.strokeStyle = `rgba(${lr},0.08)`; // 磚縫 8% 透明
  x.lineWidth = 2;
  for (let ry = 0; ry <= h; ry += rowH) { x.beginPath(); x.moveTo(0, ry); x.lineTo(w, ry); x.stroke(); }
  for (let ry = 0; ry < h; ry += rowH) {
    const stagger = ((ry / rowH) % 2) ? w / (cols * 2) : 0;
    x.beginPath();
    for (let i = 1; i < cols; i++) {
      const bx = w * i / cols + stagger;
      if (bx < w) { x.moveTo(bx, ry); x.lineTo(bx, ry + rowH); }
    }
    x.stroke();
  }
  // SVG 細節層 async 合成落同一塊 canvas(首幀先見淨石板,<100ms 後裂紋/青苔上到位);
  // token 防 race:resize/換主題重建後,舊 in-flight 結果直接棄
  const token = ++_groundBuildToken;
  rasterizeSVG(groundDetailSVG(theme, w), w, h).then(img => {
    if (token !== _groundBuildToken) return;
    x.drawImage(img, 0, 0);
  }).catch(() => {}); // raster 失敗 = 冇細節層,純色磚地照用
  return c;
}

// ---- 兩側 props(ENV_THEMES §4 道具庫:全部實色多邊形/圓,發光 = 實色多層 opacity,禁 blur/filter)----
// 每個 draw fn 以 (px,py) 為道具「腳底」中心;內部只用 theme 派生色。回傳 {flame:[fx,fy]} 者會登記做 runtime flicker 光源。
const PROP_DRAW = {
  torch(x, px, py, th, rnd) { // 火把:木桿 + 焰 2 層橢圓 + 3 層 opacity 圓暈
    const ember = th.ember || _mix(TOKENS.CTA_HI, TOKENS.BG_DEEP, 0.30);
    x.fillStyle = th.line; x.fillRect(px - 2, py - 34, 4, 34);
    x.fillStyle = _mix(th.line, TOKENS.BG_DEEP, 0.3); x.fillRect(px - 4, py - 36, 8, 4); // 托座
    const fy = py - 42;
    for (const [r, a] of [[16, 0.10], [11, 0.06], [7, 0.03]]) { // 靜態底暈(runtime flicker 再疊)
      x.fillStyle = _rgba(ember, a * 2); x.beginPath(); x.arc(px, fy, r, 0, 7); x.fill();
    }
    x.fillStyle = ember; x.beginPath(); x.ellipse(px, fy, 4.5, 7, 0, 0, 7); x.fill();
    x.fillStyle = TOKENS.CTA_EDGE; x.beginPath(); x.ellipse(px, fy + 1.5, 1.6, 2, 0, 0, 7); x.fill(); // ≤2px 芯(D2)
    return { flame: [px, fy] };
  },
  brazier(x, px, py, th, rnd) { // 火盆:三腳鐵架 + 焰(暈 α 減半)
    const steel = th.steel || '#5a6472', ember = th.ember || _mix(TOKENS.CTA_HI, TOKENS.BG_DEEP, 0.30);
    x.strokeStyle = steel; x.lineWidth = 2.5;
    x.beginPath(); x.moveTo(px - 7, py); x.lineTo(px - 3, py - 12); x.moveTo(px + 7, py); x.lineTo(px + 3, py - 12); x.moveTo(px, py); x.lineTo(px, py - 12); x.stroke();
    x.fillStyle = steel; x.beginPath(); x.ellipse(px, py - 14, 9, 4, 0, 0, 7); x.fill();
    const fy = py - 20;
    for (const [r, a] of [[13, 0.05], [9, 0.03]]) { x.fillStyle = _rgba(ember, a * 2); x.beginPath(); x.arc(px, fy, r, 0, 7); x.fill(); }
    x.fillStyle = ember; x.beginPath(); x.ellipse(px, fy, 4, 5.5, 0, 0, 7); x.fill();
    return { flame: [px, fy], weak: true };
  },
  flag(x, px, py, th, rnd) { // 殘旗:斜桿 + 破邊三角布(布色隨主題;王城徽章准 GOLD,D4)
    const cloth = th.crystal ? _mix(th.crystal, TOKENS.BG_DEEP, 0.25)
      : th.steel ? _mix(th.steel, TOKENS.TEXT_MID, 0.25)
      : th.emberCracks ? _mix(th.line, TOKENS.BG_DEEP, 0.4) // 焦旗燒剩半幅
      : th.bone ? _mix(th.base, TOKENS.TEXT_LOW, 0.4)        // 褪色布
      : _mix(th.base, TOKENS.GATE_GREEN, 0.10);              // 叢林綠布
    x.save(); x.translate(px, py); x.rotate(-0.16 + rnd() * 0.1);
    x.fillStyle = _mix(th.line, TOKENS.BG_DEEP, 0.2); x.fillRect(-1.5, -46, 3, 46);
    x.fillStyle = cloth;
    x.beginPath(); x.moveTo(1.5, -45); x.lineTo(26, -39); x.lineTo(18, -35); x.lineTo(24, -30); x.lineTo(1.5, -26); x.closePath(); x.fill();
    if (th.crystal) { x.fillStyle = TOKENS.GOLD; x.fillRect(8, -39, 4, 4); } // 王旗金徽(細節,唔准大面積)
    x.restore();
  },
  vine(x, px, py, th, rnd) { // 藤蔓:2-3 條貝茲曲線帶,微綠;沼澤垂水版更長
    const col = _mix(_mix(th.base, TOKENS.BG_DEEP, 0.58), TOKENS.GATE_GREEN, 0.06);
    const long = th.fogBoost ? 1.5 : 1;
    x.strokeStyle = col; x.lineCap = 'round';
    for (let i = 0, n = 2 + Math.floor(rnd() * 2); i < n; i++) {
      const ox = (i - 1) * 8 + (rnd() - 0.5) * 6, len = (30 + rnd() * 24) * long;
      x.lineWidth = 2.5 - i * 0.5;
      x.beginPath(); x.moveTo(px + ox, py - len);

    }
  },
  fence(x, px, py, th, rnd) { // 木樁柵欄:3-5 支尖頂矩形
    x.fillStyle = th.line;
    const n = 3 + Math.floor(rnd() * 3);
    for (let i = 0; i < n; i++) {
      const fx = px + (i - n / 2) * 9, fh = 20 + rnd() * 10;
      x.beginPath(); x.moveTo(fx - 3, py); x.lineTo(fx - 3, py - fh); x.lineTo(fx, py - fh - 5); x.lineTo(fx + 3, py - fh); x.lineTo(fx + 3, py); x.closePath(); x.fill();
    }
  },
  ribArch(x, px, py, th, rnd) { // 肋骨拱:弧形骨白條 ×3 + TEXT_LOW 陰影
    const bone = th.bone || _mix(TOKENS.TEXT_HI, TOKENS.GOLD, 0.15);
    for (let i = 0; i < 3; i++) {
      const r = 26 - i * 7;

      x.strokeStyle = bone; x.lineWidth = 3.5; x.beginPath(); x.arc(px, py, r, Math.PI, Math.PI * 1.9); x.stroke();
    }
  },
  skull(x, px, py, th, rnd) { // 獸頭骨:圓顱 + 兩眼窩
