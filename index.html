        SAVE.coins -= cost;
        SAVE.up[item.id] = lvl + 1;
        if (SAVE.on[item.id] === undefined) SAVE.on[item.id] = true;
        persistSave();
        Sound.gateGood();
        renderShop();
      }
    };
    div.appendChild(btn);
    wrap.appendChild(div);
  }
}

// ---------------- 輸入 ----------------
canvas.addEventListener('pointerdown', (ev) => {
  Sound.ensure();
  if (G.state !== 'play') return;
  const px = ev.clientX, py = ev.clientY;
  if (px >= PAUSE_BTN.x && px <= PAUSE_BTN.x + PAUSE_BTN.w && py >= PAUSE_BTN.y && py <= PAUSE_BTN.y + PAUSE_BTN.h) {
    setState('pause');
    return;
  }
  if (px >= DEX_BTN.x && px <= DEX_BTN.x + DEX_BTN.w && py >= DEX_BTN.y && py <= DEX_BTN.y + DEX_BTN.h) {
    openDex('play');
    return;
  }
  // 點按遺物圖示:顯示提示,唔移動隊伍
  for (const rc of RELIC_RECTS) {
    if (px >= rc.x && px <= rc.x + rc.w && py >= rc.y && py <= rc.y + rc.h) {
      G.hoverRelic = rc.id;
      G.hoverT = 3;
      return;
    }
  }
  // 點擊/觸碰即刻設定目標位置
  G.targetX = Math.max(laneL + 30, Math.min(laneR - 30, px));
  canvas.setPointerCapture(ev.pointerId);
});
// 滑鼠:hover 直接跟隨;觸控:手指移動跟隨
canvas.addEventListener('pointermove', (ev) => {
  if (G.state !== 'play') return;
  if (ev.pointerType === 'mouse' || ev.pressure > 0 || (ev.buttons & 1)) {
    G.targetX = Math.max(laneL + 30, Math.min(laneR - 30, ev.clientX));
  }
  // 滑鼠掃過遺物圖示 -> 顯示名稱同效果
  if (ev.pointerType === 'mouse') {
    let hit = null;
    for (const rc of RELIC_RECTS) {
      if (ev.clientX >= rc.x && ev.clientX <= rc.x + rc.w && ev.clientY >= rc.y && ev.clientY <= rc.y + rc.h) { hit = rc.id; break; }
    }
    if (hit) { G.hoverRelic = hit; G.hoverT = 0.35; }
  }
});

window.addEventListener('keydown', (ev) => {
  if (ev.key === 'ArrowLeft' || ev.key === 'a' || ev.key === 'A') KEYS.left = true;
  else if (ev.key === 'ArrowRight' || ev.key === 'd' || ev.key === 'D') KEYS.right = true;
  else if (ev.key === 'Escape' || ev.key === 'p' || ev.key === 'P') {
    if (G.state === 'play') setState('pause');
    else if (G.state === 'pause') setState('play');
    else if (G.state === 'dex') closeDex();
  }
  if (ev.key.startsWith('Arrow')) ev.preventDefault();
});
window.addEventListener('keyup', (ev) => {
  if (ev.key === 'ArrowLeft' || ev.key === 'a' || ev.key === 'A') KEYS.left = false;
  else if (ev.key === 'ArrowRight' || ev.key === 'd' || ev.key === 'D') KEYS.right = false;
});

document.addEventListener('visibilitychange', () => {
  if (document.hidden && G.state === 'play') setState('pause');
});

// ---------------- UI 綁定 ----------------
$('btn-start').onclick = () => { Sound.ensure(); startRun(); };
$('btn-shop-menu').onclick = () => { Sound.ensure(); openShop('menu'); };
$('btn-gacha-menu').onclick = () => { Sound.ensure(); openGacha('menu'); };
$('btn-gacha-relic').onclick = () => { Sound.ensure(); pullRelic(); };
$('btn-gacha-cat').onclick = () => { Sound.ensure(); pullCat(); };
$('btn-gacha-back').onclick = () => setState(gachaReturn);
$('btn-gacha-relicshop').onclick = () => { Sound.ensure(); openRelicShop(); };
$('btn-relicshop-back').onclick = () => showScreen('gacha');
$('btn-dex-menu').onclick = () => { Sound.ensure(); openDex('menu'); };
$('btn-relicdex-menu').onclick = () => { Sound.ensure(); openRelicDex('menu'); };
$('btn-dex-relics').onclick = () => { renderRelicDex(); showScreen('relicdex'); };
$('btn-rdex-mons').onclick = () => { renderDex(); showScreen('dex'); };
$('btn-rdex-back').onclick = () => closeDex();
$('btn-catdex-menu').onclick = () => { Sound.ensure(); openCatDex('menu'); };
$('btn-dex-cats').onclick = () => { renderCatDex(); showScreen('catdex'); };
$('btn-rdex-cats').onclick = () => { renderCatDex(); showScreen('catdex'); };
$('btn-cdex-mons').onclick = () => { renderDex(); showScreen('dex'); };
$('btn-cdex-relics').onclick = () => { renderRelicDex(); showScreen('relicdex'); };
$('btn-cdex-back').onclick = () => closeDex();
$('btn-dex-clear').onclick = () => openDex('clear');
$('btn-quit-clear').onclick = () => { persistSave(); setState('menu'); };
$('btn-dex-over').onclick = () => openDex('over');
$('btn-dex-pause').onclick = () => openDex('pause');
$('btn-dex-back').onclick = () => closeDex();
$('btn-shop-back').onclick = () => {
  if (shopReturn === 'menu') setState('menu');
  else if (shopReturn === 'clear') setState('clear');
  else if (shopReturn === 'over') setState('over');
};
$('btn-next').onclick = () => {
  G.squad = Math.max(G.squad, 4 + elv('start') + ACTIVE.startAdd);
  syncDots();
  startLevel(G.level + 1);
  setState('play');
};
$('btn-retry').onclick = () => startRun();
$('btn-shop-over').onclick = () => openShop('over');
$('btn-menu-over').onclick = () => setState('menu');
$('btn-resume').onclick = () => setState('play');
$('btn-quit').onclick = () => { persistSave(); setState('menu'); };

// ---------------- 主迴圈 ----------------
let lastT = 0;
function frame(t) {
  const dt = Math.min(0.05, (t - lastT) / 1000 || 0);
  lastT = t;
  if (G.state === 'play') update(dt);
  render();
  requestAnimationFrame(frame);
}

if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
    this.moveTo(x + r, y);
    this.arcTo(x + w, y, x + w, y + h, r);
    this.arcTo(x + w, y + h, x, y + h, r);
    this.arcTo(x, y + h, x, y, r);
    this.arcTo(x, y, x + w, y, r);
    this.closePath();
    return this;
  };
}

// ---------------- 啟動 ----------------
loadSave();
recalcRelics();
resize();
buildFallbacks();
buildCatSprites();
buildCosplaySprites();
loadInjectedAssets();
G.squadX = W / 2;
G.targetX = W / 2;
refreshMenu();
showScreen('menu');
requestAnimationFrame(frame);
</script>
