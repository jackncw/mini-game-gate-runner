<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>喵槍突圍</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; background:#141a12; font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif; }
  #game { display:block; width:100%; height:100%; touch-action:none; cursor:crosshair; }
  #overlay { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(10,14,9,0.84); backdrop-filter:blur(3px); z-index:10; }
  #overlay.hidden { display:none; }
  .screen { width:min(480px, 94vw); max-height:92vh; overflow-y:auto; text-align:center; color:#e8e4d4; background:linear-gradient(160deg,#232b1e,#161c12); border:1px solid #4a5a38; border-radius:18px; padding:26px 22px; box-shadow:0 18px 50px rgba(0,0,0,0.55); }
  .screen.hidden { display:none; }
  .screen h1 { font-size:42px; letter-spacing:6px; color:#ffd75e; text-shadow:0 3px 0 #7a4a12, 0 6px 18px rgba(0,0,0,0.6); margin-bottom:6px; }
  .screen h2 { font-size:28px; letter-spacing:4px; color:#ffd75e; margin-bottom:10px; }
  .screen h3 { font-size:16px; letter-spacing:2px; color:#c8d2a8; margin:14px 0 6px; text-align:left; }
  .screen .sub { color:#a8b48e; font-size:14px; margin-bottom:16px; letter-spacing:1px; }
  .screen p { margin:8px 0; font-size:15px; }
  .screen .hint { color:#7d8a68; font-size:12px; margin-top:14px; line-height:1.6; }
  .btn { display:block; width:100%; margin:9px 0; padding:12px 0; font-size:16px; font-weight:700; letter-spacing:3px; color:#e8e4d4; background:#31402a; border:1px solid #57683f; border-radius:12px; cursor:pointer; font-family:inherit; transition:transform .08s, filter .15s; }
  .btn:active { transform:scale(0.97); }
  .btn.primary { background:linear-gradient(180deg,#e8a93a,#c2761d); border-color:#f5cd7a; color:#2b1a05; text-shadow:0 1px 0 rgba(255,255,255,0.35); }
  .btn:disabled { filter:grayscale(0.9) brightness(0.6); cursor:default; }
  /* 商店 */
  .shop-item { display:flex; align-items:center; justify-content:space-between; gap:8px; background:#1c2417; border:1px solid #3c4a2e; border-radius:12px; padding:9px 10px; margin:7px 0; text-align:left; }
  .shop-item.owned { border-color:#6b8a3f; }
  .si-toggle { flex:0 0 auto; width:24px; height:24px; accent-color:#e8a93a; cursor:pointer; }
  .si-toggle.hide { visibility:hidden; }
  .shop-item .si-info { flex:1 1 auto; min-width:0; }
  .shop-item .si-info b { font-size:14px; color:#f0ead2; }
  .shop-item .si-info span { display:block; font-size:11.5px; color:#93a077; margin-top:2px; line-height:1.4; }
  .shop-item button { flex:0 0 auto; width:96px; margin:0; padding:9px 0; font-size:13px; letter-spacing:1px; }
  #shop-coins,#clear-info,#over-info { color:#ffd75e; font-size:16px; }
  .stat-line { color:#a8b48e; font-size:13px; }
  /* 圖鑑 */
  .dex-grid { display:grid; grid-template-columns:repeat(5, 1fr); gap:8px; margin:6px 0 12px; }
  .dex-tile { background:#1c2417; border:1px solid #3c4a2e; border-radius:10px; padding:7px 3px 5px; min-height:88px; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; }
  .dex-tile img { width:46px; height:46px; object-fit:contain; image-rendering:auto; }
  .dex-tile .dex-q { width:46px; height:46px; display:flex; align-items:center; justify-content:center; font-size:28px; color:#4d5a3e; font-weight:700; }
  .dex-tile .dex-name { font-size:10.5px; color:#c8d2a8; margin-top:4px; line-height:1.25; }
  .dex-tile.locked .dex-name { color:#4d5a3e; }
  .dex-tile .dex-stat { font-size:9.5px; color:#7d8a68; margin-top:1px; }
  .dex-tile.boss { border-color:#8a4a2e; background:#241a14; }
  #dex-progress { color:#a8b48e; font-size:13px; margin-bottom:4px; }
  /* 遺物 */
  .relic-card { display:block; width:100%; text-align:left; background:#1c2417; border:2px solid #4d5a3e; border-radius:14px; padding:12px 14px; margin:9px 0; cursor:pointer; font-family:inherit; color:#e8e4d4; transition:transform .08s; }
  .relic-card:active { transform:scale(0.97); }
  .relic-card b { font-size:16px; }
  .r-ico { display:inline-block; font-size:20px; margin-right:7px; vertical-align:-2px; }
  .rdex-row .r-ico { font-size:17px; margin-right:5px; }
  .relic-item .r-ico { flex:0 0 auto; font-size:20px; }
  .relic-card .r-tier { float:right; font-size:11px; padding:2px 8px; border-radius:8px; letter-spacing:1px; }
  .relic-card .r-desc { display:block; font-size:12.5px; color:#a8b48e; margin-top:5px; line-height:1.45; }
  .tier0 { border-color:#7d8a68; } .tier0 .r-tier { background:#3c4a2e; color:#c8d2a8; }
  .tier1 { border-color:#5a9ad8; } .tier1 .r-tier { background:#1e3a55; color:#9fd0ff; }
  .tier2 { border-color:#b06ad8; } .tier2 .r-tier { background:#3e2055; color:#dbaeff; }
  .tier3 { border-color:#e8a93a; box-shadow:0 0 14px rgba(232,169,58,0.25); } .tier3 .r-tier { background:#553d10; color:#ffd75e; }
  .tier4 { border-color:#ff4da6; box-shadow:0 0 20px rgba(255,77,166,0.5); } .tier4 .r-tier { background:#5a1038; color:#ff9ed4; }
  .relic-item { display:flex; align-items:center; gap:8px; background:#1c2417; border:1px solid #3c4a2e; border-radius:12px; padding:9px 10px; margin:7px 0; text-align:left; }
  .relic-item.owned { border-color:#6b8a3f; }
  .relic-item .si-info { flex:1 1 auto; min-width:0; }
  .relic-item .si-info b { font-size:14px; color:#f0ead2; }
  .relic-item .si-info span { display:block; font-size:11.5px; color:#93a077; margin-top:2px; line-height:1.4; }
  .relic-item button { flex:0 0 auto; width:96px; margin:0; padding:9px 0; font-size:13px; }
  #relic-pick-sub { color:#a8b48e; font-size:13px; }
  #gacha-gems { color:#9fd8ff; font-size:16px; margin-bottom:10px; }
  #relicshop-shards { color:#b8a0ff; font-size:16px; margin-bottom:8px; }
  .shop-relic { display:flex; align-items:center; gap:10px; background:#1c2417; border:1px solid #3c4a2e; border-left-width:4px; border-radius:10px; padding:8px 10px; margin:6px 0; text-align:left; }
  .shop-relic .sr-ico { font-size:24px; flex:0 0 auto; }
  .shop-relic .sr-info { flex:1; min-width:0; }
  .shop-relic .sr-info b { font-size:14px; color:#f0ead2; display:block; }
  .shop-relic .sr-info span { font-size:11px; color:#93a077; }
  .shop-relic .sr-buy { flex:0 0 auto; padding:6px 12px; border-radius:8px; border:none; font-size:12px; font-weight:700; cursor:pointer; background:#4a5a2e; color:#e8f0d0; }
  .shop-relic .sr-buy:disabled { opacity:0.45; cursor:default; }
  .shop-relic.owned { opacity:0.6; }
  #gacha-stage { min-height:150px; display:flex; align-items:center; justify-content:center; flex-direction:column; margin:10px 0; }
  .gacha-reveal { padding:22px 18px; border-radius:16px; text-align:center; animation:gachaPop .5s ease-out; position:relative; overflow:hidden; }
  .gacha-reveal .g-ico { font-size:56px; display:block; margin-bottom:8px; filter:drop-shadow(0 3px 6px rgba(0,0,0,0.4)); }
  .gacha-reveal .g-tier { font-size:13px; letter-spacing:3px; margin-bottom:4px; }
  .gacha-reveal .g-name { font-size:22px; font-weight:700; margin-bottom:5px; }
  .gacha-reveal .g-desc { font-size:13px; color:#c8cdb8; }
  .gacha-reveal .g-dup { font-size:12px; color:#9fd8ff; margin-top:8px; }
  .gacha-reveal img { width:80px; height:80px; image-rendering:auto; margin-bottom:6px; }
  @keyframes gachaPop { 0%{ transform:scale(0.3) rotate(-8deg); opacity:0; } 60%{ transform:scale(1.12); } 100%{ transform:scale(1); opacity:1; } }
  @keyframes shine { 0%{ background-position:-200% 0; } 100%{ background-position:200% 0; } }
  .fx-common  { background:#26301c; border:2px solid #7d8a68; }
  .fx-rare    { background:radial-gradient(circle at 50% 30%, #1e3a55, #12202e); border:2px solid #5a9ad8; box-shadow:0 0 24px rgba(90,154,216,0.5); }
  .fx-epic    { background:radial-gradient(circle at 50% 30%, #3e2055, #1e1030); border:2px solid #b06ad8; box-shadow:0 0 32px rgba(176,106,216,0.6); }
  .fx-legend  { background:linear-gradient(120deg,#553d10,#2e2206,#553d10); background-size:200% 100%; border:2px solid #ffd75e; box-shadow:0 0 44px rgba(255,215,94,0.7); animation:gachaPop .5s ease-out, shine 2s linear infinite; }
  .fx-mythic  { background:linear-gradient(120deg,#5a1038,#8a2060,#3a0a48,#8a2060,#5a1038); background-size:300% 100%; border:3px solid #ff4da6; box-shadow:0 0 60px rgba(255,77,166,0.9), inset 0 0 30px rgba(255,150,220,0.4); animation:gachaPop .6s ease-out, shine 1.5s linear infinite; }
  .fx-legend .g-name, .fx-legend .g-tier { color:#ffd75e; text-shadow:0 0 10px rgba(255,215,94,0.8); }
  .fx-mythic .g-name, .fx-mythic .g-tier { color:#ff9ed4; text-shadow:0 0 14px rgba(255,120,200,1); }
  .fx-rare .g-name{ color:#9fd0ff; } .fx-epic .g-name{ color:#dbaeff; }
  /* 遺物圖鑑 */
  .rdex-row { background:#1c2417; border:1px solid #3c4a2e; border-left-width:4px; border-radius:10px; padding:8px 10px; margin:6px 0; text-align:left; }
  .rdex-row b { font-size:13.5px; color:#f0ead2; }
  .rdex-row .r-tier { float:right; font-size:10.5px; padding:1px 7px; border-radius:7px; letter-spacing:1px; }
  .rdex-row .r-desc { display:block; font-size:11.5px; color:#93a077; margin-top:3px; line-height:1.4; }
  .rdex-row.locked { border-left-color:#3c4a2e; }
  .rdex-row.locked b { color:#4d5a3e; }
  .rdex-row .r-owned { font-size:10px; color:#ffd75e; margin-left:6px; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="overlay">
  <div class="screen hidden" id="scr-relicshop">
    <h2>遺物商店</h2>
    <button class="btn primary" id="btn-relicshop-back">返回</button>
    <p id="relicshop-shards"></p>
    <p class="hint">用 💠晶石碎片 購買遺物(抽卡抽到重覆時獲得碎片)<br>只有部分遺物可購買,其餘只能靠抽卡</p>
    <div id="relicshop-list"></div>
  </div>

  <div class="screen hidden" id="scr-gacha">
    <h2>召喚祭壇</h2>
    <p id="gacha-gems"></p>
    <div id="gacha-stage"></div>
    <button class="btn primary" id="btn-gacha-relic">遺物召喚(5💎)</button>
    <button class="btn primary" id="btn-gacha-cat">貓咪召喚(3💎)</button>
    <button class="btn" id="btn-gacha-relicshop">💠 遺物商店(用碎片換)</button>
    <button class="btn" id="btn-gacha-back">返回</button>
    <p class="hint" id="gacha-hint">晶石由擊敗敵人同 Boss 掉落<br>抽到重覆會得到 1 💠晶石碎片(可喺遺物商店換遺物)<br>神話級遺物只能喺呢度召喚</p>
  </div>

  <div class="screen" id="scr-menu">
    <h1>喵槍突圍</h1>
    <p class="sub">指揮你嘅貓貓槍手軍團・射爆迎面而嚟嘅怪物大軍</p>
    <p class="stat-line" id="menu-best"></p>
    <button class="btn primary" id="btn-start">開始遊戲</button>
    <button class="btn" id="btn-shop-menu">升級商店</button>
    <button class="btn primary" id="btn-gacha-menu">✨ 召喚祭壇</button>
    <button class="btn" id="btn-dex-menu">怪物圖鑑</button>
    <button class="btn" id="btn-relicdex-menu">遺物圖鑑</button>
    <button class="btn" id="btn-catdex-menu">貓咪圖鑑</button>
    <p class="hint">滑鼠移動 / 手指拖曳 / 鍵盤 ←→ 控制隊伍<br>自動射擊・綠門加兵、紅門減兵 — 紅門可以射到變好!</p>
  </div>

  <div class="screen hidden" id="scr-shop">
    <h2>升級商店</h2>
    <p id="shop-coins"></p>
    <button class="btn primary" id="btn-shop-back">返回</button>
    <p class="stat-line">已購買嘅升級可以用左邊剔選開關</p>
    <div id="shop-items"></div>
  </div>

  <div class="screen hidden" id="scr-relic">
    <h2>戰利品!</h2>
    <p id="relic-pick-sub"></p>
    <div id="relic-options"></div>
    <button class="btn" id="btn-relic-reroll">重抽</button>
    <button class="btn" id="btn-relic-skip">跳過</button>
  </div>

  <div class="screen hidden" id="scr-dex">
    <h2>怪物圖鑑</h2>
    <button class="btn primary" id="btn-dex-back">返回</button>
    <p id="dex-progress"></p>
    <h3>小怪</h3>
    <div class="dex-grid" id="dex-mons"></div>
    <h3>頭目</h3>
    <div class="dex-grid" id="dex-bosses"></div>
    <button class="btn" id="btn-dex-relics">遺物圖鑑</button>
    <button class="btn" id="btn-dex-cats">貓咪圖鑑</button>
  </div>

  <div class="screen hidden" id="scr-relicdex">
    <h2>遺物圖鑑</h2>
    <button class="btn primary" id="btn-rdex-back">返回</button>
    <p id="rdex-progress"></p>
    <div id="rdex-list"></div>
    <button class="btn" id="btn-rdex-mons">怪物圖鑑</button>
    <button class="btn" id="btn-rdex-cats">貓咪圖鑑</button>
  </div>

  <div class="screen hidden" id="scr-catdex">
    <h2>貓咪圖鑑</h2>
    <button class="btn primary" id="btn-cdex-back">返回</button>
    <p id="cdex-progress"></p>
    <div class="dex-grid" id="cdex-grid"></div>
    <button class="btn" id="btn-cdex-mons">怪物圖鑑</button>
    <button class="btn" id="btn-cdex-relics">遺物圖鑑</button>
  </div>

  <div class="screen hidden" id="scr-clear">
    <h2>過關!</h2>
    <p id="clear-info"></p>
    <button class="btn primary" id="btn-next">下一關</button>
    <button class="btn" id="btn-dex-clear">怪物圖鑑</button>
    <button class="btn" id="btn-quit-clear">結束出擊・返回主選單</button>
  </div>

  <div class="screen hidden" id="scr-over">
    <h2>喵…全軍覆沒</h2>
    <p id="over-info"></p>
    <button class="btn primary" id="btn-retry">再嚟一次</button>
    <button class="btn" id="btn-shop-over">升級商店</button>
    <button class="btn" id="btn-dex-over">怪物圖鑑</button>
    <button class="btn" id="btn-menu-over">主選單</button>
  </div>

  <div class="screen hidden" id="scr-pause">
    <h2>暫停</h2>
    <button class="btn primary" id="btn-resume">繼續遊戲</button>
    <button class="btn" id="btn-dex-pause">怪物圖鑑</button>
    <button class="btn" id="btn-quit">返回主選單</button>
  </div>
</div>

<script>
"use strict";

// ============ ASSET INJECTION BLOCK - START ============
// Replace the null values below with base64 PNG data URIs
// e.g. soldier: "data:image/png;base64,...."
// Any key left as null will use the built-in procedural fallback art.
// Monster/boss variants are auto-generated from these base sprites via hue tinting.
const ASSETS = {
  soldier: null,   // player cat soldier, faces up (30 breed variants auto-tinted from this)
  goblin: null,    // small enemy base, faces down
  skeleton: null,  // small enemy base, faces down
  orc: null,       // medium enemy base, faces down
  golem: null,     // heavy enemy base, faces down
  imp: null,       // small flying demon base, faces down
  slime: null,     // blob monster base, faces down
  wolf: null,      // feral wolf base, faces down
  spider: null,    // giant spider base, faces down
  ghost: null,     // spectral ghost base, faces down
  shaman: null,    // robed spellcaster base, faces down
  dragon: null,    // boss base, faces down
  gateGreen: null, // positive gate archway
  gateRed: null,   // negative gate archway
  coin: null,      // gold coin pickup
};
// ============ ASSET INJECTION BLOCK - END ============

// ---------------- 基本設定 ----------------
const CONFIG = {
  scrollSpeed: 250,
  soldierFireRate: 2.4,
  baseDamage: 10,
  bulletSpeed: 1050,
  maxRenderSoldiers: 64,
  maxFireStreams: 24,
  squadCap: 999,
  laneMaxWidth: 540,
};

// ---------------- 怪物系統:6 個家族 x 5 個層級 = 30 種 ----------------
const FAMILIES = {
  goblin:   { hp: 30,  speed: 175, bite: 1, coin: 2,  size: 46, homing: 70,  bar: false, move: 'walk'  },
  skeleton: { hp: 70,  speed: 135, bite: 2, coin: 4,  size: 52, homing: 35,  bar: false, move: 'walk'  },
  imp:      { hp: 45,  speed: 150, bite: 2, coin: 5,  size: 48, homing: 130, bar: false, move: 'zig'   },
  slime:    { hp: 130, speed: 82,  bite: 3, coin: 7,  size: 56, homing: 12,  bar: true,  move: 'bounce'},
  wolf:     { hp: 80,  speed: 210, bite: 4, coin: 4,  size: 50, homing: 100, bar: false, move: 'walk'  },
  spider:   { hp: 90,  speed: 120, bite: 3, coin: 6,  size: 54, homing: 50,  bar: false, move: 'zig'   },
  ghost:    { hp: 60,  speed: 115, bite: 3, coin: 8,  size: 50, homing: 40,  bar: false, move: 'ghost' },
  shaman:   { hp: 80,  speed: 95,  bite: 2, coin: 10, size: 52, homing: 15,  bar: true,  move: 'caster'},
  orc:      { hp: 380, speed: 105, bite: 8, coin: 9,  size: 64, homing: 22,  bar: true,  move: 'walk'  },
  golem:    { hp: 480, speed: 62,  bite: 8, coin: 16, size: 78, homing: 0,   bar: true,  move: 'walk'  },
};
const TIER = {
  hpMul:   [1, 2.2, 4.6, 9.2, 18],
  coinMul: [1, 2.0, 3.6, 6.5, 11],
  spdMul:  [1, 1.06, 1.12, 1.2, 1.28],
  biteAdd: [0, 1, 2, 3, 5],
  szMul:   [1, 1.08, 1.16, 1.26, 1.38],
  minLv:   [1, 3, 5, 7, 9],
  hue:     [0, 45, 130, 215, 290],
  sat:     [1, 1.1, 1.15, 1.2, 1.35],
};
const FAMILY_NAMES = {
  goblin:   ['哥布林','哥布林戰士','哥布林暴徒','暗影哥布林','深淵哥布林'],
  skeleton: ['骷髏兵','骷髏武士','詛咒骷髏','骸骨將軍','亡靈領主'],
  imp:      ['小惡魔','火焰小鬼','毒翼魔','夜魔','深淵惡魔'],
  slime:    ['史萊姆','酸液史萊姆','劇毒史萊姆','暗影史萊姆','虛空史萊姆'],
  wolf:     ['野狼','灰狼','嗜血狼','暗月狼','冥府魔狼'],
  spider:   ['巨蛛','毒牙蛛','獵殺蛛','暗影蛛','深淵母蛛'],
  ghost:    ['幽靈','怨靈','惡靈','夢魘幽魂','虛空亡靈'],
  shaman:   ['哥布林薩滿','獸人薩滿','暗影祭司','血法師','深淵大法師'],
  orc:      ['獸人','獸人戰士','獸人狂戰士','血怒獸人','獸人軍閥'],
  golem:    ['石魔','鐵魔像','熔岩魔像','水晶魔像','遠古魔像'],
};
const MONSTERS = [];
for (const fam of Object.keys(FAMILIES)) {
  for (let t = 0; t < 5; t++) {
    const b = FAMILIES[fam];
    MONSTERS.push({
      id: 'm_' + fam + t,
      fam, tier: t,
      name: FAMILY_NAMES[fam][t],
      hp: Math.round(b.hp * TIER.hpMul[t]),
      coin: t + 1, // 固定按層級:lv1怪1元 … lv5怪5元
      speed: b.speed * TIER.spdMul[t],
      bite: b.bite + TIER.biteAdd[t],
      size: Math.round(b.size * TIER.szMul[t]),
      homing: b.homing, bar: b.bar || t >= 2, move: b.move,
      minLv: TIER.minLv[t],
      hue: TIER.hue[t], sat: TIER.sat[t],
    });
  }
}

// ---------------- 存檔(v2,兼容 v1 遷移) ----------------
const SAVE_KEY = 'gateRunnerSave_v2';
let SAVE = { coins: 0, gems: 0, shards: 0, maxLevel: 0, up: {}, on: {}, dex: {}, relics: {}, relicOn: {}, relicDex: {}, catDex: {}, ownedRelics: {}, cosplayCats: {} };
function loadSave() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw) { SAVE = Object.assign(SAVE, JSON.parse(raw)); }
    else {
      const old = localStorage.getItem('gateRunnerSave_v1');
      if (old) {
        const o = JSON.parse(old);
        SAVE.coins = o.coins || 0;
        SAVE.maxLevel = o.maxLevel || 0;
        SAVE.up = { start: o.upStart || 0, dmg: o.upDmg || 0, rate: o.upRate || 0, coin: o.upCoin || 0 };
      }
    }
    SAVE.up = SAVE.up || {}; SAVE.on = SAVE.on || {}; SAVE.dex = SAVE.dex || {};
    SAVE.relics = SAVE.relics || {}; SAVE.relicOn = SAVE.relicOn || {}; SAVE.relicDex = SAVE.relicDex || {}; SAVE.catDex = SAVE.catDex || {};
    SAVE.gems = SAVE.gems || 0; SAVE.ownedRelics = SAVE.ownedRelics || {}; SAVE.cosplayCats = SAVE.cosplayCats || {};
    SAVE.shards = SAVE.shards || 0;
    for (const id of Object.keys(SAVE.relics)) if (SAVE.relics[id]) SAVE.relicDex[id] = 1;
    // 舊版遷移:時間凍結 -> 處決者
    if (SAVE.up.timewarp) {
      SAVE.up.execute = Math.min(8, (SAVE.up.execute || 0) + SAVE.up.timewarp);
      delete SAVE.up.timewarp; delete SAVE.on.timewarp;
    }
    // 舊版 Boss 圖鑑 id 對應
    const bossMap = { b_skking: 'b_skeleton', b_warlord: 'b_orc', b_titan: 'b_golem', b_dragon: 'b_imp', b_styx: 'b_shaman' };
    for (const k of Object.keys(bossMap)) if (SAVE.dex[k]) { SAVE.dex[bossMap[k]] = 1; delete SAVE.dex[k]; }
  } catch (e) {}
}
function persistSave() {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(SAVE)); } catch (e) {}
}
function upgradeCost(item) {
  return Math.floor(item.base * Math.pow(1.55, SAVE.up[item.id] || 0));
}
// 永久有效等級:購買咗 + 冇被關閉
function lv(id) {
  if (SAVE.on[id] === false) return 0;
  return SAVE.up[id] || 0;
}
// 遊戲內有效等級 = 永久升級 + 本次出擊臨時升級(過門獲得,唔會存檔)
function elv(id) {
  return lv(id) + ((typeof G !== 'undefined' && G.tempUp && G.tempUp[id]) || 0)
       + (ACTIVE.up[id] || 0);
}

// 標記約 30% 遺物可喺遺物商店用碎片購買(每個稀有度都有一部分,確定性選取)
(function markShopBuyable() {
  const byTier = [[], [], [], [], []];
  for (const r of RELICS) byTier[r.t].push(r);
  for (let t = 0; t < 5; t++) {
    const list = byTier[t];
    const n = Math.max(1, Math.round(list.length * 0.3));
    for (let i = 0; i < list.length; i++) list[i].shopBuyable = (i % Math.ceil(list.length / n)) === 0;
    // 確保正好約 30%
    let count = list.filter(r => r.shopBuyable).length;
    for (let i = 0; i < list.length && count < n; i++) if (!list[i].shopBuyable) { list[i].shopBuyable = true; count++; }
  }
})();

// 生效中遺物嘅聚合效果(run 遺物 + 已購買並開啟嘅遺物)
var ACTIVE = { set: new Set(), up: {}, dmgMul: 1, rateMul: 1, startAdd: 0, coinMul: 1 };
function recalcRelics() {
  ACTIVE = { set: new Set(), up: {}, dmgMul: 1, rateMul: 1, startAdd: 0, coinMul: 1 };
  const ids = [];
  if (typeof G !== 'undefined' && G.runRelics) ids.push(...G.runRelics);
  // 抽卡獲得嘅永久遺物,冇被關閉就生效
  for (const id of Object.keys(SAVE.ownedRelics || {})) {
    if (SAVE.ownedRelics[id] && SAVE.relicOn[id] !== false) ids.push(id);
  }
  RELIC_DISPLAY = [];
  for (const id of ids) {
    const r = RELIC_BY_ID[id];
    if (!r || ACTIVE.set.has(id)) continue;
    ACTIVE.set.add(id);
    RELIC_DISPLAY.push(id);
    if (r.k === 'stat') {
      if (r.s.dmg) ACTIVE.dmgMul *= 1 + r.s.dmg;
      if (r.s.rate) ACTIVE.rateMul *= 1 + r.s.rate;
      if (r.s.start) ACTIVE.startAdd += r.s.start;
      if (r.s.coin) ACTIVE.coinMul *= 1 + r.s.coin;
    } else if (r.k === 'up') {
      ACTIVE.up[r.u[0]] = (ACTIVE.up[r.u[0]] || 0) + r.u[1];
    }
  }
}
function RL(id) { return ACTIVE.set.has(id); }

// 星形輔助
function star(x, cx, cy, r, points, inner) {
  x.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const rad = i % 2 === 0 ? r : inner;
    const a = -Math.PI / 2 + i * Math.PI / points;
    const px = cx + Math.cos(a) * rad, py = cy + Math.sin(a) * rad;
    i === 0 ? x.moveTo(px, py) : x.lineTo(px, py);
  }
  x.closePath(); x.fill();
}
function drawCosplayCat(b) {
  const c = makeCanvas(64, 64), x = c.getContext('2d');
  x.translate(32, 34);
  // 影
  x.fillStyle = 'rgba(0,0,0,0.25)';
  x.beginPath(); x.ellipse(0, 14, 15, 7, 0, 0, 7); x.fill();
  // 尾巴
  x.strokeStyle = b.p2;
  x.lineWidth = 5; x.lineCap = 'round';
  x.beginPath(); x.moveTo(6, 12); x.quadraticCurveTo(17, 18, 15, 26); x.stroke();
  // 身體(背面)
  x.fillStyle = b.fur;
  x.beginPath(); x.ellipse(0, 4, 13, 11, 0, 0, 7); x.fill();
  // 花紋
  if (b.pat === 'tabby') {
    x.strokeStyle = b.p2; x.lineWidth = 2.6;
    for (const oy of [-1, 4, 9]) {
      x.beginPath(); x.moveTo(-10, oy); x.quadraticCurveTo(0, oy + 3, 10, oy); x.stroke();
    }
  }
  // 手臂揸槍
  x.fillStyle = b.fur;
  x.fillRect(-12, -10, 5, 11);
  x.fillRect(7, -10, 5, 11);
  // 槍(指向上)
  x.fillStyle = '#22261f';
  x.fillRect(-2.5, -30, 5, 24);
  x.fillStyle = '#111';
  x.fillRect(-1.5, -34, 3, 6);
  // 頭(後腦)
  x.fillStyle = b.fur;
  x.beginPath(); x.arc(0, -4, 9.5, 0, 7); x.fill();
  // 耳仔
  x.fillStyle = b.fur;
  x.beginPath(); x.moveTo(-8, -8); x.lineTo(-10, -17); x.lineTo(-2, -12); x.closePath(); x.fill();
  x.beginPath(); x.moveTo(8, -8); x.lineTo(10, -17); x.lineTo(2, -12); x.closePath(); x.fill();
  // 配件(戴喺後腦/頭頂,背面睇得到)
  drawCosplayAcc(x, b.acc);
  return c;
}
function buildCosplaySprites() {
  COSPLAY_SPRITES.length = 0;
  for (const b of COSPLAY_CATS) COSPLAY_SPRITES.push(drawCosplayCat(b));
}

  if (b.pat === 'tabby') {
    x.lineWidth = 2.6;
    for (const oy of [-1, 4, 9]) {
      x.beginPath(); x.moveTo(-10, oy); x.quadraticCurveTo(0, oy + 3, 10, oy); x.stroke();
    }
  } else if (b.pat === 'spots') {
    for (const [sx, sy] of [[-6, 0], [5, 3], [-2, 8], [7, -2]]) {
      x.beginPath(); x.arc(sx, sy, 2.1, 0, 7); x.fill();
    }
  } else if (b.pat === 'tux') {
    x.beginPath(); x.ellipse(0, 8, 6, 5, 0, 0, 7); x.fill();
  } else if (b.pat === 'patch') {
    x.beginPath(); x.ellipse(-6, 2, 5.5, 4.5, 0.4, 0, 7); x.fill();
    x.beginPath(); x.ellipse(6, 7, 4.5, 3.5, -0.4, 0, 7); x.fill();
  }
  // 手臂揸槍
  x.fillStyle = b.pat === 'point' ? b.p2 : b.fur;
  x.fillRect(-12, -10, 5, 11);
  x.fillRect(7, -10, 5, 11);
  // 槍(指向上)
  x.fillStyle = '#22261f';
  x.fillRect(-2.5, -30, 5, 24);
  x.fillStyle = '#111';
  x.fillRect(-1.5, -34, 3, 6);
  // 頭
  x.fillStyle = b.fur;
  x.beginPath(); x.arc(0, -4, 9.5, 0, 7); x.fill();
  if (b.pat === 'point') { // 重點色:耳/面深色
    x.fillStyle = b.p2;
    x.beginPath(); x.arc(0, -8, 6, 0, 7); x.fill();
  } else if (b.pat === 'tabby') {
    x.strokeStyle = b.p2; x.lineWidth = 2;
    x.beginPath(); x.moveTo(-3, -11); x.lineTo(-3, -5); x.moveTo(0, -12); x.lineTo(0, -5); x.moveTo(3, -11); x.lineTo(3, -5); x.stroke();
  }
  // 耳仔
  const earCol = b.pat === 'point' ? b.p2 : b.fur;
  x.fillStyle = earCol;
  x.beginPath(); x.moveTo(-8, -8); x.lineTo(-10, -17); x.lineTo(-2, -12); x.closePath(); x.fill();
  x.beginPath(); x.moveTo(8, -8); x.lineTo(10, -17); x.lineTo(2, -12); x.closePath(); x.fill();
  x.fillStyle = '#e8a0a8';
  x.beginPath(); x.moveTo(-7, -9.5); x.lineTo(-8.5, -15); x.lineTo(-4, -11.5); x.closePath(); x.fill();
  x.beginPath(); x.moveTo(7, -9.5); x.lineTo(8.5, -15); x.lineTo(4, -11.5); x.closePath(); x.fill();
  return c;
}

function buildCatSprites() {
  CAT_SPRITES.length = 0;
  for (let i = 0; i < CAT_BREEDS.length; i++) {
    if (SOLDIER_INJECTED) {
      // 有注入圖:用色相變體區分品種
      CAT_SPRITES.push(tintSprite('soldier', (i * 12) % 360, 1 + (i % 3) * 0.1) || SPRITES.soldier);
    } else {
      CAT_SPRITES.push(drawCatBreed(CAT_BREEDS[i]));
    }
  }
}

// ---------------- 音效引擎 (Web Audio) ----------------
const Sound = {
  ctx: null, master: null, lastShoot: 0,
  ensure() {
    if (!this.ctx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return false;
      this.ctx = new AC();
      this.master = this.ctx.createGain();
      this.master.gain.value = 0.5;
      this.master.connect(this.ctx.destination);
    }
    if (this.ctx.state === 'suspended') this.ctx.resume();
    return true;
  },
  tone(freq, dur, type, vol, slideTo, delay) {
    if (!this.ctx) return;
    const t0 = this.ctx.currentTime + (delay || 0);
    const osc = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    osc.type = type || 'square';
    osc.frequency.setValueAtTime(freq, t0);
    if (slideTo) osc.frequency.exponentialRampToValueAtTime(Math.max(1, slideTo), t0 + dur);
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(g); g.connect(this.master);
    osc.start(t0); osc.stop(t0 + dur + 0.02);
  },
  noise(dur, vol, delay) {
    if (!this.ctx) return;
    const t0 = this.ctx.currentTime + (delay || 0);
    const len = Math.max(1, Math.floor(this.ctx.sampleRate * dur));
    const buf = this.ctx.createBuffer(1, len, this.ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
    const src = this.ctx.createBufferSource();
    src.buffer = buf;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    src.connect(g); g.connect(this.master);
    src.start(t0);
  },
  shoot() {
    if (!this.ctx) return;
    const now = performance.now();
    if (now - this.lastShoot < 75) return;
    this.lastShoot = now;
    this.noise(0.05, 0.10);
    this.tone(320, 0.05, 'square', 0.05, 130);
  },
  hit()      { this.tone(220, 0.06, 'triangle', 0.10, 90); },
  enemyDie() { this.noise(0.12, 0.14); this.tone(150, 0.14, 'sawtooth', 0.10, 40); },
  soldierDie(){ this.tone(500, 0.16, 'triangle', 0.14, 120); },
  gateGood() { this.tone(520, 0.09, 'square', 0.12); this.tone(780, 0.12, 'square', 0.12, null, 0.07); },
  gateBad()  { this.tone(300, 0.12, 'sawtooth', 0.14, 150); this.tone(180, 0.18, 'sawtooth', 0.12, 90, 0.09); },
  coin()     { this.tone(900, 0.06, 'square', 0.07); this.tone(1350, 0.08, 'square', 0.07, null, 0.05); },
  chest()    { this.tone(700, 0.1, 'square', 0.12); this.tone(1050, 0.1, 'square', 0.12, null, 0.08); this.tone(1400, 0.14, 'square', 0.12, null, 0.16); },
  roar() {
    this.tone(90, 0.7, 'sawtooth', 0.22, 55);
    this.tone(140, 0.6, 'square', 0.12, 70, 0.05);
    this.noise(0.5, 0.12, 0.05);
  },
  bossHurt() { this.tone(120, 0.12, 'sawtooth', 0.14, 60); },
  fireball() { this.noise(0.25, 0.12); this.tone(240, 0.3, 'sawtooth', 0.08, 90); },
  zap()      { this.tone(1600, 0.09, 'sawtooth', 0.12, 200); this.noise(0.07, 0.08); },
  boom()     { this.noise(0.3, 0.2); this.tone(80, 0.35, 'sawtooth', 0.16, 30); },
  orbital()  { this.tone(1200, 0.5, 'sawtooth', 0.1, 100); this.noise(0.45, 0.22, 0.15); this.tone(60, 0.5, 'sawtooth', 0.18, 25, 0.15); },
  bark()     { this.tone(420, 0.07, 'square', 0.12, 240); },
  shieldHit(){ this.tone(650, 0.12, 'triangle', 0.14, 320); },
  revive()   { this.tone(400, 0.15, 'square', 0.14); this.tone(600, 0.15, 'square', 0.14, null, 0.12); this.tone(900, 0.2, 'square', 0.14, null, 0.24); },
  win() {
    const seq = [523, 659, 784, 1047];
    seq.forEach((f, i) => this.tone(f, 0.16, 'square', 0.14, null, i * 0.13));
  },
  lose() {
    const seq = [392, 330, 262, 196];
    seq.forEach((f, i) => this.tone(f, 0.22, 'triangle', 0.14, null, i * 0.17));
  },
};

// ---------------- 圖像資源管線 ----------------
const SPRITES = {};
const TINTS = {}; // key: base|hue|sat -> canvas

function makeCanvas(w, h) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  return c;
}

// 白底自動去背
function processImage(img) {
  const c = makeCanvas(img.naturalWidth, img.naturalHeight);
  const x = c.getContext('2d');
  x.drawImage(img, 0, 0);
  let data;
  try { data = x.getImageData(0, 0, c.width, c.height); }
  catch (e) { return c; }
  const px = data.data;
  let hasAlpha = false;
  const samples = [0, (c.width - 1) * 4, (c.height - 1) * c.width * 4, (c.width * c.height - 1) * 4];
  for (const s of samples) if (px[s + 3] < 250) { hasAlpha = true; break; }
  if (!hasAlpha) {
    let whiteCorners = 0;
    for (const s of samples) if (px[s] > 235 && px[s + 1] > 235 && px[s + 2] > 235) whiteCorners++;
    if (whiteCorners >= 3) {
      for (let i = 0; i < px.length; i += 4) {
        const mn = Math.min(px[i], px[i + 1], px[i + 2]);
        if (mn > 238) px[i + 3] = 0;
        else if (mn > 215) px[i + 3] = Math.round(255 * (238 - mn) / 23);
      }
      x.putImageData(data, 0, 0);
    }
  }
  return c;
}

function loadInjectedAssets() {
  for (const key of Object.keys(ASSETS)) {
    const src = ASSETS[key];
    if (typeof src !== 'string' || !src) continue;
    const img = new Image();
    img.onload = () => {
      SPRITES[key] = processImage(img);
      // 清走以呢個 base 生成嘅 tint cache
      for (const k of Object.keys(TINTS)) if (k.startsWith(key + '|')) delete TINTS[k];
      if (key === 'soldier') { SOLDIER_INJECTED = true; buildCatSprites(); }
    };
    img.onerror = () => {};
    img.src = src;
  }
}

// 色相變體:同一 base sprite 生成唔同顏色嘅怪物層級
function tintSprite(base, hue, sat) {
  if (!hue && (!sat || sat === 1)) return SPRITES[base];
  const key = base + '|' + hue + '|' + (sat || 1);
  if (TINTS[key]) return TINTS[key];
  const src = SPRITES[base];
  if (!src) return null;
  const c = makeCanvas(src.width, src.height);
  const x = c.getContext('2d');
  x.filter = `hue-rotate(${hue}deg) saturate(${sat || 1})`;
  x.drawImage(src, 0, 0);
  x.filter = 'none';
  TINTS[key] = c;
  return c;
}

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = Math.round(W * DPR);
  canvas.height = Math.round(H * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  laneW = Math.min(W * 0.88, CONFIG.laneMaxWidth);
  laneL = (W - laneW) / 2;
  laneR = laneL + laneW;
  squadY = H - Math.max(130, H * 0.18);
}
