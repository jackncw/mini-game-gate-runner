    x.fillStyle = TOKENS.TEXT_LOW; x.beginPath(); x.arc(px + 1.5, py - 9, 11, 0, 7); x.fill(); // 陰影層
    x.fillStyle = bone; x.beginPath(); x.arc(px, py - 10, 11, 0, 7); x.fill();
    x.fillRect(px - 6, py - 4, 12, 5); // 顎
    x.fillStyle = _mix(th.base, TOKENS.BG_DEEP, 0.74);
    x.beginPath(); x.arc(px - 4.5, py - 11, 2.6, 0, 7); x.arc(px + 4.5, py - 11, 2.6, 0, 7); x.fill();
  },
  deadTree(x, px, py, th, rnd) { // 枯木:主幹 + 2 分叉剪影
    x.strokeStyle = _mix(th.base, TOKENS.BG_DEEP, 0.74); x.lineCap = 'round';
    x.lineWidth = 4.5; x.beginPath(); x.moveTo(px, py); x.lineTo(px + 2, py - 34); x.stroke();
    x.lineWidth = 2.5;
    x.beginPath(); x.moveTo(px + 1, py - 20); x.lineTo(px - 10 - rnd() * 6, py - 32); x.stroke();
    x.beginPath(); x.moveTo(px + 2, py - 28); x.lineTo(px + 11 + rnd() * 5, py - 40); x.stroke();
  },
  ironGate(x, px, py, th, rnd) { // 鐵柵:豎條 ×4 + 橫檔
    const steel = th.steel || '#5a6472';
    x.fillStyle = _mix(steel, TOKENS.BG_DEEP, 0.35);
    for (let i = 0; i < 4; i++) {
      const gx = px + (i - 1.5) * 8;
      x.fillRect(gx - 1.5, py - 34, 3, 34);
      x.beginPath(); x.moveTo(gx - 1.5, py - 34); x.lineTo(gx, py - 38); x.lineTo(gx + 1.5, py - 34); x.closePath(); x.fill(); // 尖頂
    }
    x.fillRect(px - 15, py - 28, 30, 3); x.fillRect(px - 15, py - 12, 30, 3);
  },
  chain(x, px, py, th, rnd) { // 鎖鏈:圓環串
    x.strokeStyle = _mix(th.steel || '#5a6472', TOKENS.BG_DEEP, 0.25); x.lineWidth = 2;
    for (let i = 0; i < 5; i++) { x.beginPath(); x.ellipse(px + (rnd() - 0.5) * 3, py - 36 + i * 8, 3, 4.5, 0, 0, 7); x.stroke(); }
  },
  stone(x, px, py, th, rnd) { // 石碑:圓頂矩形 + 一條裂紋
    const col = _mix(th.base, TOKENS.BG_DEEP, 0.58);
    x.fillStyle = col;
    x.beginPath(); x.moveTo(px - 9, py); x.lineTo(px - 9, py - 22); x.arc(px, py - 22, 9, Math.PI, 0); x.lineTo(px + 9, py); x.closePath(); x.fill();
    x.strokeStyle = _mix(col, TOKENS.BG_DEEP, 0.5); x.lineWidth = 1.5;
    x.beginPath(); x.moveTo(px - 3, py - 26); x.lineTo(px + 1, py - 18); x.lineTo(px - 2, py - 10); x.stroke();
  },
  ghostfire(x, px, py, th, rnd) { // 鬼火:≤3px 點 ×2-3,兩層 rgba(159,208,255,0.35) 暈(D3)
    for (let i = 0, n = 2 + Math.floor(rnd() * 2); i < n; i++) {
      const gx = px + (rnd() - 0.5) * 26, gy = py - 14 - rnd() * 26;
      x.fillStyle = 'rgba(159,208,255,0.12)'; x.beginPath(); x.arc(gx, gy, 7, 0, 7); x.fill();
      x.fillStyle = 'rgba(159,208,255,0.35)'; x.beginPath(); x.arc(gx, gy, 4, 0, 7); x.fill();
      x.fillStyle = '#9fd0ff'; x.beginPath(); x.arc(gx, gy, 1.5, 0, 7); x.fill();
    }
  },
  crystal(x, px, py, th, rnd) { // 紫晶簇:2-4 支尖三角 + 1 層 glow
    const col = th.crystal || _mix('#5e3080', '#a856f0', 0.35);
    x.fillStyle = th.crystalGlow || 'rgba(168,86,240,0.30)';
    x.beginPath(); x.ellipse(px, py - 8, 16, 10, 0, 0, 7); x.fill();
    for (let i = 0, n = 2 + Math.floor(rnd() * 3); i < n; i++) {
      const cx2 = px + (i - n / 2) * 7 + (rnd() - 0.5) * 4, ch = 12 + rnd() * 14, lean = (rnd() - 0.5) * 6;
      x.fillStyle = i % 2 ? col : _mix(col, TOKENS.TEXT_HI, 0.15);
      x.beginPath(); x.moveTo(cx2 - 4, py); x.lineTo(cx2 + lean, py - ch); x.lineTo(cx2 + 4, py); x.closePath(); x.fill();
    }
  },
  totem(x, px, py, th, rnd) { // 圖騰:疊石矩形 + 刻紋 + 1px 紫眼
    const col = _mix(th.base, TOKENS.BG_DEEP, 0.5);
    x.fillStyle = col;
    x.fillRect(px - 8, py - 12, 16, 12); x.fillRect(px - 6, py - 24, 12, 12); x.fillRect(px - 7, py - 34, 14, 10);
    x.strokeStyle = _mix(col, TOKENS.BG_DEEP, 0.5); x.lineWidth = 1;
    x.strokeRect(px - 4, py - 21, 8, 6);
    x.fillStyle = '#a856f0'; x.fillRect(px - 3, py - 31, 2, 2); x.fillRect(px + 1, py - 31, 2, 2); // 圖騰眼
  },
  pillar(x, px, py, th, rnd) { // 石柱:直柱 + 柱頭
    const col = _mix(th.base, TOKENS.BG_DEEP, 0.58);
    x.fillStyle = col; x.fillRect(px - 5, py - 40, 10, 40);
    x.fillRect(px - 8, py - 44, 16, 5); x.fillRect(px - 7, py - 3, 14, 3);
    x.fillStyle = _mix(col, TOKENS.BG_DEEP, 0.4); x.fillRect(px - 1, py - 40, 2, 37); // 直坑紋
  },
};

// (2) 兩側叢林/城牆剪影(比地面深 ~2 級,垂直無縫平鋪)+ 主題 props
function buildSideTile(sw, theme) {
  theme = theme || THEMES[0];
  const h = 420;
  const c = makeCanvas(sw, h), x = c.getContext('2d');
  const far = _mix(theme.base, TOKENS.BG_DEEP, 0.74);
  const near = _mix(theme.base, TOKENS.BG_DEEP, 0.58);
  const bandW = sw * 0.5;
  x.fillStyle = far;
  x.fillRect(0, 0, bandW, h);
  const soft = x.createLinearGradient(bandW * 0.4, 0, bandW * 1.15, 0);
  soft.addColorStop(0, far); soft.addColorStop(1, 'rgba(0,0,0,0)');
  x.fillStyle = soft; x.fillRect(0, 0, sw, h);
  // 每個元素畫 3 次(-h / 0 / +h)確保上下無縫
  const rnd = mulberry32(theme.seed);
  let y = -20;
  while (y < h + 20) {
    y += 34 + rnd() * 66;
    if (rnd() < 0.55) {
      const cx = bandW * 0.55 + rnd() * sw * 0.28;
      const R = 12 + rnd() * 16;
      const blobs = [];
      for (let k = 0; k < 5; k++) blobs.push([(rnd() - 0.5) * R * 1.4, (rnd() - 0.5) * R * 1.4, R * (0.5 + rnd() * 0.55)]);
      for (const oy of [-h, 0, h]) {
        x.fillStyle = near;
        for (const b of blobs) { x.beginPath(); x.arc(cx + b[0], y + oy + b[1], b[2], 0, 7); x.fill(); }
      }
    } else {
      const bw = bandW + sw * (0.12 + rnd() * 0.3);
      const bh = 26 + rnd() * 40;
      for (const oy of [-h, 0, h]) { x.fillStyle = near; x.fillRect(0, y + oy, bw, bh); }
    }
  }
  // props:每 420px 每邊 2-4 件(theme.props 重複項 = 密度加倍),同款相鄰最少隔 120px;bake 入 tile 一齊視差滾動
  BG.torches = [];
  const prnd = mulberry32(theme.seed + 77);
  const nProps = Math.min(theme.props.length + 1, 2 + Math.floor(prnd() * 3) + (theme.props.length > 4 ? 1 : 0));
  const slotH = h / nProps;
  for (let i = 0; i < nProps; i++) {
    const kind = theme.props[i % theme.props.length];
    const fn = PROP_DRAW[kind];
    if (!fn) continue;
    const py = i * slotH + slotH * (0.3 + prnd() * 0.5); // 各佔一段,天然滿足 ≥120px 間距
    const px = Math.max(14, Math.min(sw - 10, sw * (0.45 + prnd() * 0.4)));
    // 每件形狀用獨立 seed,三次 wrap 繪製各自重開 rnd → 三份完全一致
    for (const oy of [-h, 0, h]) {
      const r = fn(x, px, py + oy, theme, mulberry32(theme.seed + i * 31));
      if (r && r.flame && oy === 0) BG.torches.push({ x: r.flame[0], y: r.flame[1], weak: !!r.weak, phase: i * 2.7 });
    }
  }
  return c;
}

// (3)(4) 靜態疊層:車道內側暗角 + 邊軌 + 頂部霧化 gradient(主題霧色)+ 左右下角 vignette
function buildOverlay(theme) {
  theme = theme || THEMES[0];
  const c = makeCanvas(Math.max(1, Math.ceil(W)), Math.max(1, Math.ceil(H))), x = c.getContext('2d');
  const inner = x.createLinearGradient(laneL, 0, laneR, 0);
  inner.addColorStop(0, 'rgba(0,0,0,0.30)');
  inner.addColorStop(0.12, 'rgba(0,0,0,0)');
  inner.addColorStop(0.88, 'rgba(0,0,0,0)');
  inner.addColorStop(1, 'rgba(0,0,0,0.30)');
  x.fillStyle = inner; x.fillRect(laneL, 0, laneW, H);
  x.fillStyle = _mix(theme.line, TOKENS.BG_DEEP, 0.2);
  x.fillRect(laneL - 8, 0, 8, H);
  x.fillRect(laneR, 0, 8, H);
  // 頂部(敵人生成區)由深至淺霧化,暗示縱深;沼澤主題全 game 唯一霧加強例外
  const fogH = theme.fogBoost ? Math.min(H * 0.40, 300) : Math.min(H * 0.34, 260);
  const fog = x.createLinearGradient(0, 0, 0, fogH);
  fog.addColorStop(0, bgDeepA(theme.fogBoost ? 0.78 : 0.72));
  fog.addColorStop(0.45, bgDeepA(0.28));
  fog.addColorStop(1, bgDeepA(0));
  x.fillStyle = fog; x.fillRect(0, 0, W, fogH);
  const hz = theme.haze.replace(/[\d.]+\)$/, ''); // 'rgba(r,g,b,' 前綴,0 同峰值兩檔
  const haze = x.createLinearGradient(0, 0, 0, fogH);
  haze.addColorStop(0, hz + '0)');
  haze.addColorStop(0.62, theme.haze);
  haze.addColorStop(1, hz + '0)');
  x.fillStyle = haze; x.fillRect(0, 0, W, fogH);
  // 左右下角 vignette
  const vr = Math.max(W, H) * 0.45;
  for (const cx of [0, W]) {
    const rg = x.createRadialGradient(cx, H, 0, cx, H, vr);
    rg.addColorStop(0, 'rgba(0,0,0,0.34)');
    rg.addColorStop(0.5, 'rgba(0,0,0,0.10)');
    rg.addColorStop(1, 'rgba(0,0,0,0)');
    x.fillStyle = rg; x.fillRect(0, 0, W, H);
  }
  return c;
}

function buildBackground() {
  const theme = THEMES[themeForLevel(G.level)] || THEMES[0];
  BG.themeIndex = themeForLevel(G.level);
  BG.ground = buildGroundTile(laneW, theme);
  BG.sideW = Math.max(0, Math.round(laneL));
  if (BG.sideW > 6) { BG.side = buildSideTile(BG.sideW, theme); BG.sideH = BG.side.height; }
  else { BG.side = null; BG.sideH = 0; BG.torches = []; }
  BG.overlay = buildOverlay(theme);
  BG.ready = true;
}

// 換主題(startLevel 內 call):snapshot 舊層做 1s 淡出,再 build 新主題
function switchTheme() {
  const ti = themeForLevel(G.level);
  if (ti === BG.themeIndex) return;
  if (BG.ready) {
    BG.prev = { ground: BG.ground, side: BG.side, overlay: BG.overlay, sideH: BG.sideH, torches: BG.torches };
    G.themeFadeT = 1.0;
  }
  buildBackground();
}

// 畫一套背景層(現行 / 過場舊層共用)
function _drawBGLayers(L) {
  // (2) 兩側剪影:縱向視差,慢過地面 → 「向前衝」感
  if (L.side) {
    const par = ((G.bgScroll * 0.28) % L.sideH + L.sideH) % L.sideH;
    for (let y = par - L.sideH; y < H; y += L.sideH) {
      ctx.drawImage(L.side, 0, y);
      ctx.save(); ctx.translate(W, y); ctx.scale(-1, 1); ctx.drawImage(L.side, 0, 0); ctx.restore();
    }
  }
  // (1) 磚地:隨關卡向下滾
  ctx.save();
  ctx.beginPath(); ctx.rect(laneL, 0, laneW, H); ctx.clip();
  for (let y = (G.bgOffset % GROUND_TILE_H) - GROUND_TILE_H; y < H; y += GROUND_TILE_H) {
    ctx.drawImage(L.ground, laneL, y);
  }
  ctx.restore();
  // (3)(4) 靜態疊層
  ctx.drawImage(L.overlay, 0, 0);
}

function drawRoad() {
  if (!BG.ready) buildBackground();
  ctx.fillStyle = TOKENS.BG_DEEP;
  ctx.fillRect(0, 0, W, H);
  // 主題過場:1s 內舊層墊底,新層 alpha 淡入
  if (G.themeFadeT > 0 && BG.prev) {
    _drawBGLayers(BG.prev);
    ctx.globalAlpha = 1 - G.themeFadeT;
    _drawBGLayers(BG);
    ctx.globalAlpha = 1;
  } else {
    if (BG.prev) BG.prev = null; // 過場完即棄舊層 canvas
    _drawBGLayers(BG);
  }
}

// ---------------- 光影層 + 後處理(bloom / color grade / 動態降級)----------------
// 全部 glow(隊伍 spotlight / 門 / 子彈 / 火把 flicker)集中畫落一塊 light canvas,
// 再用 globalCompositeOperation='lighter' 一次過 additive 合成落主畫面;bloom 由同一塊 canvas 派生。
const FXQ = { level: 0, light: true, bloom: true, grade: true, min: false, _bad: 0, _acc: 0, _n: 0 };
function fxDegrade() {
  FXQ.level++;
  if (FXQ.level === 1) { FXQ.bloom = false; console.warn('[FXQ] 降級1:關 bloom,glow 轉直繪(慳全屏合成)'); }
  else { FXQ.min = true; FXQ.grade = false; console.warn('[FXQ] 降級2:只留門 glow(讀性規則:門必須最搶眼),關 spotlight/子彈/火把/grade'); }
}
// 軟渲染偵測:WebGL renderer 係 SwiftShader/software → 出廠即降級1
// (bloom 條「全屏 lighter 合成」喺軟渲染實測 ~3.5ms/幀;GPU 環境先開盡)
try {
  const _gl = document.createElement('canvas').getContext('webgl');
  const _ext = _gl && _gl.getExtension('WEBGL_debug_renderer_info');
  const _rend = _ext ? String(_gl.getParameter(_ext.UNMASKED_RENDERER_WEBGL)) : '';
  if (/swiftshader|software|llvmpipe/i.test(_rend)) fxDegrade();
} catch (e) {}

const LIGHT = { c: null, x: null, s1: null, s1x: null, s2: null, s2x: null, spr: null, filterOK: false };
// light canvas 用 CSS px 一半解像度(亦唔跟 DPR):glow 全部係軟光,升採樣零觀感差異,
// 填充成本直接除 4(軟渲染 fallback 環境實測 light 層由 3.7ms 壓落去)
function buildLightLayer() {
  LIGHT.c = makeCanvas(Math.max(1, Math.ceil(W / 2)), Math.max(1, Math.ceil(H / 2)));
  LIGHT.x = LIGHT.c.getContext('2d');
  LIGHT.x.setTransform(0.5, 0, 0, 0.5, 0, 0); // 繪製 code 照用 CSS px 座標
  const sw = Math.max(1, Math.ceil(W / 4)), sh = Math.max(1, Math.ceil(H / 4));
  LIGHT.s1 = makeCanvas(sw, sh); LIGHT.s1x = LIGHT.s1.getContext('2d');
  LIGHT.s2 = makeCanvas(Math.max(1, sw >> 1), Math.max(1, sh >> 1)); LIGHT.s2x = LIGHT.s2.getContext('2d');
  LIGHT.filterOK = typeof LIGHT.s1x.filter === 'string'; // 舊 Safari 冇 ctx.filter → bloom 走雙級 downsample 路徑
}
// 預渲染 radial glow sprites(每幀只 drawImage,唔即場起 gradient)
function _radialSpr(size, r, g, b, a0) {
  const c = makeCanvas(size, size), x = c.getContext('2d');
  const gr = x.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
  gr.addColorStop(0, `rgba(${r},${g},${b},${a0})`);
  gr.addColorStop(0.4, `rgba(${r},${g},${b},${a0 * 0.38})`);
  gr.addColorStop(1, `rgba(${r},${g},${b},0)`);
  x.fillStyle = gr; x.fillRect(0, 0, size, size);
  return c;
}
function buildLightSprites() {
  LIGHT.spr = {
    spot: _radialSpr(160, 255, 236, 190, 0.13),   // 隊伍腳下暖白 spotlight(alpha 已 bake 低)
    gateGreen: _radialSpr(128, 82, 255, 60, 0.9), // GATE_GREEN_GLOW
    gateRed: _radialSpr(128, 255, 58, 33, 0.9),   // GATE_RED_GLOW
    gateGem: _radialSpr(128, 111, 206, 255, 0.9), // 晶石門藍
    bullet: _radialSpr(16, 238, 197, 86, 0.8),    // BULLET_GOLD 系細 glow
    torch: _radialSpr(64, 232, 169, 58, 0.55),    // 火把焰(CTA_HI 系暖橙,bloom 內先擴散)
  };
}

// 所有 glow 畫落任意 2d context(主 canvas 直繪 / light canvas 兩用;只用 drawImage+strokeRect)
function _drawGlows(lx) {
  const spr = LIGHT.spr;
  const now = performance.now() / 1000;
  // (1) 隊伍腳下柔和 spotlight
  if (G.dots.length && !FXQ.min) {
    const r = squadHalfWidth() + 84;
    lx.globalAlpha = 1;
    lx.drawImage(spr.spot, G.squadX - r, squadY + 18 - r * 0.5, r * 2, r);
  }
  // (2) 門 glow:內發光 + 脈動邊光(唔用 shadowBlur,halo 交俾 bloom / 靠 sprite 漸層)
  for (const g of G.gates) {
    if (g.used) continue;
    const isGem = g.kind === 'gem';
    const good = !isGem && gateIsGood(g);
    const gs = isGem ? spr.gateGem : (good ? spr.gateGreen : spr.gateRed);
    const glowCol = isGem ? '#6fceff' : (good ? TOKENS.GATE_GREEN_GLOW : TOKENS.GATE_RED_GLOW);
    const pulse = 0.5 + 0.5 * Math.sin(now * 4.2 + g.x * 0.02);
    lx.globalAlpha = 0.20 + pulse * 0.36;
    lx.drawImage(gs, g.x - g.w * 0.62, g.y - g.h * 0.60, g.w * 1.24, g.h * 1.20);
    lx.globalAlpha = 0.35 + pulse * 0.5;
    lx.strokeStyle = glowCol; lx.lineWidth = 2 + pulse * 2.5;
    lx.strokeRect(g.x - g.w / 2 + 2, g.y - g.h / 2 + 2, g.w - 4, g.h - 4);
  }
  // (3) 子彈細 glow(尾跡/主彈本體照舊喺 drawBullets,呢度只補一層薄光)
  if (!FXQ.min) {
    lx.globalAlpha = 0.38;
    for (const b of G.bullets) {
      if (!b.drone) lx.drawImage(spr.bullet, b.x - 4, b.y - 10, 8, 18);
    }
  }
  // (4) 火把/火盆 flicker glow(baked 靜態底暈之上嘅呼吸層,跟側帶視差滾動 + 左右鏡像)
  if (BG.side && BG.torches.length && !FXQ.min) {
    const par = ((G.bgScroll * 0.28) % BG.sideH + BG.sideH) % BG.sideH;
    for (const tc of BG.torches) {
      const flick = 0.5 + 0.32 * Math.sin(now * 8.7 + tc.phase) + 0.18 * Math.sin(now * 13.3 + tc.phase * 1.7);
      const R = (tc.weak ? 20 : 28) * (0.92 + 0.10 * flick);
      lx.globalAlpha = (tc.weak ? 0.5 : 1) * (0.30 + 0.28 * flick);
      for (let y = par - BG.sideH; y < H; y += BG.sideH) {
        const ty = tc.y + y;
        if (ty < -40 || ty > H + 40) continue;
        lx.drawImage(spr.torch, tc.x - R, ty - R, R * 2, R * 2);
        lx.drawImage(spr.torch, W - tc.x - R, ty - R, R * 2, R * 2);
      }
    }
  }
  lx.globalAlpha = 1;
}

function drawLightLayer() {
  if (!FXQ.light) return;
  if (!LIGHT.spr) buildLightSprites();
  // bloom 關(降級1 / 軟渲染):glow 直繪主 canvas,慳走「全屏 lighter 合成」
  // (軟渲染實測全屏合成 ~3.5ms,係 light 層成本大頭;直繪只付 glow 面積成本)
  if (!FXQ.bloom) {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    _drawGlows(ctx);
    ctx.restore();
    return;
  }
  // bloom 開:glow 集中落 light canvas(半解像度),一次 additive 合成 + 1/4 res blur 疊加
  if (!LIGHT.c) buildLightLayer();
  const lx = LIGHT.x;
  lx.clearRect(0, 0, W + 2, H + 2); // CSS px 座標(內部 transform 0.5 對應成塊半解像度 canvas)
  lx.globalCompositeOperation = 'lighter';
  _drawGlows(lx);
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.drawImage(LIGHT.c, 0, 0, W, H);
  // bloom:light layer 額外落 1/4 解像度 offscreen,blur 後疊返上去(亮位自然擴散)
  const s1 = LIGHT.s1, sx = LIGHT.s1x;
  sx.clearRect(0, 0, s1.width, s1.height);
  if (LIGHT.filterOK) {
    sx.filter = 'blur(3px)';
    sx.drawImage(LIGHT.c, 0, 0, s1.width, s1.height);
    sx.filter = 'none';
    ctx.globalAlpha = 0.55;
    ctx.drawImage(s1, 0, 0, W, H);
  } else {
    sx.drawImage(LIGHT.c, 0, 0, s1.width, s1.height); // 冇 ctx.filter:雙級 downsample 近似 blur
    const s2 = LIGHT.s2, s2x = LIGHT.s2x;
    s2x.clearRect(0, 0, s2.width, s2.height);
    s2x.drawImage(s1, 0, 0, s2.width, s2.height);
    ctx.globalAlpha = 0.55;
    ctx.drawImage(s2, 0, 0, W, H);
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

function gateLabel(g) {
  if (g.kind === 'count') return (g.v >= 0 ? '+' : '') + g.v;
  if (g.kind === 'gem') return '💎 +' + g.v;
  if (g.kind === 'mul') return 'x1.5';
  if (g.kind === 'dmg') return '火力+25%';
  if (g.kind === 'rate') return '射速+25%';
  if (g.kind === 'up') return ITEM_NAME[g.id] + '+1';
  return '';
}
function gateIsGood(g) {
  if (g.kind === 'count') return g.v >= 0;
  return true;
}

function drawGates() {
  // 門 glow(內發光 + 脈動邊光)已遷移去 light layer(drawLightLayer),一次過 additive 合成
  for (const g of G.gates) {
    if (g.used) continue;
    const isGem = g.kind === 'gem';
    const good = !isGem && gateIsGood(g);
    const glowCol = isGem ? '#6fceff' : (good ? TOKENS.GATE_GREEN_GLOW : TOKENS.GATE_RED_GLOW);

    // 門框
    if (isGem) {
      ctx.fillStyle = 'rgba(40,90,130,0.35)';
      ctx.fillRect(g.x - g.w / 2, g.y - g.h / 2, g.w, g.h);
      ctx.strokeStyle = '#5ab0e8'; ctx.lineWidth = 3;
      ctx.strokeRect(g.x - g.w / 2, g.y - g.h / 2, g.w, g.h);
    } else {
      drawSprite(good ? 'gateGreen' : 'gateRed', g.x, g.y, g.w, g.h);
    }

    // 數值:加大加粗 + 深描邊 + 字身發光
    const big = isGem || g.kind === 'count' || g.kind === 'mul';
    ctx.font = `900 ${big ? 34 : 23}px "Noto Sans TC",sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.lineJoin = 'round'; ctx.lineWidth = 6;
    ctx.strokeStyle = 'rgba(0,0,0,0.72)';
    ctx.strokeText(gateLabel(g), g.x, g.y + 8);
    ctx.save();
    ctx.shadowColor = glowCol; ctx.shadowBlur = 12;
    ctx.fillStyle = isGem ? '#eaf7ff' : (good ? '#eaffdc' : '#ffe2da');
    ctx.fillText(gateLabel(g), g.x, g.y + 8);
    ctx.restore();
  }
}

function enemySprite(e) {
  return variantSprite(e.fam, e.tier, e.hue, e.sat, e.name) || SPRITES[e.fam];
}

// ---- 戰場視覺優先級輔助 ----
const BULLET_GOLD = 'rgb(238,197,86)'; // GOLD 去飽和 15%(退居背景)
const OUTLINE_OFFSETS = [[-2.4, 0], [2.4, 0], [0, -2.4], [0, 2.4], [-1.7, -1.7], [1.7, -1.7], [-1.7, 1.7], [1.7, 1.7]];
// 黑色剪影 outline(只靠 alpha 形狀,同 tint 無關 → 每個 base 只 build 一次)
const _outlineCache = new Map();
function outlineSprite(base) {
  if (_outlineCache.has(base)) return _outlineCache.get(base);
  const spr = SPRITES[base];
  if (!spr) { _outlineCache.set(base, null); return null; }
  const c = makeCanvas(spr.width, spr.height), x = c.getContext('2d');
  x.filter = 'brightness(0)';
  x.drawImage(spr, 0, 0);
  x.filter = 'none';
  _outlineCache.set(base, c);
  return c;
}
// 體型按 size(≈HP)分 3 級:最細嗰批 +40%
function enemyDrawScale(sz) { return sz < 50 ? 1.4 : sz < 62 ? 1.2 : 1.05; }
// 取敵人代表色(死亡爆同色 particles),抽樣一次後 cache 落 sprite canvas
function enemyColor(e) {
  const spr = enemySprite(e) || SPRITES[e.fam];
  if (!spr) return '#cfd8c0';
  if (spr._avg) return spr._avg;
  try {
    const c = makeCanvas(spr.width, spr.height), x = c.getContext('2d');
    x.drawImage(spr, 0, 0);
    const d = x.getImageData(0, 0, spr.width, spr.height).data;
    let r = 0, g = 0, b = 0, n = 0;
    for (let i = 0; i < d.length; i += 16) {
      if (d[i + 3] > 80) { r += d[i]; g += d[i + 1]; b += d[i + 2]; n++; }
    }
    spr._avg = n ? `rgb(${Math.min(255, (r / n | 0) + 28)},${Math.min(255, (g / n | 0) + 28)},${Math.min(255, (b / n | 0) + 28)})` : '#cfd8c0';
  } catch (err) { spr._avg = '#cfd8c0'; }
  return spr._avg;
}
// 深色 outline + 腳底橢圓陰影,強化任何敵人喺地面上嘅對比度
function drawEnemyOutline(base, cx, cy, w, h, alpha) {
  const o = outlineSprite(base);
  if (!o) return;
  const a = alpha == null ? 1 : alpha;
  const prev = ctx.globalAlpha;
  ctx.globalAlpha = prev * a;
  for (const off of OUTLINE_OFFSETS) ctx.drawImage(o, cx - w / 2 + off[0], cy - h / 2 + off[1], w, h);
  ctx.globalAlpha = prev;
}
function drawFootShadow(cx, cy, w) {
  ctx.fillStyle = 'rgba(0,0,0,0.30)';
  ctx.beginPath(); ctx.ellipse(cx, cy, w * 0.40, w * 0.15, 0, 0, 7); ctx.fill();
}

// ============ 怪物變體系統(共用 helper,按 tier 決定配件/風格)============
// t0 原形 / t1 頭盔 / t2 眼罩+疤 / t3 暗影(降飽和+紫眼) / t4 深淵(aura+粒子)
function variantStyle(tier, name) {
  if (tier == null) {
    name = name || '';
    if (/深淵|冥府|虛空|亡靈|遠古|軍閥|領主|之母|之王/.test(name)) return { abyss: true };
    if (/暗影|暗月|夢魘|夜魔|詛咒/.test(name)) return { shadow: true };
    return {};
  }
  if (tier <= 0) return {};
  if (tier === 1) return { accessory: 'helmet' };
  if (tier === 2) return { accessory: 'thug' };
  if (tier === 3) return { shadow: true };
  return { abyss: true };
}
// 配件擺位以 sprite 尺寸比例計算(共用,唔逐隻手搓)。怪物面朝下,眼喺下半中央。
function drawHelmet(x, w, h) {
  const cx = w * 0.5, hw = w * 0.25, topY = h * 0.40, browY = h * 0.62;
  x.fillStyle = '#5a6472';
  x.beginPath();
  x.moveTo(cx - hw, browY);
  x.quadraticCurveTo(cx - hw, topY, cx, topY - h * 0.03);
  x.quadraticCurveTo(cx + hw, topY, cx + hw, browY);
  x.closePath(); x.fill();
  x.fillStyle = '#7c8698'; x.beginPath(); x.ellipse(cx - hw * 0.35, topY + h * 0.06, hw * 0.4, h * 0.05, 0, 0, 7); x.fill();
  x.fillStyle = '#8f99a8'; x.fillRect(cx - 1.3, topY - h * 0.02, 2.6, browY - topY + h * 0.02); // 中脊
  x.fillStyle = '#3f4650'; x.fillRect(cx - hw, browY - 2.5, hw * 2, 3.5);                        // 護額
  x.strokeStyle = '#2b3038'; x.lineWidth = 1.5;
  x.beginPath(); x.moveTo(cx - hw, browY); x.quadraticCurveTo(cx, topY - h * 0.04, cx + hw, browY); x.stroke();
}
function drawThug(x, w, h) {
  const cx = w * 0.5, eyeY = h * 0.70, eyeDX = w * 0.075;
  // 眼罩(遮一隻眼)+ 斜綁帶
  const px = cx + eyeDX;
  x.strokeStyle = '#0d0e11'; x.lineWidth = 2.2;
  x.beginPath(); x.moveTo(cx - eyeDX * 1.9, eyeY - h * 0.11); x.lineTo(px + w * 0.10, eyeY + w * 0.05); x.stroke();
  x.fillStyle = '#17191d';
  x.beginPath(); x.ellipse(px, eyeY, w * 0.08, w * 0.065, 0, 0, 7); x.fill();
  x.strokeStyle = '#33373d'; x.lineWidth = 1; x.stroke();
  // 疤痕(另一邊斜線 + 縫)
  x.strokeStyle = 'rgba(206,66,54,0.9)'; x.lineWidth = 1.8;
  x.beginPath(); x.moveTo(cx - eyeDX * 1.7, eyeY - h * 0.12); x.lineTo(cx - eyeDX * 1.0, eyeY + w * 0.03); x.stroke();
  x.lineWidth = 1;
  for (let i = -1; i <= 1; i++) { const t = i * 0.045; x.beginPath(); x.moveTo(cx - eyeDX * 1.35 + t * w - 2.4, eyeY - h * 0.045 + t * h * 0.8); x.lineTo(cx - eyeDX * 1.35 + t * w + 2.4, eyeY - h * 0.045 + t * h * 0.8); x.stroke(); }
}
function drawShadowEyes(x, w, h) {
  const cx = w * 0.5, eyeY = h * 0.70, eyeDX = w * 0.07;
  x.save(); x.globalCompositeOperation = 'lighter';
  for (const s of [-1, 1]) {
    const ex = cx + s * eyeDX;
    const g = x.createRadialGradient(ex, eyeY, 0, ex, eyeY, w * 0.1);
    g.addColorStop(0, '#efc8ff'); g.addColorStop(0.4, '#a94dff'); g.addColorStop(1, 'rgba(120,40,200,0)');
    x.fillStyle = g; x.beginPath(); x.arc(ex, eyeY, w * 0.1, 0, 7); x.fill();
  }
  x.restore();
}
// ==== tier 三件套補完(每 tier = 換色 + 配件 + 細節,禁純換色)====
// t1 細節:鋼灰肩甲(同頭盔一套色),±0.28w / 0.48h
function drawPauldrons(x, w, h) {
  for (const s of [-1, 1]) {
    const px = w * 0.5 + s * w * 0.28, py = h * 0.48, r = w * 0.10;
    x.fillStyle = '#5a6472';
    x.beginPath(); x.ellipse(px, py, r, r * 0.78, 0, 3.14, 0); x.fill();
    x.fillStyle = '#7c8698';
    x.beginPath(); x.ellipse(px - r * 0.25, py - r * 0.22, r * 0.5, r * 0.22, -0.2, 3.14, 0); x.fill();
    x.strokeStyle = '#3f4650'; x.lineWidth = Math.max(1.2, w * 0.012);
    x.beginPath(); x.ellipse(px, py, r, r * 0.78, 0, 3.14, 0); x.stroke();
    x.beginPath(); x.moveTo(px - r, py); x.lineTo(px + r, py); x.stroke();

}
// t3 細節:腳底暗影霧(實色多層 opacity,唔用 blur;發光眼由 drawShadowEyes 負責)
function drawShadowMist(x, w, h) {

  x.fillStyle = 'rgba(58,36,80,0.42)';
  x.beginPath(); x.ellipse(cx, my, w * 0.34, h * 0.075, 0, 0, 7); x.fill();

  x.beginPath(); x.ellipse(cx + w * 0.15, my - h * 0.015, w * 0.13, h * 0.045, 0.2, 0, 7); x.fill();

  x.strokeStyle = 'rgba(120,70,180,0.5)'; x.lineWidth = Math.max(1.5, w * 0.02); x.lineCap = 'round';
  x.beginPath(); x.moveTo(cx - w * 0.22, my); x.quadraticCurveTo(cx - w * 0.28, my - h * 0.10, cx - w * 0.23, my - h * 0.16); x.stroke();
  x.beginPath(); x.moveTo(cx + w * 0.24, my - h * 0.01); x.quadraticCurveTo(cx + w * 0.30, my - h * 0.09, cx + w * 0.26, my - h * 0.15); x.stroke();

// t4 配件:深淵曲角一對(0.35w/0.65w,錨喺頭頂殼 0.40h;深紫 + 亮邊)
function drawAbyssHorns(x, w, h) {
  for (const s of [-1, 1]) {
    const bx = w * 0.5 + s * w * 0.15, by = h * 0.42;
    x.fillStyle = '#3a2450';
    x.beginPath();

    x.quadraticCurveTo(bx + s * w * 0.055, by - h * 0.075, bx - s * w * 0.045, by - h * 0.02);
    x.closePath(); x.fill();
    x.strokeStyle = '#1e1230'; x.lineWidth = Math.max(1.2, w * 0.014);
    x.stroke();
    x.strokeStyle = '#8a5cc0'; x.lineWidth = Math.max(1, w * 0.010);
    x.beginPath();
    x.moveTo(bx + s * w * 0.01, by - h * 0.025);
    x.quadraticCurveTo(bx + s * w * 0.07, by - h * 0.09, bx + s * w * 0.045, by - h * 0.14);
    x.stroke();
  }
}
function drawCrown(x, w, h) {
  const cx = w * 0.5, cw = w * 0.22, baseY = h * 0.40, ph = h * 0.14;
  x.fillStyle = TOKENS.GOLD;
  x.beginPath();
  x.moveTo(cx - cw, baseY);
  x.lineTo(cx - cw, baseY - ph * 0.45);
  x.lineTo(cx - cw * 0.5, baseY - ph * 0.15);
  x.lineTo(cx - cw * 0.18, baseY - ph);
  x.lineTo(cx, baseY - ph * 0.25);
  x.lineTo(cx + cw * 0.18, baseY - ph);
  x.lineTo(cx + cw * 0.5, baseY - ph * 0.15);
  x.lineTo(cx + cw, baseY - ph * 0.45);
  x.lineTo(cx + cw, baseY);
  x.closePath(); x.fill();
  x.strokeStyle = '#8a5a12'; x.lineWidth = 1.2; x.stroke();
  x.fillStyle = '#ff4d6a'; x.beginPath(); x.arc(cx, baseY - ph * 0.2, w * 0.03, 0, 7); x.fill(); // 寶石
  x.fillStyle = '#bfe0ff'; x.beginPath(); x.arc(cx - cw * 0.6, baseY - ph * 0.28, w * 0.02, 0, 7); x.arc(cx + cw * 0.6, baseY - ph * 0.28, w * 0.02, 0, 7); x.fill();
}
// 在既有 canvas 內烘一層柔光暈(halo 放喺 sprite 後面,唔洗蓋淡本體)
function auraCanvas(spr, color) {
  const w = spr.width, h = spr.height, c = makeCanvas(w, h), x = c.getContext('2d');
  x.drawImage(spr, 0, 0);
  x.save(); x.globalCompositeOperation = 'destination-over';
  const g = x.createRadialGradient(w / 2, h / 2, w * 0.14, w / 2, h / 2, w * 0.54);
  g.addColorStop(0, color || 'rgba(158,78,232,0.6)'); g.addColorStop(1, 'rgba(158,78,232,0)');
  x.fillStyle = g; x.fillRect(0, 0, w, h); x.restore();
  return c;
}
// 主 helper:tint base → 加配件/暗影,cache 落 fam|tier
const VARIANTS = {};
// 三件套組裝:t1 頭盔+肩甲 / t2 眼罩+疤痕 / t3 降飽和+暗影霧+紫眼 / t4 曲角+aura(runtime)+粒子
function decorateVariant(x, w, h, st) {
  if (st.abyss) drawAbyssHorns(x, w, h);
  if (st.accessory === 'helmet') { drawPauldrons(x, w, h); drawHelmet(x, w, h); }
  else if (st.accessory === 'thug') drawThug(x, w, h);
  if (st.shadow) { drawShadowMist(x, w, h); drawShadowEyes(x, w, h); }
}
function variantSprite(fam, tier, hue, sat, name) {
  const key = fam + '|' + tier;
  if (VARIANTS[key]) return VARIANTS[key];
  const base = tintSprite(fam, hue, sat) || SPRITES[fam];
  if (!base) return null;
  const st = variantStyle(tier, name);
  if (!st.accessory && !st.shadow && !st.abyss) { VARIANTS[key] = base; return base; } // 原形
  const w = base.width, h = base.height, c = makeCanvas(w, h), x = c.getContext('2d');
  if (st.shadow) { x.filter = 'saturate(0.32) brightness(0.86)'; x.drawImage(base, 0, 0); x.filter = 'none'; }
  else x.drawImage(base, 0, 0);
  decorateVariant(x, w, h, st);
  VARIANTS[key] = c;
  return c;
}

// ============ 階段4:部件級變體(身/頭/武器逐 part tint+配件,runtime transform 組合)============
function _tintCanvas(src, hue, sat, shadow) {
  const c = makeCanvas(src.width, src.height), x = c.getContext('2d');
  let f = '';
  if (hue || (sat && sat !== 1)) f = `hue-rotate(${hue || 0}deg) saturate(${sat || 1})`;
  if (shadow) f += (f ? ' ' : '') + 'saturate(0.32) brightness(0.86)';
  if (f) x.filter = f;
  x.drawImage(src, 0, 0);
  if (f) x.filter = 'none';
  return c;
}
const VARIANT_PARTS = {};
// 回傳 { body, head, weapon? } 已 tint+配件嘅部件 canvas;無 data-part 標記(PNG 注入/fallback)回傳 null
function variantParts(fam, tier, hue, sat, name) {
  const key = fam + '|' + tier;
  if (key in VARIANT_PARTS) return VARIANT_PARTS[key];
  const p = PARTS[fam];
  if (!p) { VARIANT_PARTS[key] = null; return null; }
  const st = variantStyle(tier, name);
  const out = { _names: p._names };
  for (const n of p._names) {
    const c = _tintCanvas(p[n], hue, sat, st.shadow);
    const x = c.getContext('2d'), w = c.width, h = c.height;
    // 配件分部位烘:頭盔/眼罩/紫眼/曲角 → head;肩甲/暗影霧 → body
    if (n === 'head') {
      if (st.abyss) drawAbyssHorns(x, w, h);
      if (st.accessory === 'helmet') drawHelmet(x, w, h);
      else if (st.accessory === 'thug') drawThug(x, w, h);
      if (st.shadow) drawShadowEyes(x, w, h);
    } else if (n === 'body') {
      if (st.accessory === 'helmet') drawPauldrons(x, w, h);
      if (st.shadow) drawShadowMist(x, w, h);
    }
    out[n] = c;
  }
  VARIANT_PARTS[key] = out;
  return out;
}

// ============ 階段4:預渲染 FX sprites(runtime 只准 drawImage + transform)============
const FX_SPR = { muzzle: null, aura: null, bossAura: null };
// 槍口位置(catBase 128 座標 y;換算 local offset 用)
const GUN_MUZZLE_Y = { rifle: 11, sniper: 6, shotgun: 17, rocket: 7, mg: 11 };
function buildFXSprites() {
  // muzzle flash:additive 圓形 glow(白芯→金→透明)
  {
    const s = 48, c = makeCanvas(s, s), x = c.getContext('2d');
    const g = x.createRadialGradient(s / 2, s / 2, 0, s / 2, s / 2, s / 2);
    g.addColorStop(0, 'rgba(255,250,225,0.95)');
    g.addColorStop(0.3, 'rgba(255,214,110,0.8)');
    g.addColorStop(0.65, 'rgba(255,150,40,0.35)');
    g.addColorStop(1, 'rgba(255,120,20,0)');
    x.fillStyle = g;
    x.beginPath(); x.arc(s / 2, s / 2, s / 2, 0, 7); x.fill();
    FX_SPR.muzzle = c;
  }
  // 深淵 aura:放射狀紫光(8 楔形 + radial 衰減),rotate 先睇得出轉動
  const mkAura = (size, inner, colA, colB) => {
    const c = makeCanvas(size, size), x = c.getContext('2d'), cx = size / 2;
    x.translate(cx, cx);
    for (let i = 0; i < 8; i++) {
      x.save(); x.rotate(i * Math.PI / 4);
      const g = x.createLinearGradient(0, 0, 0, -cx);
      g.addColorStop(0, colA); g.addColorStop(1, colB);
      x.fillStyle = g;
      x.beginPath();
      x.moveTo(0, -cx * 0.22);
      x.quadraticCurveTo(-cx * 0.2, -cx * 0.55, 0, -cx * 0.96);
      x.quadraticCurveTo(cx * 0.2, -cx * 0.55, 0, -cx * 0.22);
      x.closePath(); x.fill();
      x.restore();
    }
    const rg = x.createRadialGradient(0, 0, size * 0.06, 0, 0, cx * 0.62);
    rg.addColorStop(0, inner); rg.addColorStop(1, 'rgba(150,70,230,0)');
    x.fillStyle = rg;
    x.beginPath(); x.arc(0, 0, cx * 0.62, 0, 7); x.fill();
    return c;
  };
  FX_SPR.aura = mkAura(128, 'rgba(150,70,230,0.30)', 'rgba(158,78,232,0.28)', 'rgba(158,78,232,0)');
  FX_SPR.bossAura = mkAura(256, 'rgba(168,86,240,0.45)', 'rgba(168,86,240,0.40)', 'rgba(168,86,240,0)');
}

// 披風/戰旗類用 destination-over 烘喺本體後面
function _bossScar(x, w, h, x1, y1, x2, y2) {
  x.strokeStyle = 'rgba(206,66,54,0.9)'; x.lineWidth = Math.max(1.5, w * 0.016); x.lineCap = 'round';
  x.beginPath(); x.moveTo(w * x1, h * y1); x.lineTo(w * x2, h * y2); x.stroke();
  const mx = w * (x1 + x2) / 2, my = h * (y1 + y2) / 2, dx = w * (x2 - x1), dy = h * (y2 - y1);
  const L = Math.hypot(dx, dy) || 1, nx = -dy / L, ny = dx / L, s = w * 0.022;
  x.lineWidth = Math.max(1, w * 0.009);
  for (const t of [-0.28, 0, 0.28]) {
    const px = mx + dx * t, py = my + dy * t;
    x.beginPath(); x.moveTo(px - nx * s, py - ny * s); x.lineTo(px + nx * s, py + ny * s); x.stroke();
  }
}
function _bossCape(x, w, h, col, edge) {

}

    x.beginPath(); x.moveTo(w * 0.40, h * 0.555); x.quadraticCurveTo(w * 0.5, h * 0.605, w * 0.60, h * 0.555); x.stroke();
    x.fillStyle = 'rgba(30,8,8,0.55)';

    _bossScar(x, w, h, 0.575, 0.60, 0.63, 0.665);

  b_spider(x, w, h) { // 配件:腹部紅沙漏紋|細節:腿刺、卵袋

    x.closePath(); x.fill();
    x.strokeStyle = '#241b15'; x.lineWidth = Math.max(1, w * 0.009); x.stroke();
    x.strokeStyle = '#241b15'; x.lineWidth = Math.max(1.5, w * 0.013); x.lineCap = 'round';
    for (const [sx, sy, ex2, ey2] of [[0.245, 0.435, 0.225, 0.40], [0.20, 0.50, 0.175, 0.475], [0.755, 0.435, 0.775, 0.40], [0.80, 0.50, 0.825, 0.475]]) {
      x.beginPath(); x.moveTo(w * sx, h * sy); x.lineTo(w * ex2, h * ey2); x.stroke();
    }
    x.fillStyle = '#e8e0cc';
    x.beginPath(); x.ellipse(w * 0.755, h * 0.27, w * 0.05, h * 0.04, 0.3, 0, 7); x.fill();
    x.strokeStyle = '#a89878'; x.lineWidth = Math.max(1, w * 0.008); x.stroke();
  },
  b_orc(x, w, h) { // 配件:背插紅戰旗|細節:胸口破甲、面疤
    x.save(); x.globalCompositeOperation = 'destination-over';
    x.strokeStyle = '#4a3a28'; x.lineWidth = w * 0.022; x.lineCap = 'round';
    x.beginPath(); x.moveTo(w * 0.30, h * 0.44); x.lineTo(w * 0.185, h * 0.10); x.stroke();
    x.fillStyle = '#a32a20';
    x.beginPath();
    x.moveTo(w * 0.19, h * 0.105); x.lineTo(w * 0.44, h * 0.13); x.lineTo(w * 0.36, h * 0.185); x.lineTo(w * 0.44, h * 0.24); x.lineTo(w * 0.20, h * 0.26);
    x.closePath(); x.fill();
    x.strokeStyle = '#5e1111'; x.lineWidth = w * 0.012; x.stroke();
    x.restore();
    x.fillStyle = '#f5c542';
    x.beginPath(); x.arc(w * 0.30, h * 0.155, w * 0.022, 0, 7); x.fill(); // 旗上金徽
    x.strokeStyle = 'rgba(20,16,10,0.8)'; x.lineWidth = Math.max(2, w * 0.016); x.lineCap = 'round';
    x.beginPath(); x.moveTo(w * 0.42, h * 0.40); x.lineTo(w * 0.50, h * 0.485); x.stroke(); // 破甲裂口
    x.beginPath(); x.moveTo(w * 0.455, h * 0.45); x.lineTo(w * 0.42, h * 0.50); x.stroke();
    _bossScar(x, w, h, 0.60, 0.60, 0.655, 0.675);
  },
  b_ghost(x, w, h) { // 配件:幽藍鎖鏈|細節:破布裙腳、額頭王印
    x.strokeStyle = 'rgba(122,180,230,0.85)'; x.lineWidth = Math.max(2, w * 0.016); x.lineCap = 'round';
    const ly = h * 0.55;
    for (let i = 0; i < 6; i++) {
      const px = w * (0.30 + i * 0.08), py = ly + Math.sin(i * 1.1) * h * 0.028;
      x.beginPath(); x.ellipse(px, py, w * 0.028, h * 0.017, i % 2 ? 0.5 : -0.4, 0, 7); x.stroke();
    }
    x.fillStyle = 'rgba(44,58,82,0.55)';
    for (const [tx, ty] of [[0.40, 0.795], [0.55, 0.815], [0.68, 0.79]]) {
      x.beginPath(); x.moveTo(w * (tx - 0.025), h * ty); x.lineTo(w * tx, h * (ty + 0.055)); x.lineTo(w * (tx + 0.025), h * ty); x.closePath(); x.fill();
    }
    x.strokeStyle = '#5a9ad8'; x.lineWidth = Math.max(1.5, w * 0.012); x.lineCap = 'round';
    x.beginPath(); x.moveTo(w * 0.46, h * 0.56); x.lineTo(w * 0.5, h * 0.52); x.lineTo(w * 0.54, h * 0.56); x.stroke();
  },
  b_golem(x, w, h) { // 配件:雙肩石碑|細節:胸口琥珀大裂縫、苔蘚斑
    for (const s of [-1, 1]) {

      x.fillStyle = '#6a727e';
      x.beginPath();
      x.moveTo(px - w * 0.045, py); x.lineTo(px - w * 0.03, py - h * 0.13); x.lineTo(px + s * 0.01 * w, py - h * 0.16); x.lineTo(px + w * 0.035, py - h * 0.12); x.lineTo(px + w * 0.045, py);
      x.closePath(); x.fill();
      x.strokeStyle = '#22262c'; x.lineWidth = Math.max(2, w * 0.016); x.stroke();
      x.strokeStyle = '#d9a44a'; x.lineWidth = Math.max(1, w * 0.008);
      x.beginPath(); x.moveTo(px - w * 0.012, py - h * 0.115); x.lineTo(px + w * 0.008, py - h * 0.075); x.stroke();
    }
    x.strokeStyle = '#d9a44a'; x.lineWidth = Math.max(2, w * 0.014); x.lineCap = 'round';
    x.beginPath(); x.moveTo(w * 0.44, h * 0.33); x.lineTo(w * 0.50, h * 0.42); x.lineTo(w * 0.46, h * 0.50); x.stroke();
    x.beginPath(); x.moveTo(w * 0.485, h * 0.40); x.lineTo(w * 0.545, h * 0.43); x.stroke();
    x.fillStyle = 'rgba(94,122,74,0.85)';
    x.beginPath(); x.ellipse(w * 0.64, h * 0.26, w * 0.045, h * 0.02, 0.2, 0, 7); x.fill();
    x.beginPath(); x.ellipse(w * 0.36, h * 0.55, w * 0.032, h * 0.016, -0.2, 0, 7); x.fill();
  },
  b_shaman(x, w, h) { // 配件:浮游符文珠串|細節:兜帽羽飾、袍上骷髏紋
    x.fillStyle = '#f5c542'; x.strokeStyle = '#8a5a12'; x.lineWidth = Math.max(1, w * 0.008);
    for (const [rx, ry] of [[0.20, 0.42], [0.155, 0.55], [0.20, 0.68]]) {
      x.save(); x.translate(w * rx, h * ry); x.rotate(0.78);
      x.fillRect(-w * 0.022, -w * 0.022, w * 0.044, w * 0.044);
      x.strokeRect(-w * 0.022, -w * 0.022, w * 0.044, w * 0.044);
      x.restore();
    }
    x.fillStyle = '#d8c2ee'; x.strokeStyle = '#241a38'; x.lineWidth = Math.max(1, w * 0.008);
    x.beginPath(); x.ellipse(w * 0.72, h * 0.50, w * 0.018, h * 0.06, 0.5, 0, 7); x.fill(); x.stroke();
    x.beginPath(); x.ellipse(w * 0.76, h * 0.53, w * 0.014, h * 0.05, 0.7, 0, 7); x.fill(); x.stroke();
    x.fillStyle = '#ece5cf';
    x.beginPath(); x.arc(w * 0.5, h * 0.86, w * 0.03, 0, 7); x.fill();
    x.fillStyle = '#241a38';
    x.beginPath(); x.arc(w * 0.488, h * 0.855, w * 0.007, 0, 7); x.arc(w * 0.512, h * 0.855, w * 0.007, 0, 7); x.fill();
  },
};

// Boss:tint + decor + aura + 皇冠(baked,連 crown/aura 一齊按 boss 尺寸縮放)
function bossDisplaySprite(spec) {
  const key = 'boss|' + spec.id;
  if (VARIANTS[key]) return VARIANTS[key];
  const base = tintSprite(spec.base, spec.hue, spec.sat) || SPRITES[spec.base];
  if (!base) return null;
  const w = base.width, h = base.height, c = makeCanvas(w, h), x = c.getContext('2d');
  x.drawImage(base, 0, 0);
  if (BOSS_DECOR[spec.id]) BOSS_DECOR[spec.id](x, w, h);
  drawCrown(x, w, h);
  // 階段4:紫 halo 唔再 bake — 戰場由 drawBoss 畫旋轉放射 aura;圖鑑用 bossDexSprite 合成
  VARIANTS[key] = c;
  return c;
}
// 圖鑑/靜態場合:本體 + 靜態紫 halo 合成(halo 喺本體後面)
function bossDexSprite(spec) {
  const key = 'bossdex|' + spec.id;
  if (VARIANTS[key]) return VARIANTS[key];
  const body = bossDisplaySprite(spec);
  if (!body) return null;
  const c = auraCanvas(body, 'rgba(168,86,240,0.62)');
  VARIANTS[key] = c;
  return c;
}

function drawEnemies() {
  for (const e of G.enemies) {
    const wob = Math.sin(e.wob) * 2.5;
    const spr = enemySprite(e);
    if (!spr) continue;
    if (e.totem) {
      ctx.strokeStyle = `rgba(212,184,255,${0.4 + Math.sin(e.wob * 3) * 0.25})`;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(e.x, e.y, e.size * 0.6, 0, 7); ctx.stroke();
    }
    let scaleY = 1;
    if (e.move === 'bounce') scaleY = 1 + Math.sin(e.wob * 2) * 0.08;
    const s = enemyDrawScale(e.size); // 體型分 3 級放大(視覺,唔改 hitbox)
    const w = e.size * s, h = e.size * (spr.height / spr.width) * scaleY * s;
    const cx = e.x + wob * 0.4, cy = e.y + wob;
    const ghost = e.move === 'ghost';
    drawFootShadow(e.x, cy + h * 0.40, w);          // 腳底橢圓陰影
    // 深淵/冥府系:放射狀 aura(預渲染 sprite 旋轉)+ 上浮粒子
    if (e._vs === undefined) e._vs = variantStyle(e.tier, e.name);
    if (e._vs.abyss && FX_SPR.aura) {
      const t = e.wob;
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.globalAlpha = 0.55 + 0.35 * Math.sin(t * 3);
      const ar = w * 1.35;
      ctx.translate(cx, cy);
      ctx.rotate(t * 0.35);
      ctx.drawImage(FX_SPR.aura, -ar / 2, -ar / 2, ar, ar);
      ctx.rotate(-t * 0.35);
      for (let k = 0; k < 3; k++) {
        const up = (t * 0.6 + k / 3) % 1;
        const px = Math.sin((t + k * 2) * 1.3) * w * 0.34;
        const py = h * 0.3 - up * h * 0.72;
        ctx.globalAlpha = (1 - up) * 0.8;
        ctx.fillStyle = '#c68cff';
        ctx.beginPath(); ctx.arc(px, py, 1.5 + (1 - up) * 1.3, 0, 7); ctx.fill();
      }
      ctx.restore();
    }
    // 受擊 squash:壓扁 15%(橫向補償拉闊),100ms 內線性回彈;腳底做支點
    const hk = e.hitT > 0 ? e.hitT / 0.1 : 0;
    const sqY = 1 - 0.15 * hk, sqX = 1 + 0.13 * hk;
    // 行走微擺:walk/zig 系 ±3°;bounce/ghost/caster 唔擺
    const sway = (e.move === 'walk' || e.move === 'zig') ? Math.sin(e.wob * 1.2) * 0.052 : 0;
    const parts = variantParts(e.fam, e.tier, e.hue, e.sat, e.name);
    if (ghost) ctx.globalAlpha = 0.78;
    ctx.save();
    ctx.translate(cx, cy + h / 2);            // 腳底支點
    if (sqY !== 1) ctx.scale(sqX, sqY);
    if (sway) ctx.rotate(sway);
    const flash = e.flash > 0;
    if (flash) ctx.filter = 'brightness(2.6)';
    // outline 剪影(跟住成隻變形)
    const o = outlineSprite(e.fam);
    if (o) {
      const pa = ctx.globalAlpha;
      ctx.globalAlpha = pa * (ghost ? 0.7 : 1);
      for (const off of OUTLINE_OFFSETS) ctx.drawImage(o, -w / 2 + off[0], -h + off[1], w, h);
      ctx.globalAlpha = pa;
    }
    if (parts) {
      // 部件組合:body → 頭(圍住頭心微擺)→ weapon(揮動小幅)
      if (parts.body) ctx.drawImage(parts.body, -w / 2, -h, w, h);
      if (parts.head) {
        const hcY = -h * 0.3125;              // 頭心 local y(128 座標 y=88 → 0.6875h)
        const hs = sway ? Math.sin(e.wob * 1.2 + 0.9) * 0.035 : Math.sin(e.wob * 0.9) * 0.02;
        ctx.save();
        ctx.translate(0, hcY); ctx.rotate(hs);
        ctx.drawImage(parts.head, -w / 2, -h - hcY, w, h);
        ctx.restore();
      }
      if (parts.weapon) {
        const ws = Math.sin(e.wob * 1.4 + 2) * 0.045;
        ctx.save();
        ctx.translate(w * 0.2, -h * 0.45); ctx.rotate(ws);
        ctx.drawImage(parts.weapon, -w / 2 - w * 0.2, -h * 0.55, w, h);
        ctx.restore();
      }
    } else {
      ctx.drawImage(spr, -w / 2, -h, w, h);   // 無部件(PNG 注入/fallback):整體 sprite
    }
    if (flash) ctx.filter = 'none';
    ctx.restore();
    if (ghost) ctx.globalAlpha = 1;
    if (e.burnT > 0) {
      ctx.fillStyle = 'rgba(255,140,29,0.5)';
      ctx.beginPath(); ctx.arc(e.x, cy - h * 0.3, 6 + Math.sin(e.wob * 4) * 2, 0, 7); ctx.fill();
    }
    if (e.bar && e.hp < e.hpMax) {
      const bw = w * 0.66;
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(e.x - bw / 2, cy - h * 0.56, bw, 5);
      ctx.fillStyle = '#7ddb5a';
      ctx.fillRect(e.x - bw / 2, cy - h * 0.56, bw * Math.max(0, e.hp / e.hpMax), 5);
    }
  }
}

function drawBoss() {
  const b = G.boss;
  if (!b) return;
  // 衝鋒警示:紅色虛線 + 落點圈,提示玩家閃避
  if (b.chargeStage === 'warn') {
    ctx.save();
    ctx.globalAlpha = 0.5 + Math.sin(b.t * 20) * 0.3;
    ctx.strokeStyle = '#ff4d3d'; ctx.lineWidth = 3;
    ctx.setLineDash([12, 8]);
    ctx.beginPath(); ctx.moveTo(b.x, b.y); ctx.lineTo(b.chargeTX, squadY); ctx.stroke();
    ctx.setLineDash([]);
    ctx.beginPath(); ctx.arc(b.chargeTX, squadY, 40, 0, 7); ctx.stroke();
    ctx.restore();
  }
  const dying = b.state === 'die';
  const alpha = dying ? Math.max(0, 1 - (b.t2 || 0)) : 1;
  ctx.globalAlpha = alpha;
  const hover = Math.sin(b.t * 2.2) * 6;
  if (b.spec.fam === 'ghost') ctx.globalAlpha = alpha * (b.phased ? 0.4 : 0.85);
  const spr = bossDisplaySprite(b.spec) || tintSprite(b.spec.base, b.spec.hue, b.spec.sat) || SPRITES[b.spec.base];
  if (spr) {
    // 體型加大 12%(純視覺,hitbox 用 b.size 唔變)
    const w = b.size * 1.12, h = w * (spr.height / spr.width);
    const cy = b.y + hover;
    drawFootShadow(b.x, cy + h * 0.42, w * 0.9);
    // 旋轉放射 aura(預渲染 sprite;喺本體後面)
    if (FX_SPR.bossAura) {
      const aw = w * 1.3;
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.globalAlpha = ctx.globalAlpha * (0.75 + 0.25 * Math.sin(b.t * 2.2));
      ctx.translate(b.x, cy);
      ctx.rotate(b.t * 0.3);
      ctx.drawImage(FX_SPR.bossAura, -aw / 2, -aw / 2, aw, aw);
      ctx.restore();
    }
    // 呼吸 scale 1.0↔1.03(腳底支點)
    const br = 1.015 + 0.015 * Math.sin(b.t * 2.2);
    ctx.save();
    ctx.translate(b.x, cy + h / 2);
    ctx.scale(br, br);
    if (b.flash > 0) ctx.filter = 'brightness(2.6)';
    const o = outlineSprite(b.spec.base);
    if (o) for (const off of OUTLINE_OFFSETS) ctx.drawImage(o, -w / 2 + off[0], -h + off[1], w, h);
    ctx.drawImage(spr, -w / 2, -h, w, h);
    if (b.flash > 0) ctx.filter = 'none';
    ctx.restore();
  }
  ctx.globalAlpha = 1;
  if (!dying) {
    const bw = Math.min(W * 0.7, 420);
    const bx = (W - bw) / 2, by = 86;
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(bx - 3, by - 3, bw + 6, 18);
    ctx.fillStyle = '#5e1111';
    ctx.fillRect(bx, by, bw, 12);
    ctx.fillStyle = '#ff4d3d';
    ctx.fillRect(bx, by, bw * Math.max(0, b.hp / b.hpMax), 12);
    // 名牌:加黑描邊(sprite 加大後可能疊住名字,描邊保可讀;bar 畫喺 boss 之後,天然在上層)
    ctx.font = 'bold 13px "Noto Sans TC",sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.lineJoin = 'round'; ctx.lineWidth = 4;
    ctx.strokeStyle = 'rgba(0,0,0,0.72)';
    ctx.strokeText(b.name, W / 2, by - 6);
    ctx.fillStyle = '#ffd0c4';
    ctx.fillText(b.name, W / 2, by - 6);
  }
}

function drawPets() {
  for (const p of G.pets) {
    if (p.kind === 'dog') drawSprite('dog', p.x, p.y, 34, 34);
    else drawSprite('drone', p.x, p.y + Math.sin(p.t * 5) * 2, 36, 36);
  }
}

function drawZones() {
  for (const z of G.zones) {
    const a = Math.max(0, 1 - z.t / z.life);
    const pulse = 1 + Math.sin(z.t * 8) * 0.12;
    const rr = z.r * pulse;
    // 實心橙紅底
    ctx.fillStyle = `rgba(255,90,20,${a * 0.55})`;
    ctx.beginPath(); ctx.ellipse(z.x, z.y, rr, rr * 0.5, 0, 0, 7); ctx.fill();
    // 內圈黃芯
    ctx.fillStyle = `rgba(255,200,60,${a * 0.5})`;
    ctx.beginPath(); ctx.ellipse(z.x, z.y, rr * 0.6, rr * 0.3, 0, 0, 7); ctx.fill();
    // 脈動邊框
    ctx.strokeStyle = `rgba(255,150,40,${a})`; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.ellipse(z.x, z.y, rr, rr * 0.5, 0, 0, 7); ctx.stroke();
    // 跳動火焰
    for (let k = 0; k < 5; k++) {
      const fx = z.x + (Math.random() - 0.5) * z.r * 1.5;
      const fh = 8 + Math.random() * 12;
      ctx.fillStyle = `rgba(255,${140 + Math.random() * 80 | 0},30,${a})`;
      ctx.beginPath();
      ctx.moveTo(fx - 3, z.y);
      ctx.quadraticCurveTo(fx, z.y - fh, fx + 3, z.y);
      ctx.closePath(); ctx.fill();
    }
  }
}
function drawWaves() {
  for (const wv of G.waves) {
    ctx.fillStyle = 'rgba(200,150,60,0.55)';
    ctx.strokeStyle = '#e8b96a'; ctx.lineWidth = 3;
    // 左半
    ctx.fillRect(laneL, wv.y - 7, (wv.gapX - wv.gapW / 2) - laneL, 14);
    // 右半
    ctx.fillRect(wv.gapX + wv.gapW / 2, wv.y - 7, laneR - (wv.gapX + wv.gapW / 2), 14);
    ctx.strokeRect(laneL, wv.y - 7, (wv.gapX - wv.gapW / 2) - laneL, 14);
    ctx.strokeRect(wv.gapX + wv.gapW / 2, wv.y - 7, laneR - (wv.gapX + wv.gapW / 2), 14);
  }
}
function drawMines() {
  for (const m of G.mines) {
    const pulse = 0.6 + Math.sin(m.t * 6) * 0.4;
    ctx.fillStyle = '#3a4048';
    ctx.beginPath(); ctx.arc(m.x, m.y, 11, 0, 7); ctx.fill();
    ctx.strokeStyle = '#22262c'; ctx.lineWidth = 2;
    for (let a = 0; a < 6.28; a += 1.05) {
      ctx.beginPath(); ctx.moveTo(m.x + Math.cos(a) * 11, m.y + Math.sin(a) * 11);
      ctx.lineTo(m.x + Math.cos(a) * 15, m.y + Math.sin(a) * 15); ctx.stroke();
    }
    ctx.fillStyle = `rgba(255,60,40,${pulse})`;
    ctx.beginPath(); ctx.arc(m.x, m.y, 4, 0, 7); ctx.fill();
  }
}

function drawSquad() {
  // 護盾光環
  if (G.shield > 0) {
    const hw = squadHalfWidth();
    ctx.strokeStyle = 'rgba(122,201,255,0.5)';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.ellipse(G.squadX, squadY + 24, hw + 18, 60, 0, 0, 7); ctx.stroke();
  }
  const tilt = G.squadTilt || 0; // 轉向 tilt(update 內平滑,上限 ±4.5°)
  const SZ = 40, HZ = SZ / 2;
  for (const d of G.dots) {
    const bob = Math.sin(d.bob) * 1.6;
    const parts = d.cos ? COSPLAY_PARTS[d.breed] : CAT_PARTS[d.breed];
    const spr = d.cos ? (COSPLAY_SPRITES[d.breed] || SPRITES.soldier) : (CAT_SPRITES[d.breed] || SPRITES.soldier);
    if (!parts || !parts.body) { // PNG 注入 / fallback:整體 sprite
      ctx.save();
      ctx.translate(d.x, d.y + bob);
      if (tilt) ctx.rotate(tilt);
      ctx.drawImage(spr, -HZ, -HZ, SZ, SZ);
      ctx.restore();
      continue;
    }
    const fire = d.fireT > 0 ? d.fireT / 0.06 : 0;
    ctx.save();
    ctx.translate(d.x, d.y + bob);
    if (tilt) ctx.rotate(tilt);
    ctx.drawImage(parts.body, -HZ, -HZ, SZ, SZ);
    // 武器 recoil:射擊瞬間後移(向鏡頭方向,即向下)2px,60ms 回位
    ctx.drawImage(parts.weapon, -HZ, -HZ + fire * 2, SZ, SZ);
    // 頭:bob 相位滯後少少,行軍更生動
    ctx.drawImage(parts.head, -HZ, -HZ + Math.sin(d.bob - 0.7) * 0.5, SZ, SZ);
    // muzzle flash:additive 圓形 glow,60ms
    if (fire > 0 && FX_SPR.muzzle) {
      const b = d.cos ? COSPLAY_CATS[d.breed] : CAT_BREEDS[d.breed];
      const muzY = ((GUN_MUZZLE_Y[(b && b.gun) || 'rifle'] / 128) - 0.5) * SZ + fire * 2;
      const fs = 10 + fire * 8;
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.globalAlpha = fire;
      ctx.drawImage(FX_SPR.muzzle, -fs / 2, muzY - fs / 2, fs, fs);
      ctx.restore();
    }
    ctx.restore();
  }
  ctx.font = 'bold 17px "Noto Sans TC",sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  let txt = '' + G.squad;
  if (G.shield > 0) txt += ' 🛡' + G.shield;
  const tw = ctx.measureText(txt).width + 18;
  // 過門 badge pop:即彈 1.35x 再回落 1x(220ms)
  const pop = G.badgePopT > 0 ? 1 + 0.35 * (G.badgePopT / 0.22) : 1;
  ctx.save();
  ctx.translate(G.squadX, squadY - 40);
  ctx.scale(pop, pop);
  ctx.fillStyle = bgDeepA(0.8);
  ctx.beginPath();
  ctx.roundRect(-tw / 2, -12, tw, 24, 12);
  ctx.fill();
  ctx.strokeStyle = '#7ddb5a'; ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.fillStyle = '#d6ffb8';
  ctx.fillText(txt, 0, 0);
  ctx.restore();
}

function drawBullets() {
  // 1px 淡尾跡(全部一次過畫,低透明,密集時退居背景)
  ctx.globalAlpha = 0.26;
  ctx.fillStyle = BULLET_GOLD;
  for (const b of G.bullets) {
    if (!b.drone) ctx.fillRect(b.x - 0.5, b.y - 3, 1, 10);
  }
  // 主彈:縮短 30%(12→8)、70% 透明、去飽和 GOLD
  ctx.globalAlpha = 0.7;
  for (const b of G.bullets) {
    if (b.drone) { ctx.fillStyle = '#7dffb0'; ctx.fillRect(b.x - 1.3, b.y - 4, 2.6, 6); }
    else { ctx.fillStyle = BULLET_GOLD; ctx.fillRect(b.x - 1.6, b.y - 6, 3.2, 8); }
  }

function drawFireballs() {
  for (const f of G.fireballs) {
    // 蛛網彈:紫色 + 蛛網紋,同火球明顯區分,俾玩家睇得出係減速彈
    if (f.web) {
      const r = 13 + Math.sin(f.t * 14) * 2;
      const g = ctx.createRadialGradient(f.x, f.y, 2, f.x, f.y, r);
      g.addColorStop(0, '#f0e0ff'); g.addColorStop(0.5, '#b578ff'); g.addColorStop(1, 'rgba(150,90,220,0)');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(f.x, f.y, r, 0, 7); ctx.fill();
      // 蛛網十字絲
      ctx.strokeStyle = 'rgba(240,225,255,0.85)'; ctx.lineWidth = 1.5;
      ctx.beginPath();
      for (let a = 0; a < 6; a++) {
        const ang = a * Math.PI / 3 + f.t * 2;
        ctx.moveTo(f.x, f.y);
        ctx.lineTo(f.x + Math.cos(ang) * r * 0.85, f.y + Math.sin(ang) * r * 0.85);
      }
      ctx.stroke();
      ctx.beginPath(); ctx.arc(f.x, f.y, r * 0.5, 0, 7); ctx.stroke();
      continue;
    }
    const r = (f.friendly ? 10 : (f.small ? 8 : 13)) + Math.sin(f.t * 18) * 2;
    const g = ctx.createRadialGradient(f.x, f.y, 2, f.x, f.y, r);
    if (f.friendly) { g.addColorStop(0, '#fff2c0'); g.addColorStop(0.55, '#ffb347'); g.addColorStop(1, 'rgba(255,140,40,0)'); }
    else { g.addColorStop(0, '#ffe98a'); g.addColorStop(0.55, '#ff8c1d'); g.addColorStop(1, 'rgba(255,60,20,0)'); }
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(f.x, f.y, r, 0, 7); ctx.fill();
  }
}

function drawGems() {

function drawParticles() {
  for (const p of G.parts) {
    ctx.globalAlpha = Math.max(0, 1 - p.t / p.life);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 7); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawFX() {
  for (const f of G.fx) {
    const k = f.t / f.life;
    if (f.type === 'bolt') {
      ctx.globalAlpha = 1 - k;
      ctx.strokeStyle = '#e8f4ff'; ctx.lineWidth = 3;
      ctx.beginPath();
      for (let i = 0; i < f.pts.length; i++) {
        const [px, py] = f.pts[i];
        const jx = i === 0 ? 0 : (Math.random() - 0.5) * 10;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px + jx, py + (Math.random() - 0.5) * 10);
      }
      ctx.stroke();
      ctx.strokeStyle = 'rgba(122,201,255,0.6)'; ctx.lineWidth = 6;
      ctx.stroke();
    } else if (f.type === 'boom') {
      ctx.globalAlpha = (1 - k) * 0.7;
      ctx.fillStyle = f.color;
      ctx.beginPath(); ctx.arc(f.x, f.y, f.r * (0.4 + k * 0.6), 0, 7); ctx.fill();
    } else if (f.type === 'target') {
      ctx.globalAlpha = 0.85;
      ctx.strokeStyle = '#ff4d3d'; ctx.lineWidth = 3;
      const r = 44 * (1 - k * 0.5);
      ctx.beginPath(); ctx.arc(f.x, f.y, r, 0, 7); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(f.x - r - 8, f.y); ctx.lineTo(f.x + r + 8, f.y);
      ctx.moveTo(f.x, f.y - r - 8); ctx.lineTo(f.x, f.y + r + 8); ctx.stroke();
    } else if (f.type === 'snipe') {
      ctx.globalAlpha = 1 - k;
      ctx.strokeStyle = '#ffd23d'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(f.x1, f.y1); ctx.lineTo(f.x2, f.y2); ctx.stroke();
    } else if (f.type === 'orbital') {
      ctx.globalAlpha = (1 - k) * 0.5;
      ctx.fillStyle = '#fff0c0';
      ctx.fillRect(0, 0, W, H);
      ctx.globalAlpha = (1 - k) * 0.9;
      ctx.fillStyle = 'rgba(255,220,120,0.7)';
      for (let i = 0; i < 5; i++) {
        const bx = laneL + laneW * (i + 0.5) / 5;
        ctx.fillRect(bx - 7, 0, 14, H * (0.4 + k * 0.6));
      }
    }
  }
  ctx.globalAlpha = 1;
}

function drawFloats() {
  for (const f of G.floats) {
    ctx.globalAlpha = Math.max(0, 1 - f.t / f.life);
    ctx.font = `bold ${f.size}px "Noto Sans TC",sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.lineJoin = 'round';
    ctx.lineWidth = 4.5; ctx.strokeStyle = 'rgba(0,0,0,0.82)'; // 深描邊
    ctx.strokeText(f.text, f.x, f.y);
    ctx.fillStyle = f.color;
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;
}

const TIER_COLORS = ['#4d5a3e', '#2a5580', '#5e3080', '#8a6a1a', '#c0306a'];
const RELIC_RECTS = [];
function drawRelicBar() {
  RELIC_RECTS.length = 0;
  if (!RELIC_DISPLAY.length) return;
  // 細圖示、限制喺左邊窄欄、逐行往下排,唔遮擋主要戰場
  const sz = 20, gap = 3, x0 = 10, y0 = (SAVE.shards > 0 ? 120 : 100);
  const perRow = Math.max(5, Math.floor(Math.min(W * 0.42, 240) / (sz + gap)));
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (let i = 0; i < RELIC_DISPLAY.length; i++) {
    const id = RELIC_DISPLAY[i];
    const r = RELIC_BY_ID[id];
    const x = x0 + (i % perRow) * (sz + gap);
    const y = y0 + Math.floor(i / perRow) * (sz + gap);
    ctx.fillStyle = bgDeepA(0.5);
    ctx.beginPath(); ctx.roundRect(x, y, sz, sz, 6); ctx.fill();
    ctx.strokeStyle = TIER_COLORS[r.t]; ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.fillText(r.e, x + sz / 2, y + sz / 2 + 1);
    RELIC_RECTS.push({ x, y, w: sz, h: sz, id });
  }
}
function wrapText(text, maxW) {
  const lines = [];
  let cur = '';
  for (const ch of text) {
    if (ctx.measureText(cur + ch).width > maxW) { lines.push(cur); cur = ch; }
    else cur += ch;
  }
  if (cur) lines.push(cur);
  return lines;
}
function drawRelicTooltip() {
  if (!G.hoverRelic) return;
  const r = RELIC_BY_ID[G.hoverRelic];
  const rect = RELIC_RECTS.find(rc => rc.id === G.hoverRelic);
  if (!r || !rect) return;
  const boxW = Math.min(240, W - 24);
  ctx.font = '12.5px "Noto Sans TC",sans-serif';
  const descLines = wrapText(r.d, boxW - 20);
  const boxH = 34 + descLines.length * 16;
  let bx = Math.min(rect.x, W - boxW - 12);
  let by = rect.y + rect.h + 6;
  if (by + boxH > H - 10) by = rect.y - boxH - 6;
  ctx.fillStyle = bgDeepA(0.94);
  ctx.beginPath(); ctx.roundRect(bx, by, boxW, boxH, 10); ctx.fill();
  ctx.strokeStyle = TIER_COLORS[r.t]; ctx.lineWidth = 2; ctx.stroke();
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.font = 'bold 14px "Noto Sans TC",sans-serif';
  ctx.fillStyle = ['#c8d2a8', '#9fd0ff', '#dbaeff', '#ffd75e'][r.t];
  ctx.fillText(r.e + ' ' + r.n + '(' + TIER_NAMES[r.t] + ')', bx + 10, by + 16);
  ctx.font = '12.5px "Noto Sans TC",sans-serif';
  ctx.fillStyle = TOKENS.TEXT_MID;
  descLines.forEach((ln, i) => ctx.fillText(ln, bx + 10, by + 36 + i * 16));
}

// 分層 draw call 計時(?debug=perf 先開;平時 PROF.on=false,每層只多一次 function call)
const PROF = { on: false, acc: {} };
function _prof(name, fn) {
  if (!PROF.on) return fn();
  const t0 = performance.now(); fn();
  PROF.acc[name] = (PROF.acc[name] || 0) + (performance.now() - t0);
}

function render() {
  ctx.save();
  if (G.shake > 0.2) {
    ctx.translate((Math.random() - 0.5) * G.shake, (Math.random() - 0.5) * G.shake);
  }
  // zoom punch:1.02 → 1 回彈(180ms,s² 衰減 → 起手快收尾柔)
  if (G.zoomT > 0) {
    const s = G.zoomT / 0.18, z = 1 + 0.02 * s * s;
    ctx.translate(W / 2, H / 2); ctx.scale(z, z); ctx.translate(-W / 2, -H / 2);
  }
  _prof('road', drawRoad);
  _prof('zones', drawZones);
  _prof('waves', drawWaves);
  _prof('gates', drawGates);
  _prof('mines', drawMines);
  _prof('coins', drawCoins);
  _prof('gems', drawGems);
  _prof('enemies', drawEnemies);
  _prof('boss', drawBoss);
  _prof('fireballs', drawFireballs);
  _prof('bullets', drawBullets);
  _prof('pets', drawPets);
  _prof('squad', drawSquad);
  _prof('particles', drawParticles);
  _prof('fx', drawFX);
  _prof('floats', drawFloats);
  _prof('light', drawLightLayer); // 全部 glow 一次過 additive 合成 + bloom
  ctx.restore();
  // 過門 40ms 全屏閃:綠門白閃 / 紅門紅閃
  if (G.gateFlashT > 0) {
    ctx.fillStyle = G.gateFlashGood ? 'rgba(255,255,255,0.22)' : 'rgba(216,26,18,0.26)';
    ctx.fillRect(0, 0, W, H);
  }
  _prof('hud', drawHUD);
  drawRelicBar();
  drawRelicTooltip();
  // 最頂層 color grade:2% 透明度暖色 overlay(統一冷背景上嘅溫度,HUD 讀性零影響)
  if (FXQ.grade) {
    ctx.fillStyle = 'rgba(255,178,102,0.02)';
    ctx.fillRect(0, 0, W, H);
  }
}

// ---------------- 怪物圖鑑 ----------------
function thumbURL(spr, silhouette) {
  const S = 144, D = 128; // 2x 密度(CSS 顯示 60px,retina 圖鑑清晰);icon 放大約 30%(46→60 顯示)
  const c = makeCanvas(S, S);
  const x = c.getContext('2d');
  const ratio = spr.height / spr.width;
  let w = D, h = D * ratio;
  if (h > D) { h = D; w = D / ratio; }
  if (silhouette) x.filter = 'brightness(0) opacity(0.5)'; // 未解鎖:剪影
  x.drawImage(spr, (S - w) / 2, (S - h) / 2, w, h);
  x.filter = 'none';
  return c.toDataURL();
}
// 卡背景按稀有度加極淡色 tint
function rarityTint(tier) { return _mix(TOKENS.BG_MID, TIER_COLORS[tier] || '#4d5a3e', 0.16); }

function renderDex() {
  const monsWrap = $('dex-mons');
  const bossWrap = $('dex-bosses');
  monsWrap.innerHTML = ''; bossWrap.innerHTML = '';
  let seen = 0;
  for (const m of MONSTERS) {
    const got = !!SAVE.dex[m.id];
    if (got) seen++;
    const tile = document.createElement('div');
    tile.className = 'dex-tile' + (got ? '' : ' locked');
    tile.style.background = rarityTint(m.tier);
    let spr = variantSprite(m.fam, m.tier, m.hue, m.sat, m.name) || SPRITES[m.fam];
    if (variantStyle(m.tier, m.name).abyss) spr = auraCanvas(spr);
    if (got) {
      tile.innerHTML = `<img src="${thumbURL(spr)}" alt="">` +
        `<div class="dex-name">${m.name}</div>` +
        `<div class="dex-stat">HP${m.hp}・咬${m.bite}・幣${m.coin}</div>`;
    } else {
      tile.innerHTML = `<img src="${thumbURL(spr, true)}" alt="">` +
        `<div class="dex-name">???</div>`;
    }
    monsWrap.appendChild(tile);
  }
  let bseen = 0;
  for (const b of BOSSES) {
    const got = !!SAVE.dex[b.id];
    if (got) bseen++;
    const tile = document.createElement('div');
    tile.className = 'dex-tile boss' + (got ? '' : ' locked');
    tile.style.background = _mix('#241a14', TOKENS.GOLD, 0.16); // 頭目 = 最高稀有度金 tint
    const spr = bossDexSprite(b) || tintSprite(b.base, b.hue, b.sat) || SPRITES[b.base];
    if (got) {
      tile.innerHTML = `<img src="${thumbURL(spr)}" alt="">` +
        `<div class="dex-name">${b.name}</div>` +
        `<div class="dex-stat">${b.desc}</div>`;
    } else {
      tile.innerHTML = `<img src="${thumbURL(spr, true)}" alt="">` +
        `<div class="dex-name">???</div>`;
    }
    bossWrap.appendChild(tile);
  }
  $('dex-progress').textContent = `收集進度:小怪 ${seen}/${MONSTERS.length}・頭目 ${bseen}/${BOSSES.length}`;
}

function renderRelicDex() {
  const wrap = $('rdex-list');

  let seen = 0;
  const seenByTier = [0, 0, 0, 0, 0], totalByTier = [0, 0, 0, 0, 0];
  // 按稀有度排序:傳說先行
  const sorted = RELICS.slice().sort((a, b) => b.t - a.t);
  for (const r of sorted) {
    totalByTier[r.t]++;
    const got = !!SAVE.relicDex[r.id];
    if (got) { seen++; seenByTier[r.t]++; }
    const row = document.createElement('div');
    row.className = 'rdex-row tier' + r.t + (got ? '' : ' locked');
    if (got) {
      const ownedTag = (SAVE.ownedRelics[r.id] || SAVE.relics[r.id]) ? '<span class="r-owned">✓永久擁有</span>' : '';

const GACHA_RELIC_COST = 5, GACHA_CAT_COST = 2;
// 遺物抽卡稀有度權重(1% 傳說或以上)
function gachaRelicTier() {
  const r = Math.random();
  if (r < 0.03) return 4;         // 神話 3%
  if (r < 0.10) return 3;         // 傳說 7%
  if (r < 0.30) return 2;         // 史詩 20%
  if (r < 0.75) return 1;         // 稀有 45%
  return 0;                       // 普通 25%
}
function gachaSound(t) {
  if (t >= 4) { Sound.win(); setTimeout(() => Sound.roar(), 150); setTimeout(() => Sound.win(), 400); }
  else if (t === 3) { Sound.win(); setTimeout(() => Sound.chest(), 200); }
  else if (t === 2) { Sound.chest(); }
  else Sound.coin();
}
const FX_CLASS = ['fx-common', 'fx-rare', 'fx-epic', 'fx-legend', 'fx-mythic'];

function renderRelicShop() {

function refreshGachaGems() {
  $('gacha-gems').textContent = '💎 晶石:' + SAVE.gems + '　💠 碎片:' + SAVE.shards;
  // 可負擔 = Primary;晶石不足 = Secondary + 50% 透明(唔用灰色扮 disabled)
  const setTier = (id, afford) => { $(id).className = 'btn ' + (afford ? 'primary' : 'secondary dim'); };
  setTier('btn-gacha-relic', SAVE.gems >= GACHA_RELIC_COST);
  setTier('btn-gacha-cat', SAVE.gems >= GACHA_CAT_COST);
}
function pullRelic() {
  if (SAVE.gems < GACHA_RELIC_COST) return;
  SAVE.gems -= GACHA_RELIC_COST;
  const tier = gachaRelicTier();
  // 祭壇唔會抽到商店有售嘅遺物(防呆:如果成個 tier 都係商店貨就回退全池)
  let pool = RELICS.filter(r => r.t === tier && !r.shopBuyable);
  if (!pool.length) pool = RELICS.filter(r => r.t === tier);
  const r = pool[Math.floor(Math.random() * pool.length)];
  let dup = false;
  if (SAVE.ownedRelics[r.id]) { dup = true; SAVE.shards += 1; }  // 重覆:得 1 晶石碎片
  else { SAVE.ownedRelics[r.id] = 1; SAVE.relicDex[r.id] = 1; }
  persistSave();
  gachaSound(tier);
  const stage = $('gacha-stage');
  stage.innerHTML = `<div class="gacha-reveal ${FX_CLASS[tier]}">
    <span class="g-ico">${r.e}</span>
    <div class="g-tier">${TIER_NAMES[tier]}遺物</div>
    <div class="g-name">${r.n}</div>
    <div class="g-desc">${r.d}</div>
    ${dup ? '<div class="g-dup">重覆・獲得 1 💠晶石碎片</div>' : '<div class="g-dup">✨ 新遺物入手!</div>'}
  </div>`;
  refreshGachaGems();
}
function pullCat() {
  if (SAVE.gems < GACHA_CAT_COST) return;
  SAVE.gems -= GACHA_CAT_COST;
  const idx = Math.floor(Math.random() * COSPLAY_CATS.length);
  const cat = COSPLAY_CATS[idx];
  // cosplay 貓當史詩級特效(黃金傳說貓當傳說)
  const tier = idx === COSPLAY_CATS.length - 1 ? 3 : 2;
  let dup = false;
  if (SAVE.cosplayCats[idx]) { dup = true; SAVE.shards += 1; }
  else SAVE.cosplayCats[idx] = 1;
  persistSave();
  gachaSound(tier);
  const stage = $('gacha-stage');
  stage.innerHTML = `<div class="gacha-reveal ${FX_CLASS[tier]}">
    <img src="${thumbURL(COSPLAY_SPRITES[idx])}" alt="">
    <div class="g-tier">Cosplay 貓</div>
    <div class="g-name">${cat.n}</div>
    ${dup ? '<div class="g-dup">重覆・獲得 1 💠晶石碎片</div>' : '<div class="g-dup">✨ 新夥伴加入!</div>'}
  </div>`;
  refreshGachaGems();
}

canvas.addEventListener('pointerdown', (ev) => {
  Sound.ensure();
  if (G.state !== 'play') return;
  const px = ev.clientX, py = ev.clientY;
  if (px >= PAUSE_BTN.x && px <= PAUSE_BTN.x + PAUSE_BTN.w && py >= PAUSE_BTN.y && py <= PAUSE_BTN.y + PAUSE_BTN.h) {
    setState('pause');
    return;
  }
  if (px >= DEX_BTN.x && px <= DEX_BTN.x + DEX_BTN.w && py >= DEX_BTN.y && py <= DEX_BTN.y + DEX_BTN.h) {
    openDex('play');
    return;
  }
  // 點按遺物圖示:顯示提示,唔移動隊伍
  for (const rc of RELIC_RECTS) {
    if (px >= rc.x && px <= rc.x + rc.w && py >= rc.y && py <= rc.y + rc.h) {
      G.hoverRelic = rc.id;
      G.hoverT = 3;
      return;
    }
  }
  // 點擊/觸碰即刻設定目標位置
  G.targetX = Math.max(laneL + 30, Math.min(laneR - 30, px));
  canvas.setPointerCapture(ev.pointerId);
});
// 滑鼠:hover 直接跟隨;觸控:手指移動跟隨
canvas.addEventListener('pointermove', (ev) => {
  if (G.state !== 'play') return;
  if (ev.pointerType === 'mouse' || ev.pressure > 0 || (ev.buttons & 1)) {
    G.targetX = Math.max(laneL + 30, Math.min(laneR - 30, ev.clientX));
  }
  // 滑鼠掃過遺物圖示 -> 顯示名稱同效果
  if (ev.pointerType === 'mouse') {
    let hit = null;
    for (const rc of RELIC_RECTS) {
      if (ev.clientX >= rc.x && ev.clientX <= rc.x + rc.w && ev.clientY >= rc.y && ev.clientY <= rc.y + rc.h) { hit = rc.id; break; }
    }
    if (hit) { G.hoverRelic = hit; G.hoverT = 0.35; }
  }
});

window.addEventListener('keydown', (ev) => {
  if (ev.key === 'ArrowLeft' || ev.key === 'a' || ev.key === 'A') KEYS.left = true;

// ---------------- ?debug=sprites 新舊 sprite 對照驗收頁(ART_PIPELINE_PLAN §4)----------------
// 無 param 時零成本:唔起任何 debug DOM,唔行任何 debug code。
const DEBUG_SPRITES = new URLSearchParams(location.search).get('debug') === 'sprites';

const dbg = { bg: 'brick', zoom: 1, mode: 'body' };
const _dbg144 = {}; // SVG@144 raster cache(圖鑑級預覽)

// 臨時將 SPRITES[fam] 指向指定 base,行返正式 variant 管線,完咗還原 + 清 cache
function _withBase(fam, baseCanvas, fn) {
  const orig = SPRITES[fam];
  SPRITES[fam] = baseCanvas;
  invalidateSpriteCaches(fam);
  const r = fn();
  SPRITES[fam] = orig;
  invalidateSpriteCaches(fam);
  return r;
}
// 顯示模式合成:本體 / +outline(模擬 drawEnemyOutline)/ flash(受擊 brightness 2.6)
function _dbgCompose(spr, mode) {
  if (!spr || mode === 'body') return spr;
  if (mode === 'flash') {
    const c = makeCanvas(spr.width, spr.height), x = c.getContext('2d');
    x.filter = 'brightness(2.6)'; x.drawImage(spr, 0, 0); x.filter = 'none';
    return c;
  }
  // outline:8 偏移深色剪影(偏移量按 sprite 解像度等比,示意戰場觀感)
  const k = Math.max(1, spr.width / 64), pad = Math.ceil(3 * k);
  const c = makeCanvas(spr.width + pad * 2, spr.height + pad * 2), x = c.getContext('2d');
  const o = makeCanvas(spr.width, spr.height), ox = o.getContext('2d');
  ox.filter = 'brightness(0)'; ox.drawImage(spr, 0, 0); ox.filter = 'none';
  for (const off of OUTLINE_OFFSETS) x.drawImage(o, pad + off[0] * k, pad + off[1] * k);
  x.drawImage(spr, pad, pad);
  return c;
}
function _dbgImg(spr, cssW) {
  if (!spr) return '<div class="dbg-none">—</div>';
  const shown = _dbgCompose(spr, dbg.mode); // outline 模式有 pad,闊度按比例放大保持同 scale
  return `<img class="dbg-spr" src="${shown.toDataURL()}" style="width:${Math.round(cssW * dbg.zoom * shown.width / spr.width)}px">`;
}

  const btn = (label, group, val) =>
    `<button class="${dbg[group] === val ? 'on' : ''}" data-g="${group}" data-v="${val}">${label}</button>`;
  bar.innerHTML =

// ---------------- Sprite 驗證器(?debug=sprites 自動行;console 出報告)----------------
// 每個 SVG sprite 檢查:①raster 成功 ②非空白(不透明覆蓋 ≥2%) ③尺寸符合 RASTER_SPEC
// ④四邊透明 margin(換算返 128 座標 ≥4px;gate 例外)
function _spriteStat(c) {
  if (!c || !c.width) return null;
  const x = c.getContext('2d');
  let d;
  try { d = x.getImageData(0, 0, c.width, c.height).data; } catch (e) { return null; }
  let n = 0, minX = c.width, maxX = -1, minY = c.height, maxY = -1;
  for (let py = 0; py < c.height; py++) {
    for (let px = 0; px < c.width; px++) {
      if (d[(py * c.width + px) * 4 + 3] > 24) {
        n++;
        if (px < minX) minX = px; if (px > maxX) maxX = px;
        if (py < minY) minY = py; if (py > maxY) maxY = py;
      }
    }
  }
  const cov = n / (c.width * c.height);
  const margin = maxX < 0 ? 0 : Math.min(minX, minY, c.width - 1 - maxX, c.height - 1 - maxY) * 128 / c.width;
  return { cov, margin, box: [minX, minY, maxX, maxY] };
}
function verifySprites() {
  const bad = [], ok = [];
  const check = (name, c, expW, expH, skipMargin) => {
    const st = _spriteStat(c);
    if (!st) { bad.push(name + ':raster失敗/空'); return; }
    if (expW && (c.width !== expW || (expH || expW) !== c.height)) { bad.push(`${name}:尺寸 ${c.width}×${c.height} ≠ ${expW}×${expH || expW}`); return; }
    if (st.cov < 0.02) { bad.push(`${name}:近乎空白 cov=${(st.cov * 100).toFixed(1)}%`); return; }
    const minMargin = skipMargin === 'soft' ? 1 : skipMargin ? 0 : 4;
    if (minMargin && st.margin < minMargin) { bad.push(`${name}:margin ${st.margin.toFixed(1)}px < ${minMargin} box=${st.box.join(',')}/${c.width}`); return; }
    ok.push(name);
  };
  for (const key of Object.keys(SVG_ASSETS)) {
    if (typeof SVG_ASSETS[key] !== 'string' || key === 'catBase') continue;
    const spec = RASTER_SPEC[key] || { field: 192 };
    check(key, SPRITES[key], spec.fieldW || spec.field, spec.fieldH || spec.field, key.startsWith('gate') ? true : key === 'soldier' ? 'soft' : false);
    const p = PARTS[key];
    if (p) for (const pn of p._names) check(key + '.' + pn, p[pn], 0, 0, true);
  }
  if (typeof SVG_ASSETS.catBase === 'string') {
    // 貓(含 soldier 幾何)尾巴 cap 去到 y≈125 係基準 sprite 既有事實(貓運行時唔行 outline 管線),
    // 只驗「唔准切邊」(margin ≥1),唔套敵人嘅 ≥4 標準 — 見 check 內 soldier 同樣處理
    CAT_BREEDS.forEach((b, i) => { check('cat:' + b.n, CAT_SPRITES[i], 96, 96, 'soft'); });
    COSPLAY_CATS.forEach((b, i) => { check('cos:' + b.n, COSPLAY_SPRITES[i], 96, 96, true); }); // 光環/大帽類配件可能貼邊
    CAT_PARTS.forEach((p, i) => { if (p) for (const pn of CAT_PART_NAMES) check('cat' + i + '.' + pn, p[pn], 96, 96, true); });
    COSPLAY_PARTS.forEach((p, i) => { if (p) for (const pn of CAT_PART_NAMES) check('cos' + i + '.' + pn, p[pn], 96, 96, true); });
  }
  const report = { ok: ok.length, bad };
  console.log('[SPRITE-VERIFY] ' + JSON.stringify(report));
  // headless 驗收:報告落 DOM,--dump-dom 攞得到
  let el = document.getElementById('verify-report');
  if (!el) { el = document.createElement('div'); el.id = 'verify-report'; el.style.display = 'none'; document.body.appendChild(el); }
  el.textContent = JSON.stringify(report);
  return report;
}

// ---------------- 主迴圈 ----------------
let lastT = 0;
function frame(t) {
  const dt = Math.min(0.05, (t - lastT) / 1000 || 0);
  lastT = t;
  if (G.zoomT > 0) G.zoomT -= dt;   // zoom punch 回彈用真實時間衰減(hitstop 期間都照回)
  if (G.critCd > 0) G.critCd -= dt; // 爆擊 punch 冷卻
  if (G.state === 'play') {
    if (G.hitstopT > 0) G.hitstopT -= dt; // hitstop 40ms:凍結 update,render 照行
    else update(dt);
    // 動態降級:每 60 幀一個窗口,窗口內跳幀(>19ms)佔 15%+ 算差;
    // 連續兩個差窗口就落一級(先關 bloom,再收窄到只留門 glow);唔回升,避免震盪
    if (dt > 0.019) FXQ._acc++;
    FXQ._n++;
    if (FXQ._n >= 60) {
      FXQ._bad = FXQ._acc >= 9 ? FXQ._bad + 1 : 0;
      if (FXQ._bad >= 2 && FXQ.level < 2) { fxDegrade(); FXQ._bad = 0; }
      FXQ._acc = 0; FXQ._n = 0;
    }
  }
  render();
  requestAnimationFrame(frame);
}

if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
    this.moveTo(x + r, y);
    this.arcTo(x + w, y, x + w, y + h, r);
    this.arcTo(x + w, y + h, x, y + h, r);
    this.arcTo(x, y + h, x, y, r);
    this.arcTo(x, y, x + w, y, r);
    this.closePath();
    return this;
  };
}

    document.body.appendChild(el);
  });
} else if (DEBUG_PERF) {
  svgReady.then(runPerfBench).catch(e => {
    const el = document.createElement('div');
    el.id = 'svg-error'; el.style.cssText = 'color:#ff5a3d;padding:20px;white-space:pre-wrap';
    el.textContent = 'PERF 失敗:' + (e && e.stack || e);
    document.body.appendChild(el);
  });
} else {
  refreshMenu();
  showScreen('menu');
  requestAnimationFrame(frame);
}
</script>
</body>
</html>
